<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM - Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #FF8C00;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --card-bg: #111111;
            --border-color: #222222;
            --error-color: #ff4444;
            --admin-color: #00f2ff;
            --transition: all 0.25s ease;
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-primary); 
            height: 100vh; 
            height: -webkit-fill-available;
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        body.shake { animation: screenShake 0.5s infinite; }

        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        /* Auth */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg-color); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card-bg); padding: 2rem; border-radius: 28px; border: 1px solid var(--border-color); width: 100%; max-width: 400px; text-align: center; }
        
        input { 
            width: 100%; 
            background: #1a1a1a; 
            border: 1px solid var(--border-color); 
            padding: 14px; 
            border-radius: 14px; 
            color: white; 
            margin-bottom: 1rem; 
            outline: none; 
            font-size: 16px; /* Prevent zoom on iOS */
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--accent-color); }
        
        .btn { 
            width: 100%; 
            padding: 14px; 
            border-radius: 14px; 
            border: none; 
            background: var(--accent-color); 
            color: black; 
            font-weight: 700; 
            cursor: pointer; 
            transition: var(--transition); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            font-size: 1rem;
        }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-admin { background: var(--admin-color); color: black; font-size: 0.75rem; height: 40px; padding: 0 12px; }

        /* Modals */
        #custom-confirm { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .confirm-card { background: var(--card-bg); padding: 1.5rem; border-radius: 24px; border: 1px solid var(--border-color); max-width: 320px; width: 100%; text-align: center; }

        /* App Structure */
        #app-container { display: none; flex: 1; flex-direction: column; height: 100%; }
        
        header { 
            padding: 1rem; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(10px);
            z-index: 100;
            padding-top: calc(1rem + env(safe-area-inset-top, 0px));
        }
        .logo { color: var(--accent-color); font-weight: 900; font-size: 1.2rem; letter-spacing: 0.5px; }

        #admin-controls { 
            display: none; 
            background: #0a0a0a; 
            padding: 12px; 
            border-bottom: 1px solid var(--admin-color); 
            flex-direction: column; 
            gap: 10px; 
            border-left: 4px solid var(--admin-color);
        }
        .admin-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
        .admin-row::-webkit-scrollbar { display: none; }

        main { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        .view { display: none; height: 100%; }
        .view.active { display: block; }

        .messages-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            padding: 1rem 1rem calc(150px + var(--safe-area-bottom)) 1rem; 
            min-height: 100%; 
        }
        
        .message { max-width: 90%; display: flex; gap: 10px; align-items: flex-end; margin-bottom: 4px; animation: slideUp 0.3s ease-out; }
        .message.sent { align-self: flex-end; flex-direction: row-reverse; }
        
        .msg-bubble { 
            padding: 12px 16px; 
            border-radius: 18px; 
            background: var(--card-bg); 
            border: 1px solid var(--border-color); 
            position: relative; 
            word-break: break-word; 
            color: white;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .message.sent .msg-bubble { background: var(--accent-color); color: black; border: none; border-bottom-right-radius: 4px; }
        .message:not(.sent) .msg-bubble { border-bottom-left-radius: 4px; }

        .avatar-box { 
            width: 36px; 
            height: 36px; 
            border-radius: 12px; 
            background: #222; 
            flex-shrink: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.9rem; 
            font-weight: 800; 
            border: 1px solid var(--border-color);
        }

        /* Input Area */
        .chat-input-area { 
            position: fixed; 
            bottom: calc(70px + var(--safe-area-bottom)); 
            left: 0; 
            right: 0; 
            padding: 12px 16px; 
            background: rgba(5,5,5,0.95); 
            backdrop-filter: blur(20px); 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid var(--border-color); 
            z-index: 10; 
        }
        
        .chat-input-area input { margin-bottom: 0; background: #151515; }

        /* Bottom Nav */
        nav { 
            height: calc(70px + var(--safe-area-bottom)); 
            border-top: 1px solid var(--border-color); 
            display: flex; 
            background: #000; 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            padding-bottom: var(--safe-area-bottom);
        }
        .nav-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-secondary); 
            cursor: pointer; 
            font-size: 0.75rem; 
            gap: 4px; 
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--accent-color); }
        .nav-item i { width: 22px; height: 22px; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .hidden { display: none !important; }

        /* Profile View Tweaks */
        .profile-card {
            padding: 2rem 1rem;
            max-width: 500px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div id="custom-confirm">
        <div class="confirm-card">
            <h3 style="margin-bottom:12px; font-size:1.1rem;">Очистить чат?</h3>
            <p style="color:var(--text-secondary); font-size:0.85rem; margin-bottom:24px;">Это действие удалит историю сообщений для всех пользователей.</p>
            <div style="display:flex; gap:12px;">
                <button class="btn" style="background:#222; color:white;" id="confirm-cancel">ОТМЕНА</button>
                <button class="btn" id="confirm-ok">ОЧИСТИТЬ</button>
            </div>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color:var(--accent-color); font-size: 2rem; margin-bottom: 1.5rem;">MOPSOGRAM</h1>
            <input type="text" id="username-input" placeholder="Никнейм" autocomplete="off">
            <input type="password" id="password-input" placeholder="Пароль">
            <button class="btn" id="login-btn">ВОЙТИ В СЕТЬ</button>
            <p id="auth-error" style="color:var(--error-color); font-size:0.75rem; margin-top:12px; min-height:1.2em;"></p>
        </div>
    </div>

    <div id="app-container">
        <div id="admin-controls">
            <div class="admin-row">
                <button class="btn btn-admin" style="background:var(--error-color)" id="btn-mute-all">🔇 МУТ ALL</button>
                <button class="btn btn-admin" id="btn-shake">🫨 SHAKE</button>
                <button class="btn btn-admin" style="background:white; color:black;" id="btn-clear-chat">🗑 CLEAR</button>
            </div>
            <div class="admin-row" style="margin-top:4px;">
                <input type="text" id="target-mute-id" placeholder="User ID" style="margin:0; flex:1; height:40px; font-size:14px;">
                <button class="btn btn-admin" style="background:var(--error-color); width:70px;" onclick="muteUser(true)">МУТ</button>
                <button class="btn btn-admin" style="background:var(--admin-color); width:80px;" onclick="muteUser(false)">РАЗМУТ</button>
            </div>
        </div>

        <header>
            <div class="logo">MOPSOGRAM</div>
            <div id="header-profile" onclick="switchView('profile')" style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                <span id="user-display" style="font-size:0.85rem; font-weight:700;"></span>
                <div id="user-avatar-head" class="avatar-box" style="border-color:var(--accent-color); color:var(--accent-color)">?</div>
            </div>
        </header>

        <main id="main-scroll">
            <section id="view-chats" class="view active">
                <div id="chat-messages" class="messages-container"></div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" placeholder="Написать всем..." autocomplete="off">
                    <button class="btn" style="width:50px; flex-shrink:0; padding:0;" id="btn-send">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </section>

            <section id="view-profile" class="view">
                <div class="profile-card">
                    <div id="my-avatar-main" style="width:90px; height:90px; border-radius:24px; margin:0 auto 16px; background:var(--accent-color); color:black; display:flex; align-items:center; justify-content:center; font-size:2.2rem; font-weight:900; box-shadow: 0 10px 20px rgba(255,140,0,0.2);">?</div>
                    <h2 id="my-username-main" style="text-align:center; font-size:1.5rem;">@user</h2>
                    
                    <div style="background:var(--card-bg); border-radius:20px; padding:20px; margin-top:24px; border:1px solid var(--border-color);">
                        <p style="color:var(--text-secondary); font-size:0.8rem; margin-bottom:5px; text-transform:uppercase; letter-spacing:1px;">ID профиля</p>
                        <b id="my-id" style="color:var(--accent-color); font-size:1.4rem; font-family: monospace;"></b>
                    </div>

                    <button onclick="location.reload()" class="btn" style="background:transparent; color:var(--error-color); margin-top:40px; border:1px solid rgba(255,68,68,0.2);">
                        ВЫЙТИ ИЗ АККАУНТА
                    </button>
                </div>
            </section>
        </main>

        <nav>
            <div class="nav-item active" onclick="switchView('chats')"><i data-lucide="message-square"></i>Чат</div>
            <div class="nav-item" onclick="switchView('profile')"><i data-lucide="user"></i>Профиль</div>
        </nav>
    </div>

    <script>
        const SB_URL = "https://obqwgeusngfpboklrwob.supabase.co";
        const SB_KEY = "sb_publishable_y5BsczI_vrBaouWNyS-kFg_vQ1FEUhE";
        const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let isGlobalMuted = false;
        let myMuteStatus = false;
        let systemChannel = null;
        let lastClearTime = "1970-01-01T00:00:00Z";

        document.getElementById('login-btn').onclick = handleAuth;
        document.getElementById('btn-send').onclick = sendMessage;
        document.getElementById('btn-mute-all').onclick = toggleGlobalMute;
        document.getElementById('btn-shake').onclick = toggleGlobalShake;
        
        const confirmModal = document.getElementById('custom-confirm');
        document.getElementById('btn-clear-chat').onclick = () => confirmModal.style.display = 'flex';
        document.getElementById('confirm-cancel').onclick = () => confirmModal.style.display = 'none';
        document.getElementById('confirm-ok').onclick = () => {
            confirmModal.style.display = 'none';
            performChatClear();
        };

        // Handle enter key
        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        async function handleAuth() {
            const userInput = document.getElementById('username-input').value.trim().toLowerCase();
            const passInput = document.getElementById('password-input').value.trim();
            const errEl = document.getElementById('auth-error');
            const btn = document.getElementById('login-btn');
            
            if(!userInput || !passInput) return;
            errEl.innerText = "Подключение...";
            btn.disabled = true;

            try {
                await sbClient.auth.signInAnonymously();
                const usernameWithAt = userInput.startsWith('@') ? userInput : '@' + userInput;
                
                const { data: userRecord, error: fetchErr } = await sbClient
                    .from('users')
                    .select('*')
                    .eq('username', usernameWithAt)
                    .maybeSingle();

                if (userRecord) {
                    if (userRecord.password !== passInput) {
                        errEl.innerText = "Неверный пароль!";
                        btn.disabled = false;
                        return;
                    }
                    currentUser = userRecord;
                } else {
                    const newId = Math.random().toString(36).substr(2, 6).toUpperCase();
                    const newUser = { username: String(usernameWithAt), password: String(passInput), id: String(newId) };
                    const { error: insErr } = await sbClient.from('users').insert([newUser]);
                    if (insErr) throw insErr;
                    currentUser = newUser;
                }
                
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app-container').style.display = 'flex';
                if(currentUser.username === '@admin') document.getElementById('admin-controls').style.display = 'flex';
                
                initApp();
            } catch (err) {
                console.error("Auth error:", err);
                errEl.innerText = "Ошибка сети.";
                btn.disabled = false;
            }
        }

        function initApp() {
            if (!currentUser) return;
            document.getElementById('user-display').innerText = currentUser.username;
            document.getElementById('my-username-main').innerText = currentUser.username;
            document.getElementById('my-id').innerText = currentUser.id;
            setAvatar(document.getElementById('user-avatar-head'), currentUser.username);
            setAvatar(document.getElementById('my-avatar-main'), currentUser.username);
            
            loadMessages();
            subscribeToSystem();
            subscribeToMessages();
            lucide.createIcons();
        }

        function setAvatar(el, name) {
            if (!el) return;
            const safeName = String(name || "?");
            let initial = "?";
            if (safeName.startsWith('@')) {
                initial = safeName.length > 1 ? safeName[1] : "@";
            } else {
                initial = safeName[0] || "?";
            }
            el.innerText = initial.toUpperCase();
        }

        async function loadMessages() {
            try {
                const { data: clearMarkers } = await sbClient.from('messages')
                    .select('created_at')
                    .eq('text', 'SYSTEM_ACTION_CLEAR')
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (clearMarkers && clearMarkers.length > 0) {
                    lastClearTime = clearMarkers[0].created_at;
                }

                const { data, error } = await sbClient.from('messages')
                    .select('*')
                    .gt('created_at', lastClearTime)
                    .order('created_at', { ascending: true });
                
                if (error) throw error;

                const container = document.getElementById('chat-messages');
                if (!container) return;
                container.innerHTML = '';
                if(data) {
                    data.forEach(msg => {
                        if (msg && msg.text !== 'SYSTEM_ACTION_CLEAR') appendMessageUI(msg);
                    });
                    scrollToBottom();
                }
            } catch (e) { 
                console.error("Load error:", e); 
            }
        }

        function subscribeToMessages() {
            sbClient.channel('chat-sync')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (!payload || !payload.new) return;
                const txt = String(payload.new.text || "").trim();
                if (txt === 'SYSTEM_ACTION_CLEAR') {
                    lastClearTime = payload.new.created_at;
                    const container = document.getElementById('chat-messages');
                    if (container) container.innerHTML = '';
                } else if (new Date(payload.new.created_at) > new Date(lastClearTime)) {
                    appendMessageUI(payload.new);
                    scrollToBottom();
                }
            })
            .subscribe();
        }

        async function sendMessage() {
            if(isGlobalMuted || myMuteStatus) return;
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val) return;
            
            const packed = JSON.stringify({ 
                sender: String(currentUser.username), 
                senderId: String(currentUser.id), 
                text: String(val) 
            });
            
            input.value = '';
            // Blur for mobile to hide keyboard on send if needed, 
            // but usually we want to keep typing. Commenting out for better UX.
            // input.blur(); 
            
            await sbClient.from('messages').insert([{ text: packed }]);
        }

        function appendMessageUI(msgRaw) {
            if (!msgRaw || !msgRaw.text || msgRaw.text === 'SYSTEM_ACTION_CLEAR') return;
            
            let msg;
            try { 
                msg = JSON.parse(msgRaw.text); 
            } catch(e) { 
                msg = { sender: 'System', text: String(msgRaw.text) }; 
            }

            const container = document.getElementById('chat-messages');
            if(!container) return;

            const senderName = String(msg.sender || "Unknown");
            const isMe = currentUser && senderName === currentUser.username;
            
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'sent' : ''}`;
            
            let initial = "?";
            if (senderName.startsWith('@')) {
                initial = senderName.length > 1 ? senderName[1] : "@";
            } else {
                initial = senderName[0] || "?";
            }

            div.innerHTML = `
                <div class="avatar-box" style="${isMe ? 'background:var(--accent-color); color:black; border:none;' : ''}">${initial.toUpperCase()}</div>
                <div class="msg-content">
                    <div style="font-size:0.65rem; color:var(--text-secondary); margin:0 6px 4px; display:flex; gap:6px; ${isMe ? 'flex-direction:row-reverse' : ''}">
                        <span>${senderName}</span>
                        <span style="opacity:0.5; font-family:monospace;">[${msg.senderId || '???'}]</span>
                    </div>
                    <div class="msg-bubble">${msg.text || ""}</div>
                </div>`;
            container.appendChild(div);
        }

        function subscribeToSystem() {
            systemChannel = sbClient.channel('system-events');
            systemChannel.on('broadcast', { event: 'admin-action' }, p => {
                const d = p.payload;
                if (!d) return;
                if(d.type === 'global_mute') isGlobalMuted = d.val;
                if(d.type === 'user_mute' && currentUser && d.targetId === currentUser.id) myMuteStatus = d.val;
                if(d.type === 'shake') d.val ? document.body.classList.add('shake') : document.body.classList.remove('shake');
                if(d.type === 'clear') {
                    const container = document.getElementById('chat-messages');
                    if (container) container.innerHTML = '';
                    lastClearTime = new Date().toISOString();
                }
                updateInputState();
            }).subscribe();
        }

        async function performChatClear() {
            if(!currentUser || currentUser.username !== '@admin') return;
            systemChannel.send({ type: 'broadcast', event: 'admin-action', payload: { type: 'clear' } });
            await sbClient.from('messages').insert([{ text: 'SYSTEM_ACTION_CLEAR' }]);
            const container = document.getElementById('chat-messages');
            if (container) container.innerHTML = '';
            lastClearTime = new Date().toISOString();
        }

        function scrollToBottom() {
            const main = document.getElementById('main-scroll');
            if (main) main.scrollTop = main.scrollHeight;
        }

        function updateInputState() {
            const s = isGlobalMuted || myMuteStatus;
            const input = document.getElementById('msg-input');
            if (input) {
                input.disabled = s;
                input.placeholder = s ? "ВЫ В МУТЕ" : "Написать всем...";
            }
        }

        function toggleGlobalMute() {
            isGlobalMuted = !isGlobalMuted;
            systemChannel.send({ type: 'broadcast', event: 'admin-action', payload: { type: 'global_mute', val: isGlobalMuted } });
        }

        function toggleGlobalShake() {
            const s = document.body.classList.contains('shake');
            systemChannel.send({ type: 'broadcast', event: 'admin-action', payload: { type: 'shake', val: !s } });
        }

        window.muteUser = function(val) {
            const tidEl = document.getElementById('target-mute-id');
            const tid = tidEl ? tidEl.value.trim().toUpperCase() : "";
            if(!tid) return;
            systemChannel.send({ type: 'broadcast', event: 'admin-action', payload: { type: 'user_mute', targetId: tid, val: val } });
        };

        window.switchView = (v) => {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            const view = document.getElementById('view-'+v);
            if (view) view.classList.add('active');
            const navs = document.querySelectorAll('.nav-item');
            if (navs.length >= 2) {
                navs[v === 'chats' ? 0 : 1].classList.add('active');
            }
            if(v === 'chats') setTimeout(scrollToBottom, 50);
        };

        // Scroll on resize (keyboard appear)
        window.addEventListener('resize', () => {
            if (document.getElementById('view-chats').classList.contains('active')) {
                scrollToBottom();
            }
        });
    </script>
</body>
</html>
