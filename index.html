<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MopsoGram Recode | Secure Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary: #FF6B00;
            --primary-glow: rgba(255, 107, 0, 0.3);
            --bg-main: #0A0A0A;
            --bg-side: #111111;
        }

        .theme-purple { --primary: #A855F7; --primary-glow: rgba(168, 85, 247, 0.3); }
        .theme-green { --primary: #22C55E; --primary-glow: rgba(34, 197, 94, 0.3); }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #FFFFFF;
            overflow: hidden;
            height: 100vh;
            transition: background 0.3s ease;
            position: fixed;
            width: 100%;
        }

        .mopso-gradient { background: linear-gradient(135deg, var(--primary) 0%, #000000 150%); }

        #messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .scrollbar-hide::-webkit-scrollbar { width: 4px; }
        .scrollbar-hide::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .message-in {
            animation: slideUp 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .avatar {
            width: 38px; height: 38px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; background: var(--primary); color: black;
            font-size: 14px; box-shadow: 0 4px 10px var(--primary-glow);
        }

        /* Modal Styles */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-backdrop.active { display: flex; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; left: -100%; top: 0; bottom: 0; z-index: 50; transition: left 0.3s ease; border-right: 1px solid rgba(255,255,255,0.1); }
            #sidebar.active { left: 0; }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-blur: 4px; z-index: 40; }
            .sidebar-overlay.active { display: block; }
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex h-screen">

    <div class="sidebar-overlay" id="overlay" onclick="toggleMobileSidebar()"></div>

    <!-- МОДАЛЬНОЕ ОКНО СМЕНЫ ПАРОЛЯ -->
    <div id="pwd-modal" class="modal-backdrop">
        <div class="w-full max-w-sm bg-[#141414] border border-white/10 rounded-[2rem] p-8 shadow-2xl">
            <h2 class="text-xl font-black italic mb-6 text-center">СМЕНА <span class="text-[var(--primary)]">ПИН-КОДА</span></h2>
            <div class="space-y-3 mb-6">
                <input id="old-pin" type="password" placeholder="СТАРЫЙ ПИН" class="w-full bg-[#1F1F1F] border border-white/5 text-white rounded-xl p-3 outline-none text-center font-bold">
                <input id="new-pin" type="password" placeholder="НОВЫЙ ПИН" class="w-full bg-[#1F1F1F] border border-white/5 text-white rounded-xl p-3 outline-none text-center font-bold">
            </div>
            <div class="flex gap-2">
                <button onclick="closePwdModal()" class="flex-1 bg-white/5 text-white font-bold p-3 rounded-xl hover:bg-white/10 transition-all text-xs">ОТМЕНА</button>
                <button onclick="updatePin()" class="flex-1 bg-[var(--primary)] text-black font-black p-3 rounded-xl hover:opacity-90 transition-all text-xs">ОБНОВИТЬ</button>
            </div>
            <p id="pwd-msg" class="text-[10px] text-center mt-4 font-bold uppercase"></p>
        </div>
    </div>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#0A0A0A] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#141414] border border-white/5 rounded-[2.5rem] p-8 md:p-10 shadow-2xl text-center">
            <div class="w-20 h-20 mopso-gradient rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-2xl">
                <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-black italic tracking-tighter mb-2">MOPSOGRAM <span class="text-[var(--primary)]">RECODE</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-8">System: <span id="sys-status" class="text-green-500 italic">Secure Node</span></p>
            
            <div class="space-y-3 mb-6">
                <input id="nick-input" type="text" placeholder="НИКНЕЙМ" class="w-full bg-[#1F1F1F] border border-transparent focus:border-[var(--primary)] text-white rounded-xl p-4 outline-none text-center font-bold transition-all uppercase">
                <input id="pass-input" type="password" placeholder="ПИН-КОД" class="w-full bg-[#1F1F1F] border border-transparent focus:border-[var(--primary)] text-white rounded-xl p-4 outline-none text-center font-bold tracking-[0.5em] transition-all">
            </div>

            <button id="auth-btn" onclick="handleLogin()" class="w-full bg-[var(--primary)] text-black font-black p-4 rounded-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg">
                <span id="btn-text">ПОДКЛЮЧИТЬСЯ</span>
                <i id="btn-icon" data-lucide="zap" class="w-5 h-5"></i>
            </button>
            <p id="auth-error" class="text-red-500 text-[10px] font-bold mt-4 uppercase hidden leading-relaxed px-4"></p>
        </div>
    </div>

    <!-- БОКОВАЯ ПАНЕЛЬ -->
    <aside id="sidebar" class="w-72 bg-[var(--bg-side)] border-r border-white/5 flex flex-col shrink-0 h-full">
        <div class="p-6 flex items-center justify-between">
            <h2 class="text-lg font-black italic tracking-tighter">СЕТЬ</h2>
            <div class="flex gap-1.5">
                <button onclick="setTheme('orange')" class="w-3 h-3 rounded-full bg-orange-500"></button>
                <button onclick="setTheme('purple')" class="w-3 h-3 rounded-full bg-purple-500"></button>
                <button onclick="setTheme('green')" class="w-3 h-3 rounded-full bg-green-500"></button>
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto px-3 space-y-1 scrollbar-hide">
            <div class="sidebar-item p-3 rounded-xl bg-white/5 flex items-center gap-3 cursor-pointer border border-white/5">
                <div class="avatar">G</div>
                <div class="flex-1 overflow-hidden">
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-sm">Глобальный узел</span>
                        <span class="text-[8px] text-[var(--primary)] font-black animate-pulse">LIVE</span>
                    </div>
                    <p class="text-[10px] text-gray-500 truncate italic">Защищенное соединение установлено...</p>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-white/5 bg-black/20 flex items-center gap-3">
            <div id="my-avatar" class="avatar shrink-0">?</div>
            <div class="flex-1 overflow-hidden">
                <p id="my-name" class="font-bold text-sm truncate uppercase tracking-tighter italic">User</p>
                <p class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Active Node</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openPwdModal()" class="text-gray-600 hover:text-[var(--primary)] transition-colors">
                    <i data-lucide="key" class="w-4 h-4"></i>
                </button>
                <button onclick="logout()" class="text-gray-600 hover:text-red-500 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main id="app-content" class="hidden flex-1 flex flex-col h-full overflow-hidden bg-[#0D0D0D]">
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-4 md:px-6 bg-[#0D0D0D]/80 backdrop-blur-md z-10 shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleMobileSidebar()" class="md:hidden text-gray-400 p-2">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="avatar scale-75">G</div>
                <div>
                    <h3 class="font-black italic text-xs md:text-sm tracking-tighter uppercase" id="display-node">NODE_ACTIVE</h3>
                    <p class="text-[8px] md:text-[9px] text-[var(--primary)] font-bold uppercase tracking-widest" id="status-text">SECURE CHANNEL</p>
                </div>
            </div>
            <div class="flex items-center gap-4 text-gray-500">
                <i data-lucide="shield" class="w-5 h-5 text-[var(--primary)]"></i>
            </div>
        </header>

        <div id="messages-container" class="scrollbar-hide" style="background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 24px 24px;">
            <div id="initial-loader" class="flex flex-col items-center justify-center h-full text-gray-600 italic text-xs">
                <div class="loading-spinner mb-2"></div>
                Синхронизация протоколов...
            </div>
        </div>

        <div class="p-3 md:p-4 bg-[#0A0A0A] border-t border-white/5 shrink-0">
            <form id="message-form" class="max-w-4xl mx-auto flex items-center gap-2 bg-[#161616] p-1.5 rounded-2xl border border-white/5 shadow-2xl">
                <input id="message-input" type="text" placeholder="Введите сообщение..." class="flex-1 bg-transparent border-none outline-none px-4 text-sm py-2 text-white" autocomplete="off">
                <button type="submit" class="bg-[var(--primary)] text-black p-3 rounded-xl shadow-lg hover:scale-105 active:scale-95 transition-all">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://obqwgeusngfpboklrwob.supabase.co';
        const supabaseKey = 'sb_publishable_y5BsczI_vrBaouWNyS-kFg_vQ1FEUhE';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let myNick = '';
        let myCurrentPin = ''; // Храним текущий ПИН для проверки при смене
        let processedIds = new Set();
        let isFirstLoad = true;

        window.onload = () => {
            const savedTheme = localStorage.getItem('mopso-theme');
            if (savedTheme) setTheme(savedTheme);
            lucide.createIcons();
        };

        function setTheme(theme) {
            document.body.classList.remove('theme-purple', 'theme-green');
            if (theme === 'purple') document.body.classList.add('theme-purple');
            if (theme === 'green') document.body.classList.add('theme-green');
            localStorage.setItem('mopso-theme', theme);
        }

        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function openPwdModal() { document.getElementById('pwd-modal').classList.add('active'); }
        function closePwdModal() { 
            document.getElementById('pwd-modal').classList.remove('active');
            document.getElementById('pwd-msg').innerText = '';
        }

        async function updatePin() {
            const oldP = document.getElementById('old-pin').value.trim();
            const newP = document.getElementById('new-pin').value.trim();
            const msg = document.getElementById('pwd-msg');

            if (oldP !== myCurrentPin) {
                msg.innerText = "СТАРЫЙ ПИН НЕВЕРЕН";
                msg.className = "text-[10px] text-center mt-4 font-bold uppercase text-red-500";
                return;
            }
            if (newP.length < 4) {
                msg.innerText = "МИН. 4 СИМВОЛА";
                msg.className = "text-[10px] text-center mt-4 font-bold uppercase text-red-500";
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('mopsogram_users')
                    .update({ pin_code: newP })
                    .eq('username', myNick);

                if (error) throw error;
                
                myCurrentPin = newP;
                msg.innerText = "ПИН-КОД ОБНОВЛЕН!";
                msg.className = "text-[10px] text-center mt-4 font-bold uppercase text-green-500";
                setTimeout(closePwdModal, 1500);
            } catch (e) {
                msg.innerText = "ОШИБКА БАЗЫ";
                msg.className = "text-[10px] text-center mt-4 font-bold uppercase text-red-500";
            }
        }

        async function handleLogin() {
            const nickInput = document.getElementById('nick-input');
            const passInput = document.getElementById('pass-input');
            const errEl = document.getElementById('auth-error');
            const btnText = document.getElementById('btn-text');

            const inputNick = nickInput.value.trim().toLowerCase();
            const inputPin = passInput.value.trim();

            if (!inputNick || !inputPin) {
                errEl.innerText = "УКАЖИТЕ НИК И ПИН";
                errEl.classList.remove('hidden');
                return;
            }
            
            errEl.classList.add('hidden');
            btnText.innerText = "ПРОВЕРКА...";

            try {
                const { data: userRecord, error: fetchError } = await supabaseClient
                    .from('mopsogram_users')
                    .select('username, pin_code')
                    .eq('username', inputNick)
                    .maybeSingle();

                if (fetchError) throw fetchError;

                if (userRecord) {
                    const storedPin = String(userRecord.pin_code).trim();
                    const enteredPin = String(inputPin).trim();

                    if (storedPin !== enteredPin) {
                        btnText.innerText = "ПОДКЛЮЧИТЬСЯ";
                        errEl.innerText = "ДОСТУП ЗАПРЕЩЕН: НЕВЕРНЫЙ ПИН-КОД";
                        errEl.classList.remove('hidden');
                        return;
                    }
                    myCurrentPin = storedPin;
                } else {
                    // Регистрация нового если не найден
                    const { error: regErr } = await supabaseClient
                        .from('mopsogram_users')
                        .insert([{ username: inputNick, pin_code: inputPin }]);
                    if (regErr) throw regErr;
                    myCurrentPin = inputPin;
                }

                const { data: authData, error: authError } = await supabaseClient.auth.signInAnonymously();
                if (authError) throw authError;
                
                myNick = inputNick;
                currentUser = authData.user;
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
                
                document.getElementById('display-node').innerText = myNick.toUpperCase();
                document.getElementById('my-name').innerText = myNick;
                document.getElementById('my-avatar').innerText = myNick[0].toUpperCase();
                
                fetchMessages();
                setInterval(fetchMessages, 3000);
                lucide.createIcons();

            } catch (err) {
                console.error(err);
                errEl.innerText = "ОШИБКА: " + err.message;
                errEl.classList.remove('hidden');
                btnText.innerText = "ПОДКЛЮЧИТЬСЯ";
            }
        }

        async function fetchMessages() {
            try {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true });
                
                if (error) throw error;
                if (isFirstLoad) {
                    document.getElementById('initial-loader')?.remove();
                    isFirstLoad = false;
                }
                if (data) {
                    const container = document.getElementById('messages-container');
                    const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 200;
                    let hasNew = false;
                    data.forEach(msg => {
                        if (!processedIds.has(msg.id)) {
                            renderMessage(msg);
                            hasNew = true;
                        }
                    });
                    if (hasNew || isAtBottom) scrollToBottom();
                }
            } catch (e) { console.error(e); }
        }

        async function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const val = input.value.trim();
            if (!val) return;
            input.value = '';
            try {
                const { error } = await supabaseClient.from('messages').insert([{
                    content: val,
                    user_name: myNick,
                    user_id: currentUser?.id
                }]);
                if (error) throw error;
                fetchMessages();
            } catch (err) { console.error("Send Error:", err); }
        }

        function renderMessage(msg) {
            processedIds.add(msg.id);
            const container = document.getElementById('messages-container');
            const isOwn = msg.user_id === currentUser?.id || msg.user_name === myNick;
            const name = msg.user_name || "АНОНИМ";
            const text = msg.content || "...";
            const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
            const initial = name[0].toUpperCase();

            const div = document.createElement('div');
            div.className = `flex gap-2 md:gap-3 message-in w-full mb-4 px-2 ${isOwn ? 'flex-row-reverse' : 'flex-row'}`;
            div.innerHTML = `
                <div class="avatar scale-75 md:scale-90 shrink-0">${initial}</div>
                <div class="flex flex-col ${isOwn ? 'items-end' : 'items-start'} max-w-[85%] md:max-w-[75%]">
                    <div class="flex items-center gap-2 mb-1 px-1">
                        <span class="text-[9px] font-black text-[var(--primary)] uppercase italic tracking-tighter">${name}</span>
                        <span class="text-[8px] text-gray-600 font-bold">${time}</span>
                    </div>
                    <div class="p-3 rounded-2xl shadow-xl border border-white/5 ${isOwn ? 'bg-[var(--primary)] text-black font-extrabold rounded-tr-none' : 'bg-[#1A1A1A] text-white rounded-tl-none'}">
                        <p class="text-sm break-words whitespace-pre-wrap leading-tight">${text}</p>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function scrollToBottom() {
            const container = document.getElementById('messages-container');
            container.scrollTop = container.scrollHeight;
        }

        function logout() { window.location.reload(); }
        document.getElementById('message-form').addEventListener('submit', sendMessage);
    </script>
</body>
</html>
