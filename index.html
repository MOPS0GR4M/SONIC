<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | SUPREME CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #000; --card: #0a0a0a; --accent: #ff6600; 
            --text: #fff; --text-dim: #777; --border: #1a1a1a; 
            --god: #ff0055; --err: #ff3333;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.2s; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .page { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .page.active { display: flex; }

        /* ВХОД */
        .auth-screen { align-items: center; justify-content: center; background: radial-gradient(circle, #1a0d00, #000); }
        .auth-card { 
            background: var(--card); border: 1px solid var(--border); padding: 50px; border-radius: 40px; 
            width: 380px; text-align: center; box-shadow: 0 0 50px rgba(255,102,0,0.1); 
        }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; }

        /* МЕНЮ */
        .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .profile-area { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 12px; }
        .balance { font-size: 26px; font-weight: 900; color: var(--accent); }

        .nav-btn { 
            padding: 18px 30px; cursor: pointer; color: var(--text-dim); font-weight: bold; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid transparent;
        }
        .nav-btn:hover { background: rgba(255,102,0,0.05); color: #fff; }
        .nav-btn.active { color: var(--accent); background: rgba(255,102,0,0.08); border-left-color: var(--accent); }
        
        .god-btn { color: var(--god) !important; border-top: 1px solid var(--border); margin-top: 10px; }

        /* КОНТЕНТ */
        .view { flex: 1; display: flex; flex-direction: column; background: #000; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 14px 18px; border-radius: 20px; background: #0d0d0d; border: 1px solid var(--border); max-width: 80%; }
        .msg-out { align-self: flex-end; border-color: #352100; background: #120c00; }

        .btn { padding: 14px 25px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-god { background: var(--god); color: #fff; width: 100%; margin-top: 10px; }

        .tab-view { display: none; padding: 35px; flex-direction: column; gap: 20px; overflow-y: auto; height: 100%; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 30px; }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 15px 35px; border-radius: 50px; background: var(--accent); color: #000; font-weight: 900; z-index: 1000; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="toast">СИСТЕМА ОНЛАЙН</div>

    <div id="p-auth" class="page active auth-screen">
        <div class="auth-card">
            <h1 style="color:var(--accent); letter-spacing: 10px;">MOPSOGRAM</h1>
            <input type="text" id="log-u" class="auth-input" placeholder="ЛОГИН">
            <input type="password" id="pass-u" class="auth-input" placeholder="ПАРОЛЬ">
            <button class="btn" style="width: 100%;" onclick="auth()">ВОЙТИ</button>
        </div>
    </div>

    <div id="p-main" class="page">
        <div class="sidebar">
            <div class="profile-area">
                <img class="user-avatar" id="my-av" src="">
                <div id="my-name" style="font-weight: 900; font-size: 20px;">USER</div>
                <div id="my-stars" class="balance">⭐ 0</div>
            </div>
            <div class="nav-btn active" onclick="tab('chat', this)">💬 ЧАТ</div>
            <div class="nav-btn" onclick="tab('bank', this)">💰 БАНК</div>
            <div class="nav-btn" onclick="tab('frag', this)">💎 FRAGMENT</div>
            <div id="god-menu" class="nav-btn god-btn" style="display:none;" onclick="tab('god', this)">⚡ GOD MODE</div>
            <div style="margin-top: auto; padding: 20px;"><button class="btn" style="width:100%; background:#111; color:#fff;" onclick="location.reload()">ВЫЙТИ</button></div>
        </div>

        <div class="view">
            <div id="t-chat" class="tab-view" style="display: flex; padding: 0;">
                <div id="chat-box"></div>
                <div style="padding:20px; background:var(--card); display:flex; gap:10px;">
                    <input type="text" id="m-in" class="auth-input" style="margin:0;" placeholder="Сообщение...">
                    <button class="btn" onclick="send()">SEND</button>
                </div>
            </div>

            <div id="t-bank" class="tab-view">
                <div class="card">
                    <h2 style="color:var(--accent); margin-top:0;">ПЕРЕВОД</h2>
                    <input type="text" id="g-to" class="auth-input" placeholder="Логин получателя">
                    <input type="number" id="g-amt" class="auth-input" placeholder="Сумма">
                    <button class="btn" onclick="transfer()">ОТПРАВИТЬ</button>
                </div>
                <div class="card"><h2>ЧЕКИ</h2><input type="text" id="c-code" class="auth-input" placeholder="GIFT-XXXXXX"><button class="btn" style="background:#fff; color:#000" onclick="claim()">АКТИВИРОВАТЬ</button></div>
            </div>

            <div id="t-frag" class="tab-view">
                <div class="card">
                    <h2 style="color:var(--accent); margin-top:0;">МИНТ ИМЕНИ (БЕСПЛАТНО)</h2>
                    <div style="display:flex; gap:10px;"><input type="text" id="n-name" class="auth-input" placeholder="@username" style="margin:0;"><button class="btn" onclick="mint()">МИНТ</button></div>
                </div>
                <div id="nft-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
            </div>

            <div id="t-god" class="tab-view">
                <div class="card" style="border-color: var(--god);">
                    <h2 style="color:var(--god); margin-top:0;">УПРАВЛЕНИЕ БАЗОЙ</h2>
                    <button class="btn btn-god" onclick="resetNFTs()">СБРОСИТЬ ВСЕ ЮЗЕРНЕЙМЫ</button>
                    <button class="btn btn-god" style="background:#555" onclick="clearAllChat()">ОЧИСТИТЬ ВЕСЬ ЧАТ</button>
                </div>
                <div class="card">
                    <h2 style="color:var(--god); margin-top:0;">СОЗДАТЬ ЧЕК</h2>
                    <input type="number" id="adm-amt" class="auth-input" placeholder="Сумма">
                    <input type="number" id="adm-uses" class="auth-input" placeholder="Кол-во активаций">
                    <button class="btn btn-god" onclick="createGift()">ВЫПУСТИТЬ ЧЕК</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
        const sb = supabase.createClient(S_URL, S_KEY);
        let user = null;

        async function auth() {
            const u = document.getElementById('log-u').value.trim();
            const p = document.getElementById('pass-u').value.trim();
            if(!u || !p) return notify("Заполни поля!", "err");
            try {
                let { data: ex } = await sb.from('users').select('*').eq('username', u).maybeSingle();
                if(!ex) {
                    const { data: n } = await sb.from('users').insert([{ username: u, password: p, stars: 1000 }]).select().single();
                    user = n;
                } else {
                    if(ex.password === p) user = ex;
                    else return notify("Пароль не тот!", "err");
                }
                if(user) start();
            } catch(e) { alert("Ошибка БД"); }
        }

        function start() {
            document.getElementById('p-auth').classList.remove('active');
            document.getElementById('p-main').classList.add('active');
            if(user.username.toLowerCase() === 'admin') document.getElementById('god-menu').style.display = 'block';
            update(); loadChat(); loadNFTs();
            sb.channel('m').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadChat()).subscribe();
            sb.channel('u').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `username=eq.${user.username}` }, (pl) => { user = pl.new; update(); }).subscribe();
        }

        function update() {
            document.getElementById('my-name').innerText = user.username;
            document.getElementById('my-stars').innerText = `⭐ ${(user.stars || 0).toLocaleString()}`;
            document.getElementById('my-av').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.username}`;
        }

        async function loadChat() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            data?.forEach(m => {
                const isMe = m.username === user.username;
                box.innerHTML += `<div class="msg ${isMe ? 'msg-out' : ''}"><b>${m.username}</b><br>${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('m-in'); if(!i.value.trim()) return;
            await sb.from('messages').insert([{ username: user.username, text: i.value }]); i.value = '';
        }

        async function resetNFTs() {
            if(confirm("ОБНУЛИТЬ ВСЕ ИМЕНА В БАЗЕ?")) {
                const { error } = await sb.from('fragment_market').delete().neq('id', 0);
                if(!error) { notify("База имен очищена!"); loadNFTs(); }
            }
        }

        async function clearAllChat() {
            if(confirm("УДАЛИТЬ ВЕСЬ ЧАТ?")) {
                await sb.from('messages').delete().neq('id', 0);
                notify("Чат очищен");
            }
        }

        async function createGift() {
            const a = parseInt(document.getElementById('adm-amt').value);
            const u = parseInt(document.getElementById('adm-uses').value);
            const c = "GIFT-" + Math.random().toString(36).substring(2,8).toUpperCase();
            await sb.from('checks').insert([{ code: c, amount: a, uses_left: u }]);
            await sb.from('messages').insert([{ username: '🤖 SYSTEM', text: `🎁 НОВЫЙ ЧЕК: <b>${c}</b> на ⭐${a} (${u} акт.)` }]);
            notify("Чек выпущен!");
        }

        async function transfer() {
            const to = document.getElementById('g-to').value.trim();
            const amt = parseInt(document.getElementById('g-amt').value);
            if(user.stars < amt) return notify("Мало звезд!", "err");
            const { data: r } = await sb.from('users').select('*').eq('username', to).maybeSingle();
            if(!r) return notify("Юзер не найден!", "err");
            await sb.from('users').update({ stars: user.stars - amt }).eq('username', user.username);
            await sb.from('users').update({ stars: r.stars + amt }).eq('username', to);
            notify("Отправлено");
        }

        async function claim() {
            const c = document.getElementById('c-code').value.trim();
            const { data: ch } = await sb.from('checks').select('*').eq('code', c).maybeSingle();
            if(!ch || ch.uses_left <= 0) return notify("Код не работает", "err");
            await sb.from('users').update({ stars: user.stars + ch.amount }).eq('username', user.username);
            await sb.from('checks').update({ uses_left: ch.uses_left - 1 }).eq('code', c);
            notify("Звезды получены");
        }

        async function mint() {
            const n = document.getElementById('n-name').value.trim();
            if(!n.startsWith('@')) return notify("Нужно @", "err");
            const { error } = await sb.from('fragment_market').insert([{ username_text: n, owner: user.username }]);
            if(error) return notify("Занято!", "err");
            notify("Успех!"); loadNFTs();
        }

        async function loadNFTs() {
            const { data } = await sb.from('fragment_market').select('*').order('created_at', { ascending: false });
            const l = document.getElementById('nft-list'); l.innerHTML = '';
            data?.forEach(x => { l.innerHTML += `<div class="card" style="padding:15px"><b>${x.username_text}</b><br><small>${x.owner}</small></div>`; });
        }

        function tab(t, btn) {
            document.querySelectorAll('.tab-view').forEach(x => x.style.display = 'none');
            document.getElementById('t-' + t).style.display = t === 'chat' ? 'flex' : 'flex';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function notify(m, ty="success") {
            const t = document.getElementById('toast'); t.innerText = m;
            t.style.background = ty === "success" ? "var(--accent)" : "var(--err)";
            t.style.top = "20px"; setTimeout(() => t.style.top = "-100px", 3000);
        }
    </script>
</body>
</html>
