<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MOPSOGRAM 1.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000;
            --card: #121212;
            --accent: #FF8C00;
            --text: #ffffff;
            --border: #222;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        body.theme-neon { --accent: #39FF14; } 
        body.theme-ruby { --accent: #ff0033; } 
        body.theme-cyber { --accent: #00f2ff; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        #auth { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid var(--border); text-align: center; }
        
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; margin-bottom: 12px; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); flex-shrink: 0; }
        
        #admin-panel { display: none; background: #300; padding: 10px; gap: 10px; align-items: center; border-bottom: 1px solid #500; flex-shrink: 0; }

        main { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #000; }
        .view { display: none; width: 100%; }
        .view.active { display: flex; flex-direction: column; }

        .msg { display: flex; gap: 10px; max-width: 85%; align-self: flex-start; animation: fadeIn 0.2s ease-out; }
        .msg.own { align-self: flex-end; flex-direction: row-reverse; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ava { width: 36px; height: 36px; border-radius: 10px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); }
        .bubble { padding: 10px 14px; border-radius: 18px; background: var(--card); border: 1px solid var(--border); font-size: 15px; word-wrap: break-word; line-height: 1.4; position: relative; }
        .own .bubble { background: var(--accent); color: #000; border: none; border-bottom-right-radius: 4px; }
        .msg:not(.own) .bubble { border-bottom-left-radius: 4px; }
        
        .ibar { background: #000; padding: 10px 15px calc(10px + var(--safe-bottom)); display: flex; gap: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
        .ibar input { margin: 0; border-radius: 25px; }

        nav { height: 70px; border-top: 1px solid var(--border); display: flex; background: #000; padding-bottom: var(--safe-bottom); flex-shrink: 0; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        .ai-box, .img-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        #ai-res { margin-top: 15px; line-height: 1.5; color: var(--accent); font-style: italic; min-height: 20px; }
        #im-out { width: 100%; border-radius: 15px; margin-top: 10px; display: none; border: 1px solid var(--border); }
        
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: var(--text); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 var(--text), 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 var(--text), 1em 0 0 var(--text); } }
    </style>
</head>
<body class="theme-classic">

    <!-- Экран авторизации -->
    <div id="auth">
        <div class="auth-box">
            <h1 style="color:var(--accent); margin-bottom:25px;">MOPSOGRAM 1.1</h1>
            <input id="u-nick" placeholder="Твой ник">
            <input id="u-pass" type="password" placeholder="Пароль">
            <button class="btn" id="login-btn">ВОЙТИ</button>
        </div>
    </div>

    <!-- Админка -->
    <div id="admin-panel">
        <input id="adm-t" placeholder="@ник" style="width:80px; margin:0; height:35px; font-size:12px;">
        <button class="btn" id="adm-mute" style="background:#fff; height:35px; flex:1; font-size:12px;">МУТ</button>
        <button class="btn" id="adm-wipe" style="background:#ff3b30; color:#fff; height:35px; flex:1; font-size:12px;">WIPE</button>
    </div>

    <!-- Шапка -->
    <header>
        <b style="color:var(--accent);">MOPSOGRAM 1.1 <span id="m-status" style="color:red; display:none; font-size:10px;">[В МУТЕ]</span></b>
        <div id="u-head" style="font-size:11px; opacity:0.5;"></div>
    </header>

    <main id="scroller">
        <!-- Чат -->
        <div id="v-chat" class="view active">
            <div id="msgs" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>

        <!-- ИИ Коре -->
        <div id="v-ai" class="view">
            <div class="ai-box">
                <h3>ИИ Мопс Коре</h3>
                <p style="font-size: 12px; opacity: 0.6; margin-bottom: 10px;">Спроси о чем угодно у великого пса</p>
                <input id="ai-q" placeholder="Твой вопрос...">
                <button class="btn" id="ai-go">ПОЛУЧИТЬ ОТВЕТ</button>
                <div id="ai-res"></div>
            </div>
        </div>

        <!-- Генератор Артов -->
        <div id="v-img" class="view">
            <div class="img-box">
                <h3>Генератор Изображений</h3>
                <input id="im-q" placeholder="Что нарисовать?">
                <button class="btn" id="im-go">СОЗДАТЬ И ОТПРАВИТЬ</button>
                <img id="im-out">
            </div>
        </div>

        <!-- Личный кабинет -->
        <div id="v-me" class="view" style="align-items: center; text-align: center;">
            <img id="my-ava" style="width:100px; height:100px; border-radius:30px; border:3px solid var(--accent); margin-bottom:15px; object-fit: cover;">
            <h2 id="my-nick"></h2>
            <div style="margin: 20px 0; width: 100%;">
                <p style="margin-bottom: 10px; opacity: 0.6;">Выбери тему интерфейса:</p>
                <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
                    <div style="background:#FF8C00; height:40px; border-radius:10px; cursor:pointer; border: 1px solid #fff3;" onclick="setT('classic')"></div>
                    <div style="background:#39FF14; height:40px; border-radius:10px; cursor:pointer; border: 1px solid #fff3;" onclick="setT('neon')"></div>
                    <div style="background:#ff0033; height:40px; border-radius:10px; cursor:pointer; border: 1px solid #fff3;" onclick="setT('ruby')"></div>
                    <div style="background:#00f2ff; height:40px; border-radius:10px; cursor:pointer; border: 1px solid #fff3;" onclick="setT('cyber')"></div>
                </div>
            </div>
            <button class="btn" style="background:#222; color:#fff;" onclick="location.reload()">ВЫЙТИ ИЗ АККАУНТА</button>
        </div>
    </main>

    <!-- Ввод сообщения (только для чата) -->
    <div class="ibar" id="input-container">
        <input id="chat-in" placeholder="Гав-гав...">
        <button class="btn" id="chat-send" style="width:50px; padding:0;"><i data-lucide="send"></i></button>
    </div>

    <!-- Навигация -->
    <nav>
        <div class="nav-item active" onclick="tab('chat')"><i data-lucide="message-circle"></i><span>Чат</span></div>
        <div class="nav-item" onclick="tab('ai')"><i data-lucide="brain"></i><span>ИИ</span></div>
        <div class="nav-item" onclick="tab('img')"><i data-lucide="image"></i><span>Арт</span></div>
        <div class="nav-item" onclick="tab('me')"><i data-lucide="user"></i><span>Я</span></div>
    </nav>

    <script>
        const apiKey = ""; 
        const SB_URL = "https://obqwgeusngfpboklrwob.supabase.co";
        const SB_KEY = "sb_publishable_y5BsczI_vrBaouWNyS-kFg_vQ1FEUhE";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null;
        let lastId = 0;
        let isMuted = false;

        // Авторизация
        document.getElementById('login-btn').onclick = async () => {
            const btn = document.getElementById('login-btn');
            const n = document.getElementById('u-nick').value.trim();
            const p = document.getElementById('u-pass').value.trim();
            if(!n || !p) return;
            
            btn.disabled = true;
            btn.innerHTML = 'ВХОД...';
            const nick = n.startsWith('@') ? n.toLowerCase() : '@' + n.toLowerCase();
            
            try {
                await sb.auth.signInAnonymously();
                let { data: ex } = await sb.from('users').select('*').eq('username', nick).maybeSingle();
                if(ex) {
                    if(ex.password !== p) { alert("Неверный пароль!"); btn.disabled = false; btn.innerHTML = 'ВОЙТИ'; return; }
                    user = ex;
                } else {
                    user = { id: Math.random().toString(36).substr(2,9).toUpperCase(), username: nick, password: p, avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${nick}` };
                    await sb.from('users').insert([user]);
                }
                start();
            } catch(e) { alert("Ошибка подключения к Supabase"); btn.disabled = false; btn.innerHTML = 'ВОЙТИ'; }
        };

        function start() {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('u-head').innerText = user.username;
            document.getElementById('my-nick').innerText = user.username;
            document.getElementById('my-ava').src = user.avatar;
            if(user.username === '@admin') document.getElementById('admin-panel').style.display = 'flex';
            lucide.createIcons();
            init();
        }

        // Инициализация базы данных и Realtime
        async function init() {
            document.getElementById('msgs').innerHTML = '';
            await loadMessages();
            sb.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => { 
                handleIncoming(payload.new); 
            }).subscribe();
            setInterval(loadMessages, 5000);
        }

        async function loadMessages() {
            const { data } = await sb.from('messages').select('*').gt('id', lastId).order('id', {ascending:true}).limit(50);
            if(data && data.length > 0) { data.forEach(m => handleIncoming(m)); scroll(); }
        }

        function handleIncoming(d) {
            if(d.id <= lastId) return;
            lastId = d.id;
            const mType = d.msg_type || 'text';
            if(mType === 'WIPE') { document.getElementById('msgs').innerHTML = ''; return; }
            if(mType === 'MUTE' && d.val === user.username) { isMuted = true; updateMuteUI(); return; }
            render(d, mType);
        }

        function render(d, mType) {
            const isOwn = d.uid === user.id;
            const div = document.createElement('div');
            div.className = `msg ${isOwn ? 'own' : ''}`;
            let contentHtml = d.val;
            if(mType === 'image' || d.val.startsWith('data:image')) {
                contentHtml = `<img src="${d.val}" style="width:100%; border-radius:12px; display:block; margin: 4px 0;">`;
            }
            div.innerHTML = `
                <div class="ava"><img src="${d.ava}" style="width:100%; height:100%; object-fit:cover;"></div>
                <div style="flex: 1; min-width: 0;">
                    <div style="font-size:10px; opacity:0.4; margin-bottom:2px; ${isOwn?'text-align:right':''}">${d.name}</div>
                    <div class="bubble">${contentHtml}</div>
                </div>`;
            document.getElementById('msgs').appendChild(div);
            scroll();
        }

        // Отправка сообщений
        async function send(val, type = 'text') {
            if(isMuted) return;
            const payload = { uid: user.id, name: user.username, ava: user.avatar, val: val, msg_type: type };
            const { error } = await sb.from('messages').insert([payload]);
            if(error && error.message.includes('msg_type')) {
                delete payload.msg_type;
                await sb.from('messages').insert([payload]);
            }
        }

        document.getElementById('chat-send').onclick = () => {
            const i = document.getElementById('chat-in');
            const val = i.value.trim();
            if(!val) return;
            send(val);
            i.value = '';
        };

        document.getElementById('chat-in').onkeypress = (e) => { if(e.key === 'Enter') document.getElementById('chat-send').click(); };

        // Админка
        document.getElementById('adm-wipe').onclick = async () => { if(confirm("Удалить всё?")) await send('WIPE_HISTORY', 'WIPE'); };
        document.getElementById('adm-mute').onclick = () => { const t = document.getElementById('adm-t').value.trim(); if(t) send(t, 'MUTE'); };

        // Переключение вкладок
        window.tab = (t) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-'+t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const idx = ['chat', 'ai', 'img', 'me'].indexOf(t);
            document.querySelectorAll('.nav-item')[idx].classList.add('active');
            document.getElementById('input-container').style.display = (t === 'chat' ? 'flex' : 'none');
            if(t === 'chat') setTimeout(scroll, 50);
        };

        window.setT = (t) => document.body.className = 'theme-' + t;
        function scroll() { const m = document.getElementById('scroller'); m.scrollTo({ top: m.scrollHeight, behavior: 'smooth' }); }

        function updateMuteUI() {
            document.getElementById('m-status').style.display = isMuted ? 'inline' : 'none';
            document.getElementById('chat-in').placeholder = isMuted ? "ВЫ ЗАБАНЕНЫ" : "Гав-гав...";
            document.getElementById('chat-in').disabled = isMuted;
            document.getElementById('chat-send').disabled = isMuted;
        }

        // ИИ Мопс Коре
        document.getElementById('ai-go').onclick = async () => {
            const q = document.getElementById('ai-q').value.trim();
            if(!q) return;
            const resBox = document.getElementById('ai-res');
            const btn = document.getElementById('ai-go');
            btn.disabled = true;
            resBox.innerHTML = '<span class="loading-dots">Мопс думает</span>';
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Ты — мудрый и дерзкий мопс по имени Коре. Отвечай на русском языке, коротко, используя собачий сленг и юмор: " + q }] }] })
                });
                const d = await r.json();
                resBox.innerText = d.candidates[0].content.parts[0].text;
            } catch(e) { resBox.innerText = "Упс, мопс уснул."; } finally { btn.disabled = false; }
        };

        // Генерация с ватермаркой MOPSO AI
        document.getElementById('im-go').onclick = async () => {
            const q = document.getElementById('im-q').value.trim();
            if(!q) return;
            const btn = document.getElementById('im-go');
            btn.disabled = true;
            btn.innerText = "РИСУЮ...";
            
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ instances: [{ prompt: q }], parameters: { sampleCount: 1 } })
                });
                const d = await r.json();
                const b64 = d.predictions[0].bytesBase64Encoded;
                
                const img = new Image();
                img.src = `data:image/png;base64,${b64}`;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    ctx.font = "bold 40px Arial";
                    ctx.fillStyle = "rgba(255, 140, 0, 0.7)";
                    ctx.textAlign = "right";
                    ctx.fillText("MOPSO AI", canvas.width - 20, canvas.height - 20);
                    
                    const finalUrl = canvas.toDataURL('image/png');
                    send(finalUrl, 'image');
                    tab('chat');
                };
            } catch(e) { alert("Ошибка генерации арта."); } finally { btn.disabled = false; btn.innerText = "СОЗДАТЬ И ОТПРАВИТЬ"; }
        };
    </script>
</body>
</html>
