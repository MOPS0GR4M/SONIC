<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | SUPREME CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #020202; 
            --card: #0a0a0a; 
            --accent: #ff6600; 
            --text: #ffffff; 
            --text-dim: #888; 
            --border: #1a1a1a; 
            --bot: #00e5ff; 
            --err: #ff3333;
        }

        /* Убираем скрытие по умолчанию, чтобы не было черного экрана */
        * { box-sizing: border-box; transition: all 0.2s ease; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .page { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .page.active { display: flex; }

        /* AUTH */
        .auth-screen { width: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0d00, #000); }
        .auth-card { 
            background: var(--card); border: 1px solid var(--border); padding: 50px; border-radius: 40px; 
            width: 400px; text-align: center; box-shadow: 0 0 30px rgba(255,102,0,0.1); 
        }
        .auth-card h1 { font-size: 32px; letter-spacing: 10px; color: var(--accent); margin-bottom: 30px; font-weight: 900; }
        .auth-card input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; }

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .profile-section { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; }
        .balance { font-size: 24px; font-weight: 900; color: var(--accent); }

        .nav-btn { 
            padding: 20px 30px; cursor: pointer; color: var(--text-dim); font-weight: 800; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 1px; border-left: 0px solid var(--accent);
        }
        .nav-btn:hover { background: rgba(255,102,0,0.05); color: #fff; }
        .nav-btn.active { color: var(--accent); background: rgba(255,102,0,0.1); border-left: 4px solid var(--accent); }

        /* CONTENT */
        .main-view { flex: 1; display: flex; flex-direction: column; background: #000; }
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .message { 
            max-width: 80%; padding: 15px; border-radius: 20px; background: #0d0d0d; border: 1px solid var(--border); 
            animation: slideIn 0.3s ease; 
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .message.mine { align-self: flex-end; border-color: #402600; background: #150d00; }
        .message b { color: var(--accent); font-size: 13px; cursor: pointer; }
        
        .input-zone { padding: 20px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-zone input { flex: 1; background: #050505; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; outline: none; }

        .btn { 
            padding: 15px 25px; border-radius: 12px; border: none; background: var(--accent); color: #000; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,102,0,0.3); }

        /* TABS */
        .tab-content { display: none; padding: 30px; flex-direction: column; gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 30px; }

        /* TOAST */
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            padding: 15px 40px; border-radius: 50px; background: var(--accent); color: #000; 
            font-weight: 900; z-index: 10000; transition: 0.4s; 
        }
    </style>
</head>
<body>

    <div id="toast">SYSTEM ONLINE</div>

    <div id="p-auth" class="page active auth-screen">
        <div class="auth-card">
            <h1>MOPSOGRAM</h1>
            <input type="text" id="in-login" placeholder="ЛОГИН">
            <input type="password" id="in-pass" placeholder="ПАРОЛЬ">
            <button class="btn" style="width: 100%; margin-top: 10px;" onclick="handleAuth()">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <div id="p-main" class="page">
        <div class="sidebar">
            <div class="profile-section">
                <img class="user-avatar" id="my-av" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Mopso">
                <div id="my-name" style="font-weight: 900; font-size: 20px;">USER</div>
                <div id="my-stars" class="balance">⭐ 0</div>
            </div>
            <div class="nav-btn active" onclick="showTab('chat', this)">💬 ОБЩИЙ ЧАТ</div>
            <div class="nav-btn" onclick="showTab('bank', this)">💰 БАНК</div>
            <div class="nav-btn" onclick="showTab('frag', this)">💎 FRAGMENT</div>
            <div style="margin-top: auto; padding: 20px;">
                <button class="btn" style="width:100%; background: #111; color: #fff;" onclick="location.reload()">ВЫХОД</button>
            </div>
        </div>

        <div class="main-view">
            <div id="t-chat" class="tab-content" style="display: flex; height: 100%; padding: 0;">
                <div id="chat-area"></div>
                <div class="input-zone">
                    <input type="text" id="m-in" placeholder="Ваше сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="btn" onclick="sendMessage()">SEND</button>
                </div>
            </div>

            <div id="t-bank" class="tab-content">
                <div class="card">
                    <h2 style="color:var(--accent)">ПЕРЕВОД ЗВЕЗД</h2>
                    <input type="text" id="gift-user" placeholder="Логин получателя" style="width:100%; padding:15px; background:#000; border:1px solid var(--border); color:#fff; border-radius:12px; margin-bottom:10px;">
                    <input type="number" id="gift-sum" placeholder="Сумма ⭐" style="width:100%; padding:15px; background:#000; border:1px solid var(--border); color:#fff; border-radius:12px; margin-bottom:10px;">
                    <button class="btn" onclick="doTransfer()">ОТПРАВИТЬ</button>
                </div>
                <div class="card">
                    <h2>ЧЕКИ</h2>
                    <input type="text" id="check-in" placeholder="GIFT-XXXXXX" style="width:100%; padding:15px; background:#000; border:1px solid var(--border); color:#fff; border-radius:12px; margin-bottom:10px;">
                    <button class="btn" style="background:#fff; color:#000" onclick="doRedeem()">АКТИВИРОВАТЬ</button>
                </div>
            </div>

            <div id="t-frag" class="tab-content">
                <div class="card">
                    <h2 style="color:var(--accent)">MINT NFT NAME</h2>
                    <p>Создание уникального имени сейчас абсолютно <b>БЕСПЛАТНО</b>.</p>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="nft-in" placeholder="@username" style="flex:1; padding:15px; background:#000; border:1px solid var(--border); color:#fff; border-radius:12px;">
                        <button class="btn" onclick="doMint()">MINT</button>
                    </div>
                </div>
                <div id="nft-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        console.log("Script started...");
        const URL = 'https://obqwgeusngfpboklrwob.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
        const sb = supabase.createClient(URL, KEY);
        
        let user = null;

        async function handleAuth() {
            const u = document.getElementById('in-login').value.trim();
            const p = document.getElementById('in-pass').value.trim();
            if(!u || !p) return notify("Заполни поля!", "err");

            console.log("Attempting auth for:", u);
            try {
                let { data: ex, error } = await sb.from('users').select('*').eq('username', u).maybeSingle();
                
                if(!ex) {
                    console.log("User not found, registering...");
                    const { data: n, error: e2 } = await sb.from('users').insert([{ username: u, password: p, stars: 1000 }]).select().single();
                    if(e2) throw e2;
                    user = n;
                } else {
                    if(ex.password === p) {
                        user = ex;
                    } else {
                        return notify("Неверный пароль!", "err");
                    }
                }
                
                if(user) {
                    console.log("Auth success!", user);
                    startApp();
                }
            } catch(e) {
                console.error("Auth error:", e);
                alert("Ошибка БД: " + e.message);
            }
        }

        function startApp() {
            document.getElementById('p-auth').classList.remove('active');
            document.getElementById('p-main').classList.add('active');
            
            updateHeader();
            loadMessages();
            loadNFTs();

            // Realtime
            sb.channel('msgs').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages()).subscribe();
            sb.channel('usr').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `username=eq.${user.username}` }, (pl) => {
                user = pl.new;
                updateHeader();
            }).subscribe();
        }

        function updateHeader() {
            if(!user) return;
            document.getElementById('my-name').innerText = user.username;
            document.getElementById('my-stars').innerText = `⭐ ${(user.stars || 0).toLocaleString()}`;
            document.getElementById('my-av').src = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${user.username}`;
        }

        async function loadMessages() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('chat-area');
            box.innerHTML = '';
            data?.forEach(m => {
                const isMe = m.username === user.username;
                box.innerHTML += `
                    <div class="message ${isMe ? 'mine' : ''}">
                        <div style="margin-bottom:5px"><b>${m.username}</b></div>
                        <div>${m.text}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const i = document.getElementById('m-in');
            const v = i.value.trim();
            if(!v) return;

            // Админ-чек
            if(user.username.toLowerCase() === 'admin' && v.startsWith('!check')) {
                const p = v.split(' ');
                const code = "GIFT-" + Math.random().toString(36).substring(2,8).toUpperCase();
                await sb.from('checks').insert([{ code: code, amount: parseInt(p[1])||500, uses_left: parseInt(p[2])||1 }]);
                await sb.from('messages').insert([{ username: '🤖 BOT', text: `РАЗДАЧА: <b>${code}</b>` }]);
            } else {
                await sb.from('messages').insert([{ username: user.username, text: v }]);
            }
            i.value = '';
        }

        async function doTransfer() {
            const to = document.getElementById('gift-user').value.trim();
            const amt = parseInt(document.getElementById('gift-sum').value);
            if(user.stars < amt) return notify("Мало звезд!", "err");
            
            const { data: rec } = await sb.from('users').select('*').eq('username', to).maybeSingle();
            if(!rec) return notify("Нет такого юзера!", "err");

            await sb.from('users').update({ stars: user.stars - amt }).eq('username', user.username);
            await sb.from('users').update({ stars: rec.stars + amt }).eq('username', to);
            notify("Отправлено!");
        }

        async function doRedeem() {
            const c = document.getElementById('check-in').value.trim();
            const { data: ch } = await sb.from('checks').select('*').eq('code', c).maybeSingle();
            if(!ch || ch.uses_left <= 0) return notify("Код не ок!", "err");

            await sb.from('users').update({ stars: user.stars + ch.amount }).eq('username', user.username);
            await sb.from('checks').update({ uses_left: ch.uses_left - 1 }).eq('code', c);
            notify("⭐ Получено!");
        }

        async function doMint() {
            const n = document.getElementById('nft-in').value.trim();
            if(!n.startsWith('@')) return notify("Начни с @", "err");
            
            const { error } = await sb.from('fragment_market').insert([{ username_text: n, owner: user.username }]);
            if(error) return notify("Уже занято!", "err");
            
            notify("Сминтил NFT!");
            document.getElementById('nft-in').value = '';
            loadNFTs();
        }

        async function loadNFTs() {
            const { data } = await sb.from('fragment_market').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('nft-list');
            list.innerHTML = '';
            data?.forEach(n => {
                list.innerHTML += `<div class="card" style="padding:15px"><b>${n.username_text}</b><br><small>${n.owner}</small></div>`;
            });
        }

        function showTab(t, btn) {
            document.querySelectorAll('.tab-content').forEach(x => x.style.display = 'none');
            document.getElementById('t-' + t).style.display = t === 'chat' ? 'flex' : 'flex';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function notify(m, ty="success") {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.style.background = ty === "success" ? "var(--accent)" : "var(--err)";
            t.style.top = "20px";
            setTimeout(() => t.style.top = "-100px", 3000);
        }
    </script>
</body>
</html>
