<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | ААА ПАВЛИН И ЕЩЕ Я WESHYSONIX</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #000; --card: #0a0a0a; --accent: #ff6600; 
            --text: #fff; --text-dim: #777; --border: #1a1a1a; 
            --god: #ff0055; --err: #ff3333; --success: #00ff88;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        .page { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .page.active { display: flex; }

        .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .profile-area { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 10px; object-fit: cover; cursor: pointer; }
        
        .nav-btn { padding: 18px 25px; cursor: pointer; color: var(--text-dim); font-size: 11px; font-weight: bold; text-transform: uppercase; border-left: 4px solid transparent; transition: 0.3s; }
        .nav-btn.active { color: var(--accent); background: rgba(255,102,0,0.1); border-left-color: var(--accent); }
        .god-btn { color: var(--god) !important; border-top: 1px solid var(--border); margin-top: auto; }

        .view { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { padding: 12px 18px; border-radius: 18px; background: #0d0d0d; border: 1px solid var(--border); max-width: 85%; animation: fadeIn 0.3s; line-height: 1.4; }
        .msg.mine { align-self: flex-end; border-color: #402000; background: #150d00; }
        .msg b { color: var(--accent); cursor: pointer; }
        .msg i { color: #444; font-size: 10px; margin-left: 5px; font-style: normal; }

        .tab-view { display: none; padding: 35px; flex-direction: column; gap: 20px; overflow-y: auto; height: 100%; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 25px; }
        
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 12px; outline: none; width: 100%; margin-bottom: 10px; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 50px; z-index: 9999; transition: 0.5s; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:5000; align-items:center; justify-content:center; }
        .modal-card { background: var(--card); padding: 40px; border-radius: 30px; width: 340px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-card" onclick="event.stopPropagation()">
        <img id="m-av" style="width:100px; height:100px; border-radius:50%; border:2px solid var(--accent);">
        <h2 id="m-name" style="margin: 15px 0 5px 0;"></h2>
        <div id="m-stars" style="font-size: 24px; color: var(--accent); font-weight: 900; margin-bottom: 10px;">⭐ 0</div>
        <div id="m-nfts" style="font-size: 11px; color: #555; background: #000; padding: 10px; border-radius: 10px; margin-bottom: 20px;"></div>
        <div id="adm-tools" style="display:none; border-top: 1px solid #222; padding-top: 15px;">
            <button class="btn" style="width:100%; background: var(--god); color: #fff;" onclick="toggleMute()">ИЗМЕНИТЬ МУТ</button>
        </div>
    </div>
</div>

<div id="p-auth" class="page active" style="align-items:center; justify-content:center;">
    <div class="card" style="width:350px; text-align:center;">
        <h1 style="color:var(--accent); letter-spacing:5px;">MOPSOGRAM</h1>
        <input type="text" id="log-u" placeholder="ЛОГИН">
        <input type="password" id="log-p" placeholder="ПАРОЛЬ">
        <button class="btn" style="width:100%" onclick="auth()">ВОЙТИ</button>
    </div>
</div>

<div id="p-main" class="page">
    <div class="sidebar">
        <div class="profile-area">
            <img id="my-av" class="user-avatar" onclick="openProfile(user.username)">
            <div id="my-name" style="font-weight:bold;">USER</div>
            <div id="my-stars" style="color:var(--accent); font-weight:900;">⭐ 0</div>
        </div>
        <div class="nav-btn active" onclick="tab('chat', this)">ЧАТ ГРУППЫ</div>
        <div class="nav-btn" onclick="tab('bank', this)">БАНК / ЧЕКИ</div>
        <div class="nav-btn" onclick="tab('nft', this)">FRAGMENT NFT</div>
        <div id="god-menu" class="nav-btn god-btn" style="display:none;" onclick="tab('god', this)">⚡ АДМИН ПАНЕЛЬ</div>
        <button class="btn" style="margin:20px; background:#111; color:#fff;" onclick="location.reload()">ВЫЙТИ</button>
    </div>

    <div class="view">
        <div id="t-chat" class="tab-view" style="display:flex; padding:0;">
            <div id="chat-box"></div>
            <div style="padding:15px; background:var(--card); border-top: 1px solid var(--border); display:flex; gap:10px;">
                <input type="text" id="m-in" placeholder="Сообщение..." style="margin:0;">
                <button class="btn" onclick="send()">SEND</button>
            </div>
        </div>

        <div id="t-bank" class="tab-view">
            <div class="card">
                <h3>АКТИВАЦИЯ ЧЕКА</h3>
                <input type="text" id="c-code" placeholder="MOPSO-XXXX">
                <button class="btn" style="width:100%" onclick="claim()">АКТИВИРОВАТЬ</button>
            </div>
            <div class="card">
                <h3>ПЕРЕВОД</h3>
                <input type="text" id="t-to" placeholder="Ник">
                <input type="number" id="t-amt" placeholder="Сумма">
                <button class="btn" style="width:100%" onclick="transfer()">ОТПРАВИТЬ</button>
            </div>
        </div>

        <div id="t-nft" class="tab-view">
            <div class="card">
                <h3>MINT NFT NAME</h3>
                <input type="text" id="n-name" placeholder="@username">
                <button class="btn" style="width:100%" onclick="mint()">ЗАБРАТЬ ИМЯ</button>
            </div>
            <div id="nft-list" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"></div>
        </div>

        <div id="t-god" class="tab-view">
            <div class="card" style="border-color:var(--god)">
                <h2 style="color:var(--god)">GOD TOOLS</h2>
                <input type="number" id="g-sum" placeholder="Сумма звезд">
                <input type="text" id="g-msg" placeholder="Записка к чеку">
                <button class="btn" style="background:var(--god); color:#fff; width:100%;" onclick="makeCheck()">СОЗДАТЬ ЧЕК</button>
                <div id="g-res" style="margin-top:15px; text-align:center; font-weight:bold; color:var(--accent); background:#000; padding:10px; border-radius:10px;">КОД БУДЕТ ТУТ</div>
                <hr style="border:0; border-top: 1px solid #222; margin:20px 0;">
                <button class="btn" style="background:#fff; color:#000; width:100%;" onclick="clearChat()">🔥 ОЧИСТИТЬ ЧАТ (ВСЕМ)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);
    
    let user = null, allNFTs = [], vUser = null;

    async function auth() {
        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value.trim();
        if(!u || !p) return notify("Заполни поля!", "err");
        try {
            let { data: ex } = await sb.from('users').select('*').eq('username', u).maybeSingle();
            if(!ex) {
                const { data: n } = await sb.from('users').insert([{ username: u, password: p, stars: 500 }]).select().single();
                user = n;
            } else {
                if(ex.password === p) user = ex;
                else return notify("Неверный пароль!", "err");
            }
            start();
        } catch(e) { notify("Ошибка входа!", "err"); }
    }

    async function start() {
        document.getElementById('p-auth').classList.remove('active');
        document.getElementById('p-main').classList.add('active');
        if(user.username.toLowerCase() === 'admin') document.getElementById('god-menu').style.display = 'block';
        
        // Сначала подписываемся на Realtime, потом грузим данные
        sb.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, async (pl) => {
            if(pl.table === 'messages') loadChat();
            if(pl.table === 'fragment_market') { await syncNFTs(); loadNFTList(); loadChat(); }
            if(pl.table === 'users' && pl.new.id === user.id) { user = pl.new; updateUI(); }
        }).subscribe();

        await syncNFTs();
        updateUI(); loadChat(); loadNFTList();
    }

    async function loadChat() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        if(!msgs || msgs.length === 0) box.innerHTML = '<div style="text-align:center; color:#333; margin-top:20px;">Чат пуст</div>';
        msgs?.forEach(m => {
            const isMe = m.username === user.username;
            const nfts = allNFTs.filter(n => n.owner === m.username).map(n => n.username_text).join(', ');
            box.innerHTML += `<div class="msg ${isMe ? 'mine' : ''}">
                <b onclick="openProfile('${m.username}')">${m.username}</b> <i>${nfts ? '['+nfts+']' : ''}</i>
                <div style="margin-top:5px;">${m.text}</div>
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        if(user.is_muted) return notify("У вас мут!", "err");
        const i = document.getElementById('m-in');
        if(!i.value.trim()) return;
        const text = i.value; i.value = '';
        await sb.from('messages').insert([{ username: user.username, text: text }]);
    }

    async function clearChat() {
        if(!confirm("Удалить ВСЕ сообщения?")) return;
        const { error } = await sb.from('messages').delete().neq('username', 'system_security');
        if(error) notify("Ошибка SQL! Проверь RLS.", "err");
        else notify("Чат очищен!");
    }

    async function syncNFTs() {
        const { data } = await sb.from('fragment_market').select('*');
        allNFTs = data || [];
    }

    async function loadNFTList() {
        const l = document.getElementById('nft-list'); l.innerHTML = '';
        allNFTs.forEach(x => {
            l.innerHTML += `<div class="card" style="padding:15px; text-align:center;"><b style="color:var(--accent)">${x.username_text}</b><br><small style="color:#555">${x.owner}</small></div>`;
        });
    }

    async function mint() {
        const n = document.getElementById('n-name').value.trim();
        if(!n.startsWith('@')) return notify("Начни с @", "err");
        const { error } = await sb.from('fragment_market').insert([{ username_text: n, owner: user.username }]);
        if(error) return notify("Занято!", "err");
        notify("Успешно!"); document.getElementById('n-name').value = '';
        await syncNFTs(); loadNFTList();
    }

    async function claim() {
        const c = document.getElementById('c-code').value.trim();
        const { data: chk } = await sb.from('checks').select('*').eq('code', c).eq('is_used', false).maybeSingle();
        if(!chk) return notify("Код не найден!", "err");
        await sb.from('checks').update({ is_used: true }).eq('id', chk.id);
        await sb.from('users').update({ stars: user.stars + chk.amount }).eq('id', user.id);
        if(chk.message) alert("Записка: " + chk.message);
        notify("Получено ⭐ " + chk.amount);
        document.getElementById('c-code').value = '';
    }

    async function makeCheck() {
        const amt = parseInt(document.getElementById('g-sum').value);
        if(!amt) return notify("Введите сумму", "err");
        const code = "MOPSO-" + Math.random().toString(36).substring(2,8).toUpperCase();
        await sb.from('checks').insert([{ code, amount: amt, message: document.getElementById('g-msg').value, is_used: false }]);
        document.getElementById('g-res').innerText = code;
        notify("Чек создан!");
    }

    async function transfer() {
        const to = document.getElementById('t-to').value.trim();
        const amt = parseInt(document.getElementById('t-amt').value);
        const { data: r } = await sb.from('users').select('*').eq('username', to).maybeSingle();
        if(!r || user.stars < amt || amt <= 0) return notify("Ошибка перевода!", "err");
        await sb.from('users').update({ stars: r.stars + amt }).eq('username', to);
        await sb.from('users').update({ stars: user.stars - amt }).eq('id', user.id);
        notify("Звезды отправлены!");
    }

    async function openProfile(name) {
        const { data: t } = await sb.from('users').select('*').eq('username', name).maybeSingle();
        if(!t) return;
        vUser = t;
        const nfts = allNFTs.filter(n => n.owner === name).map(n => n.username_text).join(', ');
        document.getElementById('m-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${t.username}`;
        document.getElementById('m-name').innerText = t.username + (t.is_muted ? " [MUTED]" : "");
        document.getElementById('m-stars').innerText = "⭐ " + t.stars;
        document.getElementById('m-nfts').innerText = nfts ? "NFT: " + nfts : "Нет NFT";
        document.getElementById('adm-tools').style.display = (user.username.toLowerCase()==='admin' && name!=='admin') ? 'block' : 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    async function toggleMute() {
        await sb.from('users').update({ is_muted: !vUser.is_muted }).eq('id', vUser.id);
        notify("Статус мута изменен"); document.getElementById('modal').style.display = 'none';
    }

    function updateUI() {
        document.getElementById('my-name').innerText = user.username + (user.is_muted ? " [M]" : "");
        document.getElementById('my-stars').innerText = "⭐ " + user.stars.toLocaleString();
        document.getElementById('my-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${user.username}`;
    }
    function tab(t, b) {
        document.querySelectorAll('.tab-view').forEach(x => x.style.display = 'none');
        document.getElementById('t-' + t).style.display = 'flex';
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
    }
    function notify(m, ty="success") {
        const t = document.getElementById('toast'); t.innerText = m;
        t.style.background = ty==="success"?"var(--success)":"var(--err)";
        t.style.top = "20px"; setTimeout(() => t.style.top = "-100px", 3000);
    }
</script>
</body>
</html>
