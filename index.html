<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOPSOGRAM - Техработы</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: #000;
            color: #FF8C00;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .icon-box {
            background: rgba(255, 140, 0, 0.1);
            padding: 30px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 2px solid #FF8C00;
            animation: pulse 2s infinite;
        }

        h1 { font-size: 2rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #fff; opacity: 0.8; max-width: 300px; line-height: 1.5; }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid #222;
            border-top: 3px solid #FF8C00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 30px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="icon-box">
        <i data-lucide="wrench" size="64"></i>
    </div>

    <h1>MOPSOGRAM</h1>
    <p>ПАВЛИНЫ МЕШАЮТ МОПСАМ РАБОТАТЬ</p>
    
    <div class="loader"></div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
