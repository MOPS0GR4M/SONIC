<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOPSOGRAM - Messenger</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #FF8C00;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --card-bg: #111111;
            --border-color: #222222;
            --error-color: #ff4444;
            --admin-color: #00f2ff;
            --transition: all 0.25s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        body.shake { animation: screenShake 0.5s infinite; }

        @keyframes screenShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        #auth-overlay { position: fixed; inset: 0; background: var(--bg-color); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card-bg); padding: 2rem; border-radius: 24px; border: 1px solid var(--border-color); width: 100%; max-width: 380px; text-align: center; }
        input { width: 100%; background: #1a1a1a; border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; color: white; margin-bottom: 1rem; outline: none; font-size: 0.9rem; }
        
        .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--accent-color); color: black; font-weight: bold; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-admin { background: var(--admin-color); color: black; font-size: 0.75rem; height: 36px; padding: 0 10px; }

        #custom-confirm { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .confirm-card { background: var(--card-bg); padding: 1.5rem; border-radius: 20px; border: 1px solid var(--border-color); max-width: 300px; width: 100%; text-align: center; }

        #app-container { display: none; flex: 1; flex-direction: column; height: 100%; }
        header { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 100; }
        .logo { color: var(--accent-color); font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; }

        #admin-controls { display: none; background: #0a0a0a; padding: 12px; border-bottom: 1px solid var(--admin-color); flex-direction: column; gap: 8px; border-left: 4px solid var(--admin-color); }
        .admin-row { display: flex; gap: 8px; align-items: center; }

        main { flex: 1; overflow-y: auto; position: relative; }
        .view { display: none; height: 100%; }
        .view.active { display: block; }
        .messages-container { display: flex; flex-direction: column; gap: 10px; padding: 1rem 1rem 140px 1rem; min-height: 100%; }
        
        .message { max-width: 85%; padding: 4px; border-radius: 16px; animation: slideUp 0.3s ease; display: flex; gap: 10px; align-items: flex-end; margin-bottom: 5px; }
        .message.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 10px 14px; border-radius: 14px; background: var(--card-bg); border: 1px solid var(--border-color); position: relative; word-break: break-word; color: white; }
        .sent .msg-bubble { background: var(--accent-color); color: black; border: none; }

        .avatar-box { width: 35px; height: 35px; border-radius: 10px; background: #333; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: bold; border: 1px solid var(--border-color); overflow: hidden; }

        .chat-input-area { position: fixed; bottom: 70px; left: 0; right: 0; padding: 15px; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); display: flex; gap: 8px; border-top: 1px solid var(--border-color); z-index: 10; }

        nav { height: 70px; border-top: 1px solid var(--border-color); display: flex; background: #000; position: fixed; bottom: 0; left: 0; right: 0; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); cursor: pointer; font-size: 0.7rem; gap: 5px; }
        .nav-item.active { color: var(--accent-color); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="custom-confirm">
        <div class="confirm-card">
            <h3 style="margin-bottom:15px; font-size:1rem;">Очистить чат?</h3>
            <p style="color:var(--text-secondary); font-size:0.8rem; margin-bottom:20px;">Это действие удалит историю сообщений для всех пользователей.</p>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#333; color:white;" id="confirm-cancel">ОТМЕНА</button>
                <button class="btn" id="confirm-ok">ДА, ОЧИСТИТЬ</button>
            </div>
        </div>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color:var(--accent-color)">MOPSOGRAM</h1>
            <input type="text" id="username-input" placeholder="Никнейм">
            <input type="password" id="password-input" placeholder="Пароль">
            <button class="btn" id="login-btn">ВОЙТИ / СОЗДАТЬ</button>
            <p id="auth-error" style="color:var(--error-color); font-size:0.7rem; margin-top:10px; min-height:1em;"></p>
        </div>
    </div>

    <div id="app-container">
        <div id="admin-controls">
            <div class="admin-row">
                <button class="btn btn-admin" style="background:var(--error-color)" id="btn-mute-all">🔇 ОБЩИЙ МУТ</button>
                <button class="btn btn-admin" id="btn-shake">🫨 SHAKE</button>
                <button class="btn btn-admin" style="background:white; color:black;" id="btn-clear-chat">🗑 ОЧИСТИТЬ ЧАТ</button>
            </div>
            <div class="admin-row">
                <input type="text" id="target-mute-id" placeholder="ID юзера" style="margin:0; flex:1; height:36px;">
                <button class="btn btn-admin" style="background:var(--error-color)" onclick="muteUser(true)">МУТ</button>
                <button class="btn btn-admin" style="background:var(--admin-color)" onclick="muteUser(false)">РАЗМУТ</button>
            </div>
        </div>

        <header>
            <div class="logo">MOPSOGRAM</div>
            <div id="header-profile" onclick="switchView('profile')" style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                <span id="user-display" style="font-size:0.85rem; font-weight:bold;"></span>
                <div id="user-avatar-head" class="avatar-box">?</div>
            </div>
        </header>

        <main id="main-scroll">
            <section id="view-chats" class="view active">
                <div id="chat-messages" class="messages-container"></div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" placeholder="Написать всем...">
                    <button class="btn" style="width:auto; padding:0 15px;" id="btn-send">
                        <i data-lucide="send"></i>
                    </button>
                </div>
            </section>

            <section id="view-profile" class="view">
                <div style="text-align:center; margin: 3rem 0;">
                    <div id="my-avatar-main" style="width:80px; height:80px; border-radius:20px; margin:0 auto 10px; background:var(--accent-color); color:black; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:bold;">?</div>
                    <h2 id="my-username-main">@user</h2>
                    <p style="color:var(--text-secondary); margin-top:10px;">ID для связи: <br><b id="my-id" style="color:var(--accent-color); font-size:1.2rem;"></b></p>
                    <p onclick="location.reload()" style="color:var(--error-color); margin-top:40px; cursor:pointer; font-size:0.8rem; text-decoration:underline;">Выйти</p>
                </div>
            </section>
        </main>

        <nav>
            <div class="nav-item active" onclick="switchView('chats')"><i data-lucide="message-circle"></i>Чат</div>
            <div class="nav-item" onclick="switchView('profile')"><i data-lucide="user"></i>Профиль</div>
        </nav>
    </div>

    <script>
        const SB_URL = "https://obqwgeusngfpboklrwob.supabase.co";
        const SB_KEY = "sb_publishable_y5BsczI_vrBaouWNyS-kFg_vQ1FEUhE";
        const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let isGlobalMuted = false;
        let myMuteStatus = false;
        let systemChannel = null;
        let lastClearTime = "1970-01-01T00:00:00Z";

        document.getElementById('login-btn').onclick = handleAuth;
        document.getElementById('btn-send').onclick = sendMessage;
        document.getElementById('btn-mute-all').onclick = toggleGlobalMute;
        document.getElementById('btn-shake').onclick = toggleGlobalShake;
        
        const confirmModal = document.getElementById('custom-confirm');
        document.getElementById('btn-clear-chat').onclick = () => confirmModal.style.display = 'flex';
        document.getElementById('confirm-cancel').onclick = () => confirmModal.style.display = 'none';
        document.getElementById('confirm-ok').onclick = () => {
            confirmModal.style.display = 'none';
            performChatClear();
        };

        async function handleAuth() {
            const userInput = document.getElementById('username-input').value.trim().toLowerCase();
            const passInput = document.getElementById('password-input').value.trim();
            const errEl = document.getElementById('auth-error');
            const btn = document.getElementById('login-btn');
            
            if(!userInput || !passInput) return;
            errEl.innerText = "";
            btn.disabled = true;

            try {
                await sbClient.auth.signInAnonymously();
                const usernameWithAt = userInput.startsWith('@') ? userInput : '@' + userInput;
                
                const { data: userRecord, error: fetchErr } = await sbClient
                    .from('users')
                    .select('*')
                    .eq('username', usernameWithAt)
                    .maybeSingle();

                if (userRecord) {
                    if (userRecord.password !== passInput) {
                        errEl.innerText = "Ошибка: Неверный пароль!";
                        btn.disabled = false;
                        return;
                    }
                    currentUser = userRecord;
                } else {
                    const newId = Math.random().toString(36).substr(2, 6).toUpperCase();
                    const newUser = { username: String(usernameWithAt), password: String(passInput), id: String(newId) };
                    const { error: insErr } = await sbClient.from('users').insert([newUser]);
                    if (insErr) throw insErr;
                    currentUser = newUser;
                }
                
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('app-container').style.display = 'flex';
                if(currentUser.username === '@admin') document.getElementById('admin-controls').style.display = 'flex';
                
                initApp();
            } catch (err) {
                console.error("Auth error:", err);
                errEl.innerText = "Ошибка входа.";
                btn.disabled = false;
            }
        }

        function initApp() {
            if (!currentUser) return;
            document.getElementById('user-display').innerText = currentUser.username;
            document.getElementById('my-username-main').innerText = currentUser.username;
            document.getElementById('my-id').innerText = currentUser.id;
            setAvatar(document.getElementById('user-avatar-head'), currentUser.username);
            setAvatar(document.getElementById('my-avatar-main'), currentUser.username);
            
            loadMessages();
            subscribeToSystem();
            subscribeToMessages();
            lucide.createIcons();
        }

        function setAvatar(el, name) {
            if (!el) return;
            const safeName = String(name || "?");
            let initial = "?";
            if (safeName.startsWith('@')) {
                initial = safeName.length > 1 ? safeName[1] : "@";
            } else {
                initial = safeName[0] || "?";
            }
            el.innerText = initial.toUpperCase();
        }

        async function loadMessages() {
            try {
                const { data: clearMarkers } = await sbClient.from('messages')
                    .select('created_at')
                    .eq('text', 'SYSTEM_ACTION_CLEAR')
                    .order('created_at', { ascending: false })
                    .limit(1);

                if (clearMarkers && clearMarkers.length > 0) {
                    lastClearTime = clearMarkers[0].created_at;
                }

                const { data, error } = await sbClient.from('messages')
                    .select('*')
                    .gt('created_at', lastClearTime)
                    .order('created_at', { ascending: true });
                
                if (error) throw error;

                const container = document.getElementById('chat-messages');
                if (!container) return;
                container.innerHTML = '';
                if(data) {
                    data.forEach(msg => {
                        if (msg && msg.text !== 'SYSTEM_ACTION_CLEAR') appendMessageUI(msg);
                    });
                    scrollToBottom();
                }
            } catch (e) { 
                console.error("Load error:", e); 
            }
        }

        function subscribeToMessages() {
            sbClient.channel('chat-sync')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (!payload || !payload.new) return;
                const txt = String(payload.new.text || "").trim();
                if (txt === 'SYSTEM_ACTION_CLEAR') {
                    lastClearTime = payload.new.created_at;
                    const container = document.getElementById('chat-messages');
                    if (container) container.innerHTML = '';
                } else if (new Date(payload.new.created_at) > new Date(lastClearTime)) {
                    appendMessageUI(payload.new);
                    scrollToBottom();
                }
            })
            .subscribe();
        }

        async function sendMessage() {
            if(isGlobalMuted || myMuteStatus) return;
            const input = document.getElementById('msg-input');
            const val = input.value.trim();
            if(!val) return;
            const packed = JSON.stringify({ sender: String(currentUser.username), senderId: String(currentUser.id), text: String(val) });
            input.value = '';
            await sbClient.from('messages').insert([{ text: packed }]);
        }

        function appendMessageUI(msgRaw) {
            if (!msgRaw || !msgRaw.text || msgRaw.text === 'SYSTEM_ACTION_CLEAR') return;
            
            let msg;
            try { 
                msg = JSON.parse(msgRaw.text); 
            } catch(e) { 
                msg = { sender: 'System', text: String(msgRaw.text) }; 
            }

            const container = document.getElementById('chat-messages');
            if(!container) return;

            const senderName = String(msg.sender || "Unknown");
            const isMe = currentUser && senderName === currentUser.username;
            
            const div = document.createElement('div');
            div.className = `message ${isMe ? 'sent' : ''}`;
            
            // Безопасное получение первой буквы
            let initial = "?";
            if (senderName.startsWith('@')) {
                initial = senderName.length > 1 ? senderName[1] : "@";
            } else {
                initial = senderName[0] || "?";
            }

            div.innerHTML = `
                <div class="avatar-box">${initial.toUpperCase()}</div>
                <div class="msg-content">
                    <div style="font-size:0.6rem; color:var(--text-secondary); margin:0 4px 2px;">${senderName} ${msg.senderId ? '['+msg.senderId+']' : ''}</div>
                    <div class="msg-bubble">${msg.text || ""}</div>
                </div>`;
            container.appendChild(div);
        }

        function subscribeToSystem() {
            systemChannel = sbClient.channel('system-events');
            systemChannel.on('broadcast', { event: 'admin-action' }, p => {
                const d = p.payload;
                if (!d) return;
                if(d.type === 'global_mute') isGlobalMuted = d.val;
                if(d.type === 'user_mute' && currentUser && d.targetId === currentUser.id) myMuteStatus = d.val;
                if(d.type === 'shake') d.val ? document.body.classList.add('shake') : document.body.classList.remove('shake');
                if(d.type === 'clear') {
                    const container = document.getElementById('chat-messages');
                    if (container) container.innerHTML = '';
                    lastClearTime = new Date().toISOString();
                }
                updateInputState();
            }).subscribe();
        }

        async function performChatClear() {
            if(!currentUser || currentUser.username !== '@admin') return;
            systemChannel.send({ type: 'broadcast', event: 'admin-action', payload: { type: 'clear' } });
            await sbClient.from('messages').insert([{ text: 'SYSTEM_ACTION_CLEAR' }]);
            const container = document.getElementById('chat-messages');
            if (container) container.innerHTML = '';
            lastClearTime = new Date().toISOString();
        }

        function scrollToBottom() {
            const main = document.getElementById('main-scroll');
            if (main) main.scrollTop = main.scrollHeight;
        }

        function updateInputState() {
            const s = isGlobalMuted || myMuteStatus;
            const input = document.getElementById('msg-input');
            if (input) {
                input.disabled = s;
                input.placeholder = s ? "ВЫ В МУТЕ" : "Написать всем...";
            }
        }

        function toggleGlobalMute() {
            isGlobalMuted = !isGlobalMuted;
            systemChannel.send({ type: 'broadcast', event: 'admin-action', payload: { type: 'global_mute', val: isGlobalMuted } });
        }

        function toggleGlobalShake() {
            const s = document.body.classList.contains('shake');
            systemChannel.send({ type: 'broadcast', event: 'admin-action', payload: { type: 'shake', val: !s } });
        }

        window.muteUser = function(val) {
            const tidEl = document.getElementById('target-mute-id');
            const tid = tidEl ? tidEl.value.trim().toUpperCase() : "";
            if(!tid) return;
            systemChannel.send({ type: 'broadcast', event: 'admin-action', payload: { type: 'user_mute', targetId: tid, val: val } });
        };

        window.switchView = (v) => {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            const view = document.getElementById('view-'+v);
            if (view) view.classList.add('active');
            const navs = document.querySelectorAll('.nav-item');
            if (navs.length >= 2) {
                navs[v === 'chats' ? 0 : 1].classList.add('active');
            }
            if(v === 'chats') setTimeout(scrollToBottom, 50);
        };
    </script>
</body>
</html>
