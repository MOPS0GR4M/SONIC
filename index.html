<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | SUPREME CONTROL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #020202; --card: #0a0a0a; --accent: #ff6600; --text: #ffffff; 
            --text-dim: #777; --border: #151515; --bot: #00e5ff; --err: #ff3333;
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* АНИМАЦИЯ ПОЯВЛЕНИЯ СТРАНИЦ */
        .page { display: none; height: 100vh; width: 100vw; flex-direction: row; opacity: 0; transform: scale(1.1); }
        .active { display: flex; opacity: 1; transform: scale(1); }

        /* AUTH SCREEN */
        .auth-screen { width: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0f00, #000); }
        .auth-card { background: var(--card); border: 1px solid var(--border); padding: 50px; border-radius: 40px; width: 360px; text-align: center; box-shadow: 0 0 30px rgba(255,102,0,0.1); }
        .auth-card h1 { font-size: 28px; letter-spacing: 10px; color: var(--accent); margin-bottom: 30px; font-weight: 900; text-shadow: 0 0 15px rgba(255,102,0,0.5); }

        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .profile-area { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .user-avatar { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 12px; object-fit: cover; }
        .star-balance { font-size: 26px; font-weight: 900; color: var(--accent); margin-top: 8px; }

        .nav-btn { padding: 18px 30px; cursor: pointer; color: var(--text-dim); font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-left: 0 solid var(--accent); }
        .nav-btn:hover { color: var(--text); background: rgba(255,102,0,0.05); padding-left: 35px; }
        .nav-btn.active-tab { color: var(--accent); background: rgba(255,102,0,0.07); border-left: 4px solid var(--accent); }

        /* CHAT */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 20px; background: #0d0d0d; border: 1px solid var(--border); position: relative; animation: msgSlide 0.4s ease-out; }
        @keyframes msgSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-out { align-self: flex-end; border-color: #301b00; background: #150d00; }
        .msg-bot { align-self: center; border-color: var(--bot); color: var(--bot); text-align: center; width: 90%; background: rgba(0, 229, 255, 0.05); border-style: dashed; }
        
        .msg-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .msg b { color: var(--accent); cursor: pointer; font-size: 13px; }
        .del-btn { color: var(--err); cursor: pointer; font-weight: 900; font-size: 14px; opacity: 0.5; }
        .del-btn:hover { opacity: 1; transform: scale(1.2); }

        .input-bar { padding: 20px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        input { background: #050505; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(255,102,0,0.2); }
        .btn { padding: 14px 24px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 900; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,102,0,0.3); }
        .btn:active { transform: translateY(0); }

        /* OVERLAY */
        #p-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:1000; backdrop-filter: blur(5px); }
        .p-card { background:var(--card); border:1px solid var(--accent); padding:40px; border-radius:40px; text-align:center; min-width:300px; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 50px; background: var(--accent); color: #000; font-weight: bold; z-index: 9999; transition: 0.5s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="toast">SYSTEM READY</div>

    <div id="p-overlay" onclick="this.style.display='none'">
        <div class="p-card" onclick="event.stopPropagation()">
            <img id="p-img" class="user-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <h2 id="p-user" style="color:var(--accent); margin: 10px 0;"></h2>
            <div id="p-stars" style="font-size:24px; font-weight:900;"></div>
            <div id="p-nicks" style="margin-top:15px; font-size:12px; color:var(--text-dim); border-top: 1px solid var(--border); padding-top: 10px;"></div>
        </div>
    </div>

    <div id="auth-page" class="page active auth-screen">
        <div class="auth-card">
            <h1>MOPSOGRAM</h1>
            <input type="text" id="u-login" placeholder="ЛОГИН" style="margin-bottom: 10px;">
            <input type="password" id="u-pass" placeholder="ПАРОЛЬ">
            <button class="btn" style="width: 100%; margin-top: 20px;" onclick="auth()">OPEN GATE</button>
        </div>
    </div>

    <div id="main-page" class="page">
        <div class="sidebar">
            <div class="profile-area">
                <img class="user-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <div id="display-u" style="font-weight:800; font-size:18px; letter-spacing: 1px;">USER</div>
                <div id="display-s" class="star-balance">⭐ 0</div>
            </div>
            <div class="nav-btn active-tab" onclick="tab('chat', this)">💬 ЧАТ</div>
            <div class="nav-btn" onclick="tab('bank', this)">💰 БАНК</div>
            <div class="nav-btn" onclick="tab('frag', this)">💎 ФРАГМЕНТ</div>
        </div>

        <div id="tab-chat" class="main-content">
            <div id="chat-box"></div>
            <div class="input-bar">
                <input type="text" id="m-input" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()">SEND</button>
            </div>
        </div>

        <div id="tab-bank" class="main-content" style="display:none; padding:30px;">
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
                <h3 style="margin-top:0; color:var(--accent);">ПЕРЕВОД</h3>
                <input type="text" id="gift-to" placeholder="Логин получателя" style="margin-bottom:10px;">
                <input type="number" id="gift-amt" placeholder="Сумма ⭐">
                <button class="btn" style="width:100%; margin-top:15px;" onclick="transfer()">ОТПРАВИТЬ</button>
            </div>
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border); margin-top: 20px;">
                <h3 style="margin-top:0;">АКТИВАЦИЯ ЧЕКА</h3>
                <input type="text" id="check-code" placeholder="Введите код чека">
                <button class="btn" style="width:100%; background:#fff; color:#000; margin-top:15px;" onclick="redeem()">ЗАБРАТЬ ЗВЕЗДЫ</button>
            </div>
        </div>

        <div id="tab-frag" class="main-content" style="display:none; padding:30px;">
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
                <h3 style="margin-top:0; color:var(--accent);">MINT NFT NAME</h3>
                <input type="text" id="new-nick" placeholder="@username">
                <button class="btn" style="width:100%; margin-top:15px;" onclick="mint()">КУПИТЬ ИМЯ</button>
            </div>
            <div id="nick-list" style="margin-top:20px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        let user = null;

        async function auth() {
            const u = document.getElementById('u-login').value.trim();
            const p = document.getElementById('u-pass').value.trim();
            if(!u || !p) return notify("Заполни все поля!", "err");

            try {
                // 1. Пытаемся просто получить юзера
                let { data: existingUser, error: fetchError } = await client.from('users').select('*').eq('username', u).maybeSingle();
                
                if (fetchError) throw fetchError;

                if(!existingUser) {
                    // 2. Если нет - создаем (Регистрация)
                    const { data: newUser, error: regError } = await client.from('users').insert([{ username: u, password: p, stars: 1000 }]).select().single();
                    if (regError) throw regError;
                    user = newUser;
                    notify("Аккаунт создан!");
                } else {
                    // 3. Если есть - проверяем пароль
                    if(existingUser.password === p) {
                        user = existingUser;
                        notify("Вход выполнен!");
                    } else {
                        return notify("Неверный пароль!", "err");
                    }
                }
                
                if(user) start();
            } catch (err) {
                console.error(err);
                notify("Ошибка: " + err.message, "err");
            }
        }

        function start() {
            const authPage = document.getElementById('auth-page');
            const mainPage = document.getElementById('main-page');
            
            authPage.style.opacity = '0';
            setTimeout(() => {
                authPage.classList.remove('active');
                mainPage.classList.add('active');
                setTimeout(() => mainPage.style.opacity = '1', 50);
                updateUI(); loadMsgs(); loadNicks();
            }, 300);

            client.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
            client.channel('users').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `username=eq.${user.username}` }, (pl) => {
                user = pl.new; updateUI();
            }).subscribe();
        }

        function updateUI() {
            if(!user) return;
            document.getElementById('display-u').innerText = user.username;
            document.getElementById('display-s').innerText = `⭐ ${user.stars.toLocaleString()}`;
        }

        async function loadMsgs() {
            if(!user) return;
            const { data } = await client.from('messages').select('*').order('created_at', { ascending: true });
            const b = document.getElementById('chat-box'); 
            b.innerHTML = '';
            const isAdmin = user.username.toLowerCase() === 'admin';

            data?.forEach(m => {
                const isMe = m.username === user.username;
                const isBot = m.username.includes('BOT');
                b.innerHTML += `
                    <div class="msg ${isMe ? 'msg-out' : ''} ${isBot ? 'msg-bot' : ''}">
                        <div class="msg-top">
                            <b onclick="showProfile('${m.username}')">${m.username}</b>
                            ${isAdmin && !isBot ? `<span class="del-btn" onclick="deleteMsg(${m.id})">×</span>` : ''}
                        </div>
                        <div>${m.text}</div>
                    </div>`;
            });
            b.scrollTop = b.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('m-input');
            const val = i.value.trim();
            if(!val || !user) return;

            if(user.username.toLowerCase() === 'admin' && val.startsWith('!check')) {
                const p = val.split(' ');
                const amt = parseInt(p[1]) || 5000;
                const uses = parseInt(p[2]) || 1;
                const code = "GIFT-" + Math.random().toString(36).substring(2,8).toUpperCase();
                await client.from('checks').insert([{ code: code, amount: amt, uses_left: uses }]);
                await client.from('messages').insert([{ username: '🤖 MOPSO-BOT', text: `🎁 <b>АДМИН-ДРОП!</b><br>Код: <b style="color:#fff">${code}</b><br>Сумма: ⭐ ${amt}<br>Мест: ${uses}` }]);
                i.value = ''; return;
            }

            await client.from('messages').insert([{ username: user.username, text: val }]);
            i.value = '';
        }

        async function deleteMsg(id) { await client.from('messages').delete().eq('id', id); }

        async function transfer() {
            const to = document.getElementById('gift-to').value.trim();
            const amt = parseInt(document.getElementById('gift-amt').value);
            if(!amt || amt <= 0) return notify("Укажи сумму!", "err");
            if(user.stars < amt) return notify("Недостаточно звезд!", "err");
            
            const { data: rec } = await client.from('users').select('*').eq('username', to).maybeSingle();
            if(!rec) return notify("Получатель не найден!", "err");
            
            await client.from('users').update({ stars: user.stars - amt }).eq('username', user.username);
            await client.from('users').update({ stars: rec.stars + amt }).eq('username', to);
            notify("⭐ Переведено!");
        }

        async function redeem() {
            const c = document.getElementById('check-code').value.trim();
            const { data } = await client.from('checks').select('*').eq('code', c).maybeSingle();
            if(!data || data.uses_left <= 0) return notify("Чек недействителен!", "err");
            
            await client.from('users').update({ stars: user.stars + data.amount }).eq('username', user.username);
            await client.from('checks').update({ uses_left: data.uses_left - 1 }).eq('code', c);
            notify("⭐ Звезды получены!");
        }

        async function mint() {
            const n = document.getElementById('new-nick').value.trim();
            if(!n.startsWith('@')) return notify("Нужен @ в начале!", "err");
            const { error } = await client.from('fragment_market').insert([{ username_text: n, owner: user.username }]);
            if(error) return notify("Уже занято!", "err");
            notify("Имя куплено!"); loadNicks();
        }

        async function loadNicks() {
            const { data } = await client.from('fragment_market').select('*');
            const l = document.getElementById('nick-list'); l.innerHTML = '';
            data?.forEach(n => l.innerHTML += `
                <div style="padding:15px; background:#111; margin-bottom:10px; border-radius:15px; border:1px solid var(--border); animation: msgSlide 0.3s ease-out;">
                    <b style="color:var(--accent); font-size:16px;">${n.username_text}</b><br>
                    <small style="color:var(--text-dim)">Владелец: ${n.owner}</small>
                </div>`);
        }

        async function showProfile(name) {
            const { data: u } = await client.from('users').select('*').eq('username', name).maybeSingle();
            if(!u) return;
            document.getElementById('p-user').innerText = u.username;
            document.getElementById('p-stars').innerText = `⭐ ${u.stars.toLocaleString()}`;
            document.getElementById('p-overlay').style.display = 'flex';
        }

        function tab(t, el) {
            document.querySelectorAll('.main-content').forEach(v => {
                v.style.display = 'none';
                v.style.opacity = '0';
            });
            const target = document.getElementById('tab-'+t);
            target.style.display = 'flex';
            setTimeout(() => target.style.opacity = '1', 50);
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            el.classList.add('active-tab');
        }

        function notify(m, type="success") {
            const t = document.getElementById('toast');
            t.innerText = m; 
            t.style.background = type === "success" ? "var(--accent)" : "var(--err)";
            t.style.color = type === "success" ? "#000" : "#fff";
            t.style.top = "20px"; 
            setTimeout(() => t.style.top = "-100px", 3000);
        }
    </script>
</body>
</html>
