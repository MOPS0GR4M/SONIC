<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM 32.0 | REALTIME & AUCTION</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff9000; --bg: #000; --side: #0a0a0a; --chat: #050505; --brd: #1f1f1f; --text: #eee; --red: #ff3333; }
        * { box-sizing: border-box; outline: none; transition: 0.15s; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .btn { background: var(--p); border: none; padding: 14px; border-radius: 14px; font-weight: 900; cursor: pointer; color: #000; width: 100%; font-size: 12px; text-transform: uppercase; }
        input { background: #111; border: 1px solid var(--brd); padding: 14px; border-radius: 14px; color: #fff; width: 100%; margin-bottom: 12px; font-family: monospace; }
        
        #app { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; background: var(--chat); }

        /* Sidebar */
        .side-profile { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--brd); cursor: pointer; }
        .side-av { width: 80px; height: 80px; border-radius: 30px; border: 3px solid var(--p); margin-bottom: 10px; }
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 900; margin-right: 6px; }
        .badge-admin { background: var(--red); color: #fff; }
        .badge-user { background: #333; color: #888; }
        
        .nav-item { padding: 16px 25px; cursor: pointer; color: #444; font-weight: 800; font-size: 11px; }
        .nav-item.active { background: var(--p); color: #000; border-radius: 0 50px 50px 0; margin-right: 10px; }

        /* Chat */
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 14px 18px; border-radius: 20px; background: #111; border: 1px solid var(--brd); font-size: 14px; max-width: 80%; align-self: flex-start; }
        .me { align-self: flex-end; border-color: var(--p); background: #1a1300 !important; }

        /* Auction */
        .auc-card { background: #0d0d0d; border: 2px solid var(--p); border-radius: 30px; padding: 30px; text-align: center; margin: 20px; box-shadow: 0 0 30px rgba(255,144,0,0.1); }
        .auc-price { font-size: 48px; font-weight: 900; color: #00ff88; margin: 15px 0; font-family: 'Orbitron'; }

        #notify { position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-150px); background: var(--p); color: #000; padding: 14px 35px; border-radius: 50px; font-weight: 900; z-index: 10000; transition: 0.4s; }
    </style>
</head>
<body>

<div id="notify">SYSTEM_READY</div>

<div id="auth-scr" style="position:fixed; inset:0; background:#000; z-index:8000; display:flex; align-items:center; justify-content:center;">
    <div style="width:290px; text-align:center;">
        <h1 style="font-family:'Orbitron'; color:var(--p); letter-spacing:5px;">MOPSO</h1>
        <input type="text" id="log-u" placeholder="@username">
        <input type="password" id="log-p" placeholder="password">
        <button class="btn" onclick="login()">AUTHORIZE</button>
    </div>
</div>

<div id="app">
    <aside class="sidebar">
        <div class="side-profile">
            <img id="ui-av" class="side-av">
            <div id="ui-nick-box" style="font-weight:900; color:var(--p);"></div>
            <div id="ui-stars" style="font-size:18px; color:#00ff88; margin-top:5px; font-weight:900;">0 ⭐</div>
        </div>
        <nav style="flex:1;">
            <div class="nav-item active" onclick="setTab('chat', this)">📡 TERMINAL</div>
            <div class="nav-item" onclick="setTab('auc', this)">🔨 AUCTION</div>
            <div class="nav-item" onclick="setTab('bank', this)">🏦 VAULT</div>
            <div id="ui-admin-nav" class="nav-item" style="display:none; color:var(--red);" onclick="setTab('admin', this)">⚡ ROOT</div>
        </nav>
        <div style="padding:20px;"><button class="btn" style="background:#111; color:#333;" onclick="location.reload()">RE-BOOT</button></div>
    </aside>

    <main class="viewport">
        <div id="tab-chat" class="tab" style="display:flex; flex-direction:column; height:100%;">
            <div id="chat-box"></div>
            <div style="padding:20px; background:var(--side); display:flex; gap:12px; border-top:1px solid var(--brd);">
                <input type="text" id="msg-i" placeholder="Message..." style="margin:0;" onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()" style="width:70px;">➔</button>
            </div>
        </div>

        <div id="tab-auc" class="tab" style="display:none; padding:40px;">
            <h1 style="font-family:'Orbitron'; color:var(--p);">MARKET_AUCTION</h1>
            <div class="auc-card">
                <h3 id="auc-item" style="margin:0; opacity:0.5;">ЛОТ: @GOLDEN_USER</h3>
                <div id="auc-price" class="auc-price">0 ⭐</div>
                <p id="auc-bidder" style="color:var(--p); font-weight:900;">Лидер: Система</p>
                <input type="number" id="bid-i" placeholder="Ваша ставка...">
                <button class="btn" onclick="placeBid()">ПОДНЯТЬ СТАВКУ</button>
            </div>
            <p style="font-size:10px; color:#444; text-align:center;">* Смена ника после победы — бесплатная</p>
        </div>

        <div id="tab-bank" class="tab" style="display:none; padding:40px;">
            <h1>STAR_BANK</h1>
            <input type="text" id="check-i" placeholder="MOPSO_SONIX_XXXX">
            <button class="btn" onclick="redeem()">ACTIVATE CHECK</button>
        </div>

        <div id="tab-admin" class="tab" style="display:none; padding:40px;">
            <h1 style="color:var(--red);">ROOT_TERMINAL</h1>
            <button class="btn" onclick="genAdminCheck()">GENERATE 50K STARS</button>
            <div id="gen-res" style="margin:20px 0; font-family:monospace; color:var(--p);"></div>
            <button class="btn btn-red" onclick="clearChat()">WIPE ALL MESSAGES</button>
        </div>
    </main>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);

    let currUser = null;

    async function login() {
        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value.trim();
        if(!u) return;
        const nick = u.startsWith('@') ? u : '@' + u;

        let { data: user } = await sb.from('users').select('*').eq('username', nick).maybeSingle();
        
        if (!user) {
            const { data: n } = await sb.from('users').insert([{ username: nick, password: p, stars: 1000, role: nick === '@admin' ? 'admin' : 'user' }]).select().single();
            currUser = n;
        } else {
            if(user.password !== p) return toast("WRONG PASS", "#ff3333");
            currUser = user;
        }

        document.getElementById('auth-scr').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if(currUser.role === 'admin') document.getElementById('ui-admin-nav').style.display = 'block';
        
        initRealtime();
        loadChat();
        updateAuctionUI();
    }

    function initRealtime() {
        // Слушаем сообщения
        sb.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            addMessageToUI(payload.new);
        }).on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, () => {
            document.getElementById('chat-box').innerHTML = '';
        }).subscribe();

        // Слушаем изменения пользователя (звезды, ник)
        sb.channel('public:users').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${currUser.id}` }, payload => {
            currUser = payload.new;
            updateUI();
        }).subscribe();

        // Слушаем аукцион
        sb.channel('public:auction').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'auction' }, payload => {
            updateAuctionUI(payload.new);
        }).subscribe();
    }

    async function loadChat() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true }).limit(50);
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        msgs?.forEach(addMessageToUI);
    }

    function addMessageToUI(m) {
        const box = document.getElementById('chat-box');
        const isMe = m.username === currUser.username;
        const isAdmin = m.username === '@admin';
        box.innerHTML += `
            <div class="bubble ${isMe ? 'me' : ''}">
                <div style="font-size:10px; font-weight:900; color:var(--p); margin-bottom:5px;">
                    <span class="badge ${isAdmin ? 'badge-admin' : 'badge-user'}">${isAdmin ? 'SYSTEM' : 'USER'}</span>
                    ${m.username}
                </div>
                ${m.text}
            </div>`;
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msg-i');
        if(!i.value.trim()) return;
        await sb.from('messages').insert({ username: currUser.username, text: i.value });
        i.value = '';
    }

    async function placeBid() {
        const amount = parseInt(document.getElementById('bid-i').value);
        const { data: auc } = await sb.from('auction').select('*').eq('id', 1).single();
        
        if(amount <= auc.current_bid) return toast("СТАВКА СЛИШКОМ НИЗКАЯ", "#ff3333");
        if(currUser.stars < amount) return toast("НЕДОСТАТОЧНО ЗВЕЗД", "#ff3333");

        // Снимаем звезды у юзера и обновляем аукцион
        await sb.from('users').update({ stars: currUser.stars - amount }).eq('id', currUser.id);
        await sb.from('auction').update({ current_bid: amount, bidder_name: currUser.username }).eq('id', 1);
        toast("СТАВКА ПРИНЯТА!");
    }

    async function updateAuctionUI(data = null) {
        if(!data) {
            const { data: auc } = await sb.from('auction').select('*').eq('id', 1).single();
            data = auc;
        }
        document.getElementById('auc-item').innerText = "ЛОТ: " + data.item_name;
        document.getElementById('auc-price').innerText = data.current_bid.toLocaleString() + " ⭐";
        document.getElementById('auc-bidder').innerText = "Лидер: " + data.bidder_name;
    }

    async function redeem() {
        const code = document.getElementById('check-i').value.trim();
        const { data: c } = await sb.from('checks').select('*').eq('code', code).eq('is_used', false).maybeSingle();
        if(!c) return toast("ЧЕК НЕВЕРЕН", "#ff3333");
        await sb.from('checks').update({ is_used: true }).eq('id', c.id);
        await sb.from('users').update({ stars: currUser.stars + c.amount }).eq('id', currUser.id);
        toast("УСПЕШНО АКТИВИРОВАНО");
    }

    async function genAdminCheck() {
        const code = "MOPSO_" + Math.random().toString(36).substr(2, 9).toUpperCase();
        await sb.from('checks').insert({ code, amount: 50000 });
        document.getElementById('gen-res').innerText = code;
    }

    async function clearChat() {
        await sb.from('messages').delete().neq('id', 0);
        toast("ЧАТ ОЧИЩЕН");
    }

    function updateUI() {
        const isAdmin = currUser.role === 'admin';
        document.getElementById('ui-nick-box').innerHTML = `
            <span class="badge ${isAdmin ? 'badge-admin' : 'badge-user'}">${isAdmin ? 'SYSTEM' : 'USER'}</span>
            ${currUser.username}`;
        document.getElementById('ui-stars').innerText = currUser.stars.toLocaleString() + " ⭐";
        document.getElementById('ui-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${currUser.username}`;
    }

    function setTab(t, el) {
        document.querySelectorAll('.tab').forEach(x => x.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-' + t).style.display = (t === 'chat' ? 'flex' : 'block');
        el.classList.add('active');
    }

    function toast(m, bg = "#ff9000") {
        const t = document.getElementById('notify');
        t.innerText = m; t.style.background = bg;
        t.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => t.style.transform = "translateX(-50%) translateY(-150px)", 3000);
    }
</script>
</body>
</html>
