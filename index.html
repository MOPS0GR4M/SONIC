<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mopsogram X - NFT & Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#0b0b0b;color:#fff;}
.auth{display:flex;height:100vh;justify-content:center;align-items:center;}
.auth-box{background:#111;padding:30px;border-radius:20px;box-shadow:0 0 50px rgba(255,140,0,0.4);width:320px;}
.auth-box h2{text-align:center;color:orange;}
.auth-box input{width:100%;margin-top:10px;padding:12px;border:none;border-radius:12px;background:#1a1a1a;color:white;}
.auth-box button{width:100%;margin-top:12px;padding:12px;background:linear-gradient(45deg,orange,#ff6a00);border:none;border-radius:12px;cursor:pointer;font-weight:bold;}
.app{display:none;}
.sidebar{width:320px;height:100vh;background:#0f0f0f;position:fixed;border-right:1px solid #222;overflow:auto;}
.logo{padding:20px;font-size:22px;text-align:center;color:orange;font-weight:bold;}
.profile{padding:15px;border-bottom:1px solid #222;}
.username{color:orange;font-weight:bold;}
.subuser{font-size:12px;color:#aaa;}
.section{padding:12px;border-bottom:1px solid #222;}
.market-item{background:#1a1a1a;border:1px solid orange;border-radius:12px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.btn{background:orange;border:none;border-radius:10px;padding:6px 10px;cursor:pointer;color:#000;font-weight:bold;}
.main{margin-left:320px;display:flex;flex-direction:column;height:100vh;}
.topbar{padding:12px;background:#0f0f0f;border-bottom:1px solid #222;display:flex;justify-content:space-between;}
.messages{flex:1;padding:20px;overflow:auto;display:flex;flex-direction:column;}
.msg{max-width:60%;padding:10px 14px;border-radius:16px;margin-bottom:10px;animation:fadeIn 0.3s;}
.me{background:orange;align-self:flex-end;color:black;}
.other{background:#1a1a1a;align-self:flex-start;}
.input{display:flex;padding:10px;background:#0f0f0f;}
.input input{flex:1;padding:12px;border-radius:20px;border:none;background:#1a1a1a;color:white;}
.input button{margin-left:10px;background:orange;border:none;padding:10px 15px;border-radius:50%;}
.balance{color:orange;font-weight:bold;}
.admin-section{padding:12px;border-top:1px solid #222;margin-top:10px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="auth" id="auth">
  <div class="auth-box">
    <h2>🔥 Mopsogram</h2>
    <input id="email" placeholder="Email">
    <input id="code" placeholder="Код">
    <input id="username" placeholder="@username">
    <button onclick="sendCode()">Получить код</button>
    <button onclick="verifyCode()">Войти</button>
  </div>
</div>

<div class="app" id="app">
<div class="sidebar">
  <div class="logo">Mopsogram</div>

  <div class="profile">
    <div class="username" id="mainUsername"></div>
    <div class="subuser" id="subUsernames"></div>
    <div class="balance">⭐ <span id="stars">0</span></div>
  </div>

  <!-- NFT USERNAME MARKET -->
  <div class="section">
    <b style="color:orange;">NFT USERNAMES</b>
    <div id="market"></div>
  </div>

  <!-- PROMO / CHECKS -->
  <div class="section">
    <b style="color:orange;">ПРОМО КОД</b>
    <input id="promo" placeholder="ввести код">
    <button class="btn" onclick="redeemCode()">Активировать</button>
  </div>

  <!-- ADMIN SPAWN CHECKS -->
  <div class="admin-section">
    <b style="color:red;">Админ: Спавн чеков</b>
    <input id="adminCode" placeholder="ввести админ код">
    <button class="btn" onclick="spawnStars()">Добавить звезды</button>
  </div>

</div>

<div class="main">
<div class="topbar">
  <div>Чат</div>
  <button onclick="logout()">Выйти</button>
</div>

<div class="messages" id="messages"></div>

<div class="input">
  <input id="msg" placeholder="Сообщение">
  <button onclick="sendMessage()">➤</button>
</div>
</div>
</div>

<script>
if (!window.sbClient) {
  window.sbClient = window.supabase.createClient(
    "https://obqwgeusngfpboklrwob.supabase.co",
    "sb_publishable_y5BsczI_vrBaouWNyS-kFg_vQ1FEUhE"
  );
}

var supabase = window.sbClient;
let currentUser=null, profile=null;

async function sendCode(){
  const { error } = await supabase.auth.signInWithOtp({ email: val('email') });
  if(error) return alert(error.message);
  alert('код отправлен');
}

async function verifyCode(){
  const { data, error } = await supabase.auth.verifyOtp({
    email: val('email'), token: val('code'), type:'email'
  });
  if(error) return alert(error.message);

  currentUser = data.user;

  await supabase.from('profiles').upsert({
    id: currentUser.id,
    username: val('username'),
    extra_usernames: [],
    stars: 0
  });

  startApp();
}

async function loadProfile(){
  const { data } = await supabase.from('profiles').select('*').eq('id',currentUser.id).single();
  profile=data;

  mainUsername.innerText='@'+profile.username;
  subUsernames.innerText=(profile.extra_usernames||[]).map(u=>'@'+u).join(' ');
  stars.innerText=profile.stars||0;
}

async function loadMarket(){
  const { data } = await supabase.from('usernames_market').select('*');
  market.innerHTML='';

  data.forEach(item=>{
    const div=document.createElement('div');
    div.className='market-item';
    div.innerHTML=`@${item.username} <button class='btn'>${item.price}⭐</button>`;

    div.querySelector('button').onclick=()=>buyUsername(item);
    market.appendChild(div);
  });
}

async function buyUsername(item){
  if(profile.stars < item.price) return alert('не хватает звезд');

  const newExtras=[...(profile.extra_usernames||[]), item.username];

  await supabase.from('profiles').update({
    extra_usernames:newExtras,
    stars: profile.stars - item.price
  }).eq('id', currentUser.id);

  alert('куплено 🔥');
  loadProfile();
}

async function redeemCode(){
  const code = val('promo');

  const { data } = await supabase.from('promo_codes').select('*').eq('code',code).single();

  if(!data) return alert('код не найден');

  await supabase.from('profiles').update({
    stars: profile.stars + data.stars
  }).eq('id', currentUser.id);

  alert('получено '+data.stars+'⭐');
  loadProfile();
}

async function spawnStars(){
  const code = val('adminCode');
  // админский код, который можно ввести для начисления звезд
  const ADMIN_SECRET = 'SUPERADMIN123';
  if(code !== ADMIN_SECRET) return alert('неверный админ код');

  await supabase.from('profiles').update({
    stars: profile.stars + 100
  }).eq('id', currentUser.id);

  alert('Вы получили 100⭐ как админ!');
  loadProfile();
}

async function startApp(){
  auth.style.display='none';
  app.style.display='block';
  await loadProfile();
  await loadMarket();
  loadMessages();
}

async function sendMessage(){
  if(!msg.value) return;
  await supabase.from('messages').insert([{ text:msg.value, user:profile.username }]);
  msg.value='';
}

async function loadMessages(){
  const { data } = await supabase.from('messages').select('*');
  messages.innerHTML='';
  data.forEach(m=>{
    const div=document.createElement('div');
    div.className='msg '+(m.user===profile.username?'me':'other');
    div.innerHTML=`<b>@${m.user}</b><br>${m.text}`;
    messages.appendChild(div);
  });
  messages.scrollTop=messages.scrollHeight;
}

function logout(){ supabase.auth.signOut(); location.reload(); }
function val(id){return document.getElementById(id).value;}

supabase.channel('realtime')
.on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>loadMessages())
.subscribe();

</script>

</body>
</html>
