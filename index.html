<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOPSOGRAMA v1.0 - TOP SECRET</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Comic Sans MS', cursive; cursor: crosshair; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        /* Mopsograma Boot Screen */
        #boot-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; color: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
        }
        .mops-logo { font-size: 100px; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* General Loader */
        #loader { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: #f0f; display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000;
        }
        .progress-bar { width: 80%; max-width: 600px; height: 40px; border: 6px solid #f0f; position: relative; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: repeating-linear-gradient(45deg, #f0f, #f0f 10px, #0ff 10px, #0ff 20px); }
        
        /* Extreme Distortion */
        .insane-mode { animation: flash 0.05s infinite, shake 0.1s infinite; }
        @keyframes flash { 0% { background: #ff00ff; } 50% { background: #00ffff; } 100% { background: #ffff00; } }
        @keyframes shake {
            0% { filter: contrast(200%) invert(0); transform: translate(2px, 2px); }
            50% { filter: contrast(500%) invert(1); transform: translate(-2px, -2px); }
            100% { filter: contrast(200%) invert(0); transform: translate(2px, -2px); }
        }

        #bsod {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0000ff; color: #fff; padding: 50px; display: none; z-index: 3000;
            font-family: 'Courier New', monospace;
        }

        .score-ui { position: absolute; top: 5%; width: 100%; text-align: center; color: yellow; font-size: 80px; font-weight: 900; display: none; z-index: 500; }
        
        .crazy-text {
            position: absolute; color: white; font-weight: bold; pointer-events: none;
            white-space: nowrap; z-index: 600; text-shadow: 2px 2px #ff0000;
        }
    </style>
</head>
<body>

    <div id="boot-screen">
        <div class="mops-logo">🐶</div>
        <div style="font-size: 24px; letter-spacing: 10px;">MOPSOGRAMA 1.0</div>
        <div style="margin-top: 20px; font-family: monospace;">SYSTEM BOOT IN PROGRESS...</div>
        <div id="boot-log" style="font-size: 10px; opacity: 0.5; margin-top: 20px;"></div>
    </div>

    <div id="loader">
        <div style="font-size: 50px; text-shadow: 5px 5px #000;">ГИПЕР-ЗАГРУЗКА 9000</div>
        <div id="log-container" style="height: 150px; overflow: hidden; width: 80%; margin-top: 20px; color: #0f0; background: #222; padding: 10px;"></div>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <div id="percent" style="font-size: 60px;">0%</div>
    </div>

    <div id="bsod">
        <div style="font-size: 100px;">:(</div>
        <h1>ВАШ МОПС СЛИШКОМ МОЩНЫЙ</h1>
        <p>Система не выдержала уровня милоты и неадекватности.</p>
        <p>Код ошибки: MOPS_OVERLOAD_MAX_LEVEL</p>
        <marquee direction="right">🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴🐶🦴</marquee>
    </div>

    <div id="ui-layer">
        <div class="score-ui" id="score">УРОВЕНЬ ШИЗЫ: 0</div>
    </div>

    <script>
        let scene, camera, renderer, plane, clowns = [], junk = [];
        let isClownMode = false;
        let score = 0;
        let clock = new THREE.Clock();
        let audioCtx, osc, gain;

        const bootLogs = [
            "Кормим мопса...", "Чешем за ушком...", "Проверяем запасы косточек...", 
            "Удаляем папку 'Коты'...", "Заряжаем гавкалку...", "Анализируем хвост..."
        ];

        const crazyPhrases = [
            "ГДЕ ТАПКИ?", "КУПИ КОРМ!", "ГАВ!", "Я ТУТ ГЛАВНЫЙ", "КЛОУНЫ ПОВСЮДУ", 
            "100% НАТУРАЛЬНО", "МММ КАША", "ВЫХОДА НЕТ", "АПРЕЛЬСКИЙ РОФЛ"
        ];

        async function startBoot() {
            const bootLog = document.getElementById('boot-log');
            for(let i=0; i<bootLogs.length; i++) {
                await new Promise(r => setTimeout(r, 400));
                bootLog.innerText += "\n> " + bootLogs[i];
            }
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('loader').style.display = 'flex';
                runMainLoader();
            }, 500);
        }

        async function runMainLoader() {
            const fill = document.getElementById('fill');
            const percent = document.getElementById('percent');
            const logBox = document.getElementById('log-container');

            for (let i = 0; i <= 100; i++) {
                let delay = i === 99 ? 3000 : (i > 80 ? 100 : 20);
                await new Promise(r => setTimeout(r, delay));
                fill.style.width = i + '%';
                percent.innerText = i + '%';
                
                if (i % 3 === 0) {
                    const l = document.createElement('div');
                    l.innerText = `[INFO] Синхронизация с астралом: ${Math.random()}`;
                    logBox.prepend(l);
                }

                if (i === 100) {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('bsod').style.display = 'block';
                    setTimeout(activateMadness, 2000);
                }
            }
        }

        function activateMadness() {
            document.getElementById('bsod').style.display = 'none';
            document.body.classList.add('insane-mode');
            document.getElementById('score').style.display = 'block';
            isClownMode = true;
            initAudio();
            init3D();
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            osc = audioCtx.createOscillator();
            gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.value = 0.02;
            osc.start();

            setInterval(() => {
                if(!isClownMode) return;
                osc.frequency.setTargetAtTime(100 + Math.random() * 1000, audioCtx.currentTime, 0.05);
                if(Math.random() > 0.8) spawnCrazyText();
            }, 100);
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Самолет (теперь это просто светящийся куб хаоса)
            plane = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshPhongMaterial({ color: 0xffffff, wireframe: true }));
            scene.add(plane);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            camera.position.z = 10;
            animate();
        }

        function spawnCrazyText() {
            const t = document.createElement('div');
            t.className = 'crazy-text';
            t.innerText = crazyPhrases[Math.floor(Math.random() * crazyPhrases.length)];
            t.style.left = Math.random() * 90 + 'vw';
            t.style.top = Math.random() * 90 + 'vh';
            t.style.fontSize = (Math.random() * 50 + 20) + 'px';
            t.style.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1000);
        }

        function spawnObject() {
            const geo = Math.random() > 0.5 ? new THREE.SphereGeometry(1, 4, 4) : new THREE.TorusGeometry(1, 0.5, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff, wireframe: Math.random() > 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(Math.random()*40-20, Math.random()*20-10, -100);
            scene.add(mesh);
            clowns.push(mesh);
        }

        let mx = 0, my = 0;
        window.addEventListener('mousemove', (e) => {
            mx = (e.clientX / window.innerWidth) * 2 - 1;
            my = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);
            let d = clock.getDelta();

            if (isClownMode) {
                // Тряска камеры
                camera.position.x = Math.sin(Date.now() * 0.1) * 2;
                camera.position.y = Math.cos(Date.now() * 0.1) * 2;
                camera.rotation.z += 0.05;

                plane.position.x += (mx * 25 - plane.position.x) * 0.1;
                plane.position.y += (my * 15 - plane.position.y) * 0.1;
                plane.rotation.x += 0.2;
                plane.rotation.y += 0.2;

                // Случайные объекты
                if(Math.random() < 0.2) spawnObject();

                clowns.forEach((c, i) => {
                    c.position.z += 50 * d * 5;
                    c.rotation.x += 0.1;
                    if (c.position.distanceTo(plane.position) < 3) {
                        score += 777;
                        document.getElementById('score').innerText = "ШИЗА: " + score;
                        scene.remove(c);
                        clowns.splice(i, 1);
                    }
                    if(c.position.z > 20) {
                        scene.remove(c);
                        clowns.splice(i, 1);
                    }
                });

                // Фон
                renderer.setClearColor(`hsl(${Date.now() % 360}, 100%, 50%)`);
            }
            renderer.render(scene, camera);
        }

        window.onload = startBoot;
        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
