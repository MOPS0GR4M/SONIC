<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MopsoGram Recode | Secure Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary: #FF6B00;
            --primary-glow: rgba(255, 107, 0, 0.3);
            --bg-main: #0A0A0A;
            --bg-side: #111111;
        }

        .theme-purple { --primary: #A855F7; --primary-glow: rgba(168, 85, 247, 0.3); }
        .theme-green { --primary: #22C55E; --primary-glow: rgba(34, 197, 94, 0.3); }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #FFFFFF;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        .mopso-gradient { background: linear-gradient(135deg, var(--primary) 0%, #000000 150%); }

        #messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 15px;
            scroll-behavior: smooth;
        }

        .scrollbar-hide::-webkit-scrollbar { width: 4px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .message-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 38px; height: 38px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; background: var(--primary); color: black;
            box-shadow: 0 4px 10px var(--primary-glow);
        }

        .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        
        #auth-screen, #settings-modal { transition: opacity 0.3s ease; }

        .msg-link {
            color: inherit;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 2px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .msg-link:hover { opacity: 1; }

        .user-item { transition: all 0.2s; cursor: pointer; border: 1px solid transparent; position: relative; }
        .user-item:hover { background: rgba(255,255,255,0.05); }
        .user-item.active { background: var(--primary-glow); border-color: var(--primary); }

        .notification-badge {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: black;
            font-size: 10px;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 20px;
            box-shadow: 0 0 10px var(--primary-glow);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.1); }
            100% { transform: translateY(-50%) scale(1); }
        }

        /* Mobile Sidebar Logic */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                z-index: 50;
                transition: left 0.3s ease;
                width: 80%;
                max-width: 300px;
            }
            #sidebar.open { left: 0; }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                backdrop-filter: blur(4px);
                z-index: 40;
            }
            .sidebar-overlay.open { display: block; }
        }
    </style>
</head>
<body class="flex h-screen">

    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar(false)"></div>

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#0A0A0A] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#141414] border border-white/5 rounded-[2.5rem] p-6 md:p-8 shadow-2xl text-center">
            <div class="w-16 h-16 md:w-20 md:h-20 mopso-gradient rounded-2xl mx-auto flex items-center justify-center mb-6">
                <i data-lucide="shield-check" class="w-8 h-8 md:w-10 md:h-10 text-white"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-black italic mb-2 tracking-tighter">MOPSOGRAM <span class="text-[var(--primary)]">RECODE</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-8">DEVICE ID: <span id="hw-id" class="text-white">...</span></p>
            
            <div class="space-y-3 mb-6">
                <div class="relative">
                    <input id="nick-input" type="text" maxlength="10" placeholder="НИКНЕЙМ (MAX 10)" class="w-full bg-[#1F1F1F] border border-transparent focus:border-[var(--primary)] text-white rounded-xl p-4 outline-none text-center font-bold uppercase transition-all">
                    <span id="nick-counter" class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-gray-600 font-bold">0/10</span>
                </div>
                <input id="pass-input" type="password" placeholder="ПИН-КОД" class="w-full bg-[#1F1F1F] border border-transparent focus:border-[var(--primary)] text-white rounded-xl p-4 outline-none text-center font-bold tracking-[0.5em] transition-all">
            </div>

            <button id="auth-btn" onclick="handleLogin()" class="w-full bg-[var(--primary)] text-black font-black p-4 rounded-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg">
                <span id="btn-text">ПОДКЛЮЧИТЬСЯ</span>
                <i data-lucide="zap" class="w-5 h-5"></i>
            </button>
            <p id="auth-error" class="text-red-500 text-[10px] font-bold mt-4 uppercase hidden px-4"></p>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 z-[150] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="w-full max-w-sm bg-[#141414] border border-white/10 rounded-3xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black italic text-xl tracking-tighter">НАСТРОЙКИ</h2>
                <button onclick="toggleSettings(false)" class="text-gray-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-3">Цветовая схема</label>
                    <div class="flex gap-3">
                        <button onclick="setTheme('orange')" class="w-8 h-8 rounded-full bg-[#FF6B00] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                        <button onclick="setTheme('purple')" class="w-8 h-8 rounded-full bg-[#A855F7] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                        <button onclick="setTheme('green')" class="w-8 h-8 rounded-full bg-[#22C55E] border-2 border-white/20 hover:scale-110 transition-transform"></button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-3">Изменить ПИН-код</label>
                    <div class="space-y-2">
                        <input id="new-pin" type="password" placeholder="НОВЫЙ ПИН" class="w-full bg-[#1F1F1F] border border-white/5 text-white rounded-xl p-3 outline-none text-center text-sm font-bold tracking-widest">
                        <button onclick="changePassword()" class="w-full bg-white/5 hover:bg-white/10 text-white font-bold p-3 rounded-xl transition-all text-xs uppercase text-center">Обновить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-[var(--bg-side)] border-r border-white/5 flex flex-col hidden shrink-0">
        <div class="p-6 font-black italic text-lg tracking-tighter border-b border-white/5 flex justify-between items-center">
            <span>СЕТЬ</span>
            <button onclick="toggleSettings(true)" class="text-gray-600 hover:text-white transition-colors">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-3 space-y-2 scrollbar-hide">
            <div id="global-hub-btn" onclick="selectChat(null)" class="user-item bg-white/5 p-3 rounded-xl border border-[var(--primary)]/30 flex items-center gap-3 active">
                <div class="avatar">G</div>
                <div class="flex-1">
                    <div class="text-sm font-bold">Глобальный узел</div>
                    <div class="text-[9px] text-green-500 font-black flex items-center gap-1">ONLINE</div>
                </div>
            </div>

            <div class="pt-4 pb-2 px-2 text-[10px] font-bold text-gray-600 uppercase tracking-widest">Личные сообщения</div>
            <div id="users-list" class="space-y-1"></div>
        </div>

        <div class="p-4 border-t border-white/5 bg-black/20 flex items-center gap-3">
            <div id="my-avatar" class="avatar shrink-0">?</div>
            <div class="flex-1 overflow-hidden">
                <p id="my-name" class="font-bold text-sm truncate uppercase italic">User</p>
                <p class="text-[8px] text-gray-500 font-bold">NODE_ACTIVE</p>
            </div>
            <button onclick="window.location.reload()" class="text-gray-600 hover:text-red-500 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="app-content" class="flex-1 flex flex-col h-full overflow-hidden bg-[#0D0D0D] hidden">
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-4 md:px-6 bg-[#0D0D0D]/80 backdrop-blur-md z-10 shrink-0">
            <div class="flex items-center gap-3">
                <button id="mobile-menu-btn" onclick="toggleSidebar(true)" class="md:hidden text-gray-400 p-2"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <div id="chat-header-avatar" class="avatar scale-75">G</div>
                <div>
                    <h3 class="font-black italic text-sm tracking-tighter uppercase leading-none" id="display-node">GLOBAL_HUB</h3>
                    <p id="chat-status" class="text-[8px] text-[var(--primary)] font-bold uppercase tracking-widest mt-1">E2E ENCRYPTED</p>
                </div>
            </div>
            <div class="md:hidden">
                <button onclick="toggleSettings(true)" class="text-gray-600 p-2"><i data-lucide="settings" class="w-5 h-5"></i></button>
            </div>
        </header>

        <div id="messages-container" class="scrollbar-hide"></div>

        <div class="p-3 md:p-4 bg-[#0A0A0A] border-t border-white/5 shrink-0">
            <form id="message-form" class="max-w-4xl mx-auto flex items-center gap-2 bg-[#161616] p-1.5 rounded-2xl border border-white/5 shadow-2xl">
                <input id="message-input" type="text" placeholder="Введите сообщение..." class="flex-1 bg-transparent border-none outline-none px-4 text-sm text-white py-2" autocomplete="off">
                <button id="send-btn" type="submit" class="bg-[var(--primary)] text-black p-3 rounded-xl shadow-lg hover:scale-105 active:scale-95 transition-all">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
            <p id="spam-warning" class="text-[8px] text-center text-red-500 font-bold mt-2 uppercase hidden">Подождите 3 секунды...</p>
        </div>
    </main>

    <script>
        // Supabase Initialization
        const supabaseUrl = 'https://obqwgeusngfpboklrwob.supabase.co';
        const supabaseKey = 'sb_publishable_y5BsczI_vrBaouWNyS-kFg_vQ1FEUhE';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let myNick = '';
        let currentReceiver = null;
        let processedIds = new Set();
        let lastMessageTime = 0;
        let unreadCounts = {}; 
        const SPAM_DELAY = 3000;

        const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

        // Nickname handling
        const nickInput = document.getElementById('nick-input');
        const nickCounter = document.getElementById('nick-counter');

        nickInput.addEventListener('input', (e) => {
            const val = e.target.value;
            nickCounter.innerText = `${val.length}/10`;
        });

        function toggleSidebar(open) {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (open) {
                sb.classList.add('open');
                sb.classList.remove('hidden');
                overlay.classList.add('open');
            } else {
                sb.classList.remove('open');
                overlay.classList.remove('open');
                if (window.innerWidth < 768) {
                    setTimeout(() => sb.classList.add('hidden'), 300);
                }
            }
        }

        window.addEventListener('resize', () => {
            const sb = document.getElementById('sidebar');
            if (window.innerWidth >= 768) {
                sb.classList.remove('hidden');
                sb.classList.remove('open');
                document.getElementById('sidebar-overlay').classList.remove('open');
            } else if (!sb.classList.contains('open')) {
                sb.classList.add('hidden');
            }
        });

        function formatText(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer" class="msg-link">${url}</a>`);
        }

        function getDeviceHash() {
            const data = [navigator.userAgent, screen.width, screen.height, navigator.language].join('|');
            let hash = 0;
            for (let i = 0; i < data.length; i++) {
                hash = ((hash << 5) - hash) + data.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16).toUpperCase();
        }

        document.getElementById('hw-id').innerText = getDeviceHash();

        async function handleLogin() {
            const nick = nickInput.value.trim().toLowerCase();
            const pin = document.getElementById('pass-input').value.trim();
            const errEl = document.getElementById('auth-error');
            const authBtn = document.getElementById('auth-btn');
            const dHash = getDeviceHash();
            const isAdmin = (nick === 'admin');

            if (!nick || !pin) {
                errEl.innerText = "УКАЖИТЕ НИК И ПИН";
                errEl.classList.remove('hidden');
                return;
            }

            errEl.classList.add('hidden');
            authBtn.classList.add('btn-disabled');

            try {
                let { data: user } = await supabaseClient
                    .from('mopsogram_users')
                    .select('*')
                    .eq('username', nick)
                    .maybeSingle();

                if (user) {
                    if (user.pin_code !== pin) throw new Error("НЕВЕРНЫЙ ПИН-КОД");
                    if (!isAdmin && user.device_hash !== dHash) throw new Error("ПРИВЯЗАНО К ДРУГОМУ УСТРОЙСТВУ");
                } else {
                    if (!isAdmin) {
                        const { data: dRec } = await supabaseClient.from('mopsogram_users').select('username').eq('device_hash', dHash).maybeSingle();
                        if (dRec) throw new Error(`У ВАС УЖЕ ЕСТЬ АККАУНТ: ${dRec.username.toUpperCase()}`);
                    }
                    await supabaseClient.from('mopsogram_users').insert([{ username: nick, pin_code: pin, device_hash: isAdmin ? null : dHash }]);
                }

                await supabaseClient.auth.signInAnonymously();
                myNick = nick;

                document.getElementById('auth-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app-content').classList.remove('hidden');
                    if (window.innerWidth >= 768) {
                        document.getElementById('sidebar').classList.remove('hidden');
                    }
                }, 300);

                document.getElementById('my-name').innerText = myNick;
                document.getElementById('my-avatar').innerText = myNick[0].toUpperCase();
                
                startSystem();
            } catch (e) {
                errEl.innerText = e.message.toUpperCase();
                errEl.classList.remove('hidden');
            } finally {
                authBtn.classList.remove('btn-disabled');
            }
        }

        function startSystem() {
            fetchMessages();
            fetchUsers();
            setInterval(fetchMessages, 2500);
            setInterval(fetchUsers, 10000);
        }

        async function fetchUsers() {
            const { data } = await supabaseClient.from('mopsogram_users').select('username');
            if (data) {
                const list = document.getElementById('users-list');
                list.innerHTML = '';
                data.filter(u => u.username !== myNick).forEach(user => {
                    const unread = unreadCounts[user.username] || 0;
                    const div = document.createElement('div');
                    div.className = `user-item p-3 rounded-xl border border-white/5 flex items-center gap-3 ${currentReceiver === user.username ? 'active' : ''}`;
                    div.onclick = () => { selectChat(user.username); toggleSidebar(false); };
                    div.innerHTML = `
                        <div class="avatar scale-75">${user.username[0].toUpperCase()}</div>
                        <div class="text-sm font-bold truncate">${user.username}</div>
                        ${unread > 0 ? `<div class="notification-badge">${unread}</div>` : ''}
                    `;
                    list.appendChild(div);
                });
            }
        }

        function selectChat(username) {
            currentReceiver = username;
            if (username) delete unreadCounts[username];
            processedIds.clear();
            document.getElementById('messages-container').innerHTML = '';
            
            const globalBtn = document.getElementById('global-hub-btn');
            const nodeTitle = document.getElementById('display-node');
            const headerAvatar = document.getElementById('chat-header-avatar');

            if (username) {
                globalBtn.classList.remove('active');
                nodeTitle.innerText = `${username}`;
                headerAvatar.innerText = username[0].toUpperCase();
            } else {
                globalBtn.classList.add('active');
                nodeTitle.innerText = "GLOBAL_HUB";
                headerAvatar.innerText = "G";
                toggleSidebar(false);
            }

            fetchMessages();
            fetchUsers();
        }

        async function fetchMessages() {
            try {
                const { data } = await supabaseClient.from('messages')
                    .select('*')
                    .or(`receiver_name.is.null,receiver_name.eq.${myNick},user_name.eq.${myNick}`)
                    .order('created_at', { ascending: true });

                if (data) {
                    const container = document.getElementById('messages-container');
                    const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 150;
                    let hasNewForCurrent = false;

                    data.forEach(msg => {
                        if (!processedIds.has(msg.id)) {
                            const isGlobal = !msg.receiver_name;
                            const isForMe = msg.receiver_name === myNick;
                            const isFromMe = msg.user_name === myNick;

                            const belongsToCurrent = (currentReceiver === null && isGlobal) || 
                                                   (currentReceiver === msg.user_name && isForMe) ||
                                                   (currentReceiver === msg.receiver_name && isFromMe);

                            if (belongsToCurrent) {
                                renderMessage(msg);
                                processedIds.add(msg.id);
                                hasNewForCurrent = true;
                            } else {
                                if (isForMe && !isFromMe) {
                                    unreadCounts[msg.user_name] = (unreadCounts[msg.user_name] || 0) + 1;
                                    processedIds.add(msg.id);
                                    fetchUsers();
                                    notifySound.play().catch(e => {});
                                } else {
                                    processedIds.add(msg.id);
                                }
                            }
                        }
                    });
                    if (hasNewForCurrent && isAtBottom) container.scrollTop = container.scrollHeight;
                }
            } catch (e) { console.error(e); }
        }

        async function sendMessage(e) {
            e.preventDefault();
            const now = Date.now();
            const input = document.getElementById('message-input');
            const warn = document.getElementById('spam-warning');
            const isAdmin = (myNick === 'admin');

            if (!isAdmin && (now - lastMessageTime < SPAM_DELAY)) {
                warn.classList.remove('hidden');
                setTimeout(() => warn.classList.add('hidden'), 2000);
                return;
            }

            const content = input.value.trim();
            if (!content) return;
            input.value = '';
            lastMessageTime = now;

            await supabaseClient.from('messages').insert([{ content, user_name: myNick, receiver_name: currentReceiver }]);
            fetchMessages();
        }

        function renderMessage(msg) {
            const container = document.getElementById('messages-container');
            const isOwn = msg.user_name === myNick;
            const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";
            const div = document.createElement('div');
            div.className = `flex gap-2 md:gap-3 mb-4 md:mb-6 message-in ${isOwn ? 'flex-row-reverse' : 'flex-row'}`;
            div.innerHTML = `
                <div class="avatar shrink-0 scale-75 md:scale-90">${msg.user_name[0].toUpperCase()}</div>
                <div class="${isOwn ? 'items-end' : 'items-start'} flex flex-col max-w-[85%] md:max-w-[80%]">
                    <div class="flex items-center gap-2 mb-1 px-1">
                        <span class="text-[9px] font-black text-[var(--primary)] uppercase italic tracking-tighter">${msg.user_name}</span>
                        <span class="text-[8px] text-gray-600 font-bold">${time}</span>
                    </div>
                    <div class="p-3 rounded-2xl shadow-xl border border-white/5 ${isOwn ? 'bg-[var(--primary)] text-black font-bold rounded-tr-none' : 'bg-[#1A1A1A] text-white rounded-tl-none'}">
                        <p class="text-sm break-words whitespace-pre-wrap leading-relaxed">${formatText(msg.content)}</p>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        async function changePassword() {
            const newPin = document.getElementById('new-pin').value.trim();
            if (newPin.length < 4) { alert("МИН. 4 СИМВОЛА"); return; }
            await supabaseClient.from('mopsogram_users').update({ pin_code: newPin }).eq('username', myNick);
            alert("ОБНОВЛЕНО");
            toggleSettings(false);
        }

        function setTheme(theme) {
            document.body.classList.remove('theme-purple', 'theme-green');
            if (theme === 'purple') document.body.classList.add('theme-purple');
            if (theme === 'green') document.body.classList.add('theme-green');
            localStorage.setItem('mopso_theme', theme);
        }

        function toggleSettings(show) {
            const modal = document.getElementById('settings-modal');
            if (show) { modal.classList.remove('hidden'); modal.style.opacity = '1'; }
            else { modal.style.opacity = '0'; setTimeout(() => modal.classList.add('hidden'), 300); }
        }

        document.getElementById('message-form').addEventListener('submit', sendMessage);
        const savedTheme = localStorage.getItem('mopso_theme');
        if (savedTheme) setTheme(savedTheme);
        lucide.createIcons();
    </script>
</body>
</html>
