<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | OFFICIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #020202; --card: #0a0a0a; --accent: #ff6600; --text: #ffffff; --text-dim: #777; --border: #151515; --bot: #00e5ff;
        }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .active { display: flex; }

        /* ВХОД */
        .auth-screen { width: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0f00, #000); }
        .auth-card { background: var(--card); border: 1px solid var(--border); padding: 50px; border-radius: 40px; width: 360px; text-align: center; box-shadow: 0 20px 60px #000; }
        .auth-card h1 { font-size: 28px; letter-spacing: 8px; color: var(--accent); margin-bottom: 30px; font-weight: 900; }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .profile-box { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); background: linear-gradient(to bottom, rgba(255,102,0,0.05), transparent); }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 15px; }
        .u-display { font-size: 18px; font-weight: 800; display: block; }
        .s-display { font-size: 24px; font-weight: 900; color: var(--accent); margin-top: 5px; }

        .nav-link { padding: 18px 30px; cursor: pointer; color: var(--text-dim); font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.02); }
        .nav-link.active-tab { color: var(--accent); background: rgba(255,102,0,0.07); border-left: 4px solid var(--accent); }

        /* КОНТЕНТ */
        .main { flex: 1; display: flex; flex-direction: column; background: #000; }
        #chat { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 20px; background: #0d0d0d; border: 1px solid var(--border); line-height: 1.4; }
        .msg-out { align-self: flex-end; border-color: #301b00; background: #150d00; }
        .msg-bot { align-self: center; border-color: var(--bot); color: var(--bot); text-align: center; width: 90%; background: rgba(0, 229, 255, 0.05); }
        .msg b { color: var(--accent); cursor: pointer; display: block; margin-bottom: 4px; font-size: 13px; }

        .input-bar { padding: 20px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 12px; }
        input { background: #050505; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .btn { padding: 14px 24px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: 900; cursor: pointer; font-size: 11px; }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 50px; background: var(--accent); color: #000; font-weight: bold; z-index: 9999; }

        @media (max-width: 768px) {
            .page { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; height: 60px; }
            .profile-box { display: none; }
            .nav-link { flex: 1; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; border-left: none; border-bottom: 3px solid transparent; }
            .nav-link.active-tab { border-bottom-color: var(--accent); }
        }
    </style>
</head>
<body>

    <div id="toast">SYSTEM ONLINE</div>

    <div id="auth-page" class="page active auth-screen">
        <div class="auth-card">
            <h1>MOPSOGRAM</h1>
            <input type="text" id="u-login" placeholder="ЛОГИН">
            <input type="password" id="u-pass" placeholder="ПАРОЛЬ">
            <button class="btn" style="width: 100%; margin-top: 15px;" onclick="auth()">OPEN GATE</button>
        </div>
    </div>

    <div id="main-page" class="page">
        <div class="sidebar">
            <div class="profile-box">
                <img id="my-av" class="avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <span id="display-u" class="u-display">USER</span>
                <div id="display-s" class="s-display">⭐ 0</div>
            </div>
            <div class="nav-link active-tab" onclick="tab('chat', this)">💬 ЧАТ</div>
            <div class="nav-link" onclick="tab('bank', this)">💰 БАНК</div>
            <div class="nav-link" onclick="tab('frag', this)">💎 ИМЕНА</div>
        </div>

        <div id="tab-chat" class="main">
            <div id="chat"></div>
            <div class="input-bar">
                <input type="text" id="m-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()">SEND</button>
            </div>
        </div>

        <div id="tab-bank" class="main" style="display:none; padding:30px;">
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
                <h3 style="color:var(--accent)">ПЕРЕВОД</h3>
                <input type="text" id="gift-to" placeholder="Кому">
                <input type="number" id="gift-amt" placeholder="Сколько ⭐">
                <button class="btn" style="width:100%; margin-top:10px;" onclick="transfer()">ОТПРАВИТЬ</button>
            </div>
            <br>
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
                <h3>ЧЕКИ</h3>
                <input type="text" id="check-code" placeholder="Введите код">
                <button class="btn" style="width:100%; background:#fff; margin-top:10px;" onclick="redeem()">АКТИВИРОВАТЬ</button>
            </div>
        </div>

        <div id="tab-frag" class="main" style="display:none; padding:30px;">
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
                <h3 style="color:var(--accent)">NFT MARKET</h3>
                <input type="text" id="new-nick" placeholder="@nick">
                <button class="btn" style="width:100%; margin-top:10px;" onclick="mint()">MINT</button>
            </div>
            <div id="nick-list" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
        
        const client = supabase.createClient(SB_URL, SB_KEY);
        let user = null;
        let lastHour = null;

        async function auth() {
            const u = document.getElementById('u-login').value.trim();
            const p = document.getElementById('u-pass').value.trim();
            if(!u || !p) return notify("Заполни поля!", "err");

            try {
                let { data, error } = await client.from('users').select('*').eq('username', u).maybeSingle();
                if(error) throw error;

                if(!data) {
                    const { data: n, error: e2 } = await client.from('users').insert([{ username: u, password: p, stars: 500 }]).select().single();
                    if(e2) throw e2;
                    user = n;
                } else {
                    if(data.password === p) user = data;
                    else return notify("Пароль не тот!", "err");
                }
                go();
            } catch(e) {
                alert("ОШИБКА: " + e.message);
                console.error(e);
            }
        }

        function go() {
            document.getElementById('auth-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            update(); loadMsgs(); loadNicks();
            setInterval(autoBot, 30000); 
            autoBot();

            client.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
            client.channel('users').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `username=eq.${user.username}` }, (pl) => {
                user = pl.new; update(); notify("Баланс изменен!");
            }).subscribe();
        }

        function update() {
            document.getElementById('display-u').innerText = user.username;
            document.getElementById('display-s').innerText = `⭐ ${user.stars.toLocaleString()}`;
        }

        async function loadMsgs() {
            const { data } = await client.from('messages').select('*').order('created_at', { ascending: true });
            const b = document.getElementById('chat'); b.innerHTML = '';
            data?.forEach(m => {
                const isMe = m.username === user.username;
                const isBot = m.username === '🤖 MOPSO-BOT';
                b.innerHTML += `<div class="msg ${isMe ? 'msg-out' : ''} ${isBot ? 'msg-bot' : ''}">
                    <b>${m.username}</b>${m.text}
                </div>`;
            });
            b.scrollTop = b.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('m-input');
            if(!i.value.trim()) return;
            await client.from('messages').insert([{ username: user.username, text: i.value }]);
            i.value = '';
        }

        async function autoBot() {
            const h = new Date().getHours();
            if(lastHour === h) return;
            lastHour = h;
            const code = "GIFT-" + Math.random().toString(36).substring(2,7).toUpperCase();
            const amt = Math.floor(Math.random() * 100000) + 500;
            await client.from('checks').insert([{ code: code, amount: amt, uses_left: 3 }]);
            await client.from('messages').insert([{ username: '🤖 MOPSO-BOT', text: `🎁 НОВЫЙ ЧЕК!<br>Код: <b>${code}</b><br>Сумма: ⭐ <b>${amt}</b>` }]);
        }

        async function transfer() {
            const to = document.getElementById('gift-to').value.trim();
            const amt = parseInt(document.getElementById('gift-amt').value);
            if(user.stars < amt) return notify("Мало звезд!", "err");
            const { data: rec } = await client.from('users').select('*').eq('username', to).maybeSingle();
            if(!rec) return notify("Нет юзера!", "err");
            await client.from('users').update({ stars: user.stars - amt }).eq('username', user.username);
            await client.from('users').update({ stars: rec.stars + amt }).eq('username', to);
            notify("Переведено!");
        }

        async function redeem() {
            const c = document.getElementById('check-code').value.trim();
            const { data } = await client.from('checks').select('*').eq('code', c).maybeSingle();
            if(!data || data.uses_left <= 0) return notify("Чек не найден!", "err");
            await client.from('users').update({ stars: user.stars + data.amount }).eq('username', user.username);
            await client.from('checks').update({ uses_left: data.uses_left - 1 }).eq('code', c);
            notify("Звезды получены!");
        }

        async function mint() {
            const n = document.getElementById('new-nick').value.trim();
            const { error } = await client.from('fragment_market').insert([{ username_text: n, owner: user.username }]);
            if(error) return notify("Занято!", "err");
            notify("Имя создано!"); loadNicks();
        }

        async function loadNicks() {
            const { data } = await client.from('fragment_market').select('*');
            const l = document.getElementById('nick-list'); l.innerHTML = '';
            data?.forEach(n => l.innerHTML += `<div style="padding:10px; background:#111; margin-bottom:5px;"><b>${n.username_text}</b> - ${n.owner}</div>`);
        }

        function tab(t, el) {
            document.querySelectorAll('.main').forEach(v => v.style.display = 'none');
            document.getElementById('tab-'+t).style.display = 'flex';
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active-tab'));
            el.classList.add('active-tab');
        }

        function notify(m, type="success") {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.background = type === "success" ? "var(--accent)" : "red";
            t.style.top = "20px"; setTimeout(() => t.style.top = "-100px", 3000);
        }
    </script>
</body>
</html>
