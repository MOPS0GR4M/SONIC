<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MopsoGram Recode | Secure Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --primary: #FF6B00;
            --primary-glow: rgba(255, 107, 0, 0.3);
            --bg-main: #0A0A0A;
            --bg-side: #111111;
        }

        .theme-purple { --primary: #A855F7; --primary-glow: rgba(168, 85, 247, 0.3); }
        .theme-green { --primary: #22C55E; --primary-glow: rgba(34, 197, 94, 0.3); }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #FFFFFF;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            position: fixed;
        }

        .mopso-gradient { background: linear-gradient(135deg, var(--primary) 0%, #000000 150%); }

        #messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .scrollbar-hide::-webkit-scrollbar { width: 4px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .message-in { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 38px; height: 38px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; background: var(--primary); color: black;
            box-shadow: 0 4px 10px var(--primary-glow);
        }

        .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        
        #auth-screen { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="flex h-screen">

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#0A0A0A] flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-[#141414] border border-white/5 rounded-[2.5rem] p-8 shadow-2xl text-center">
            <div class="w-20 h-20 mopso-gradient rounded-2xl mx-auto flex items-center justify-center mb-6">
                <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-black italic mb-2 tracking-tighter">MOPSOGRAM <span class="text-[var(--primary)]">RECODE</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-8">DEVICE ID: <span id="hw-id" class="text-white">...</span></p>
            
            <div class="space-y-3 mb-6">
                <input id="nick-input" type="text" placeholder="НИКНЕЙМ" class="w-full bg-[#1F1F1F] border border-transparent focus:border-[var(--primary)] text-white rounded-xl p-4 outline-none text-center font-bold uppercase transition-all">
                <input id="pass-input" type="password" placeholder="ПИН-КОД" class="w-full bg-[#1F1F1F] border border-transparent focus:border-[var(--primary)] text-white rounded-xl p-4 outline-none text-center font-bold tracking-[0.5em] transition-all">
            </div>

            <button id="auth-btn" onclick="handleLogin()" class="w-full bg-[var(--primary)] text-black font-black p-4 rounded-xl hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-lg">
                <span id="btn-text">ПОДКЛЮЧИТЬСЯ</span>
                <i data-lucide="zap" class="w-5 h-5"></i>
            </button>
            <p id="auth-error" class="text-red-500 text-[10px] font-bold mt-4 uppercase hidden px-4"></p>
        </div>
    </div>

    <!-- БОКОВАЯ ПАНЕЛЬ -->
    <aside id="sidebar" class="w-72 bg-[var(--bg-side)] border-r border-white/5 flex flex-col hidden md:flex shrink-0">
        <div class="p-6 font-black italic text-lg tracking-tighter border-b border-white/5">СЕТЬ</div>
        <div class="flex-1 overflow-y-auto p-3 space-y-2 scrollbar-hide">
            <div class="bg-white/5 p-3 rounded-xl border border-white/5 flex items-center gap-3">
                <div class="avatar">G</div>
                <div class="flex-1">
                    <div class="text-sm font-bold">Глобальный чебузел</div>
                    <div class="text-[9px] text-green-500 font-black flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> ONLINE
                    </div>
                </div>
            </div>
        </div>
        <div class="p-4 border-t border-white/5 bg-black/20 flex items-center gap-3">
            <div id="my-avatar" class="avatar shrink-0">?</div>
            <div class="flex-1 overflow-hidden">
                <p id="my-name" class="font-bold text-sm truncate uppercase italic">User</p>
                <p class="text-[8px] text-gray-500 font-bold">NODE_ACTIVE</p>
            </div>
            <button onclick="window.location.reload()" class="text-gray-600 hover:text-red-500 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
        </div>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main id="app-content" class="flex-1 flex flex-col h-full overflow-hidden bg-[#0D0D0D] hidden">
        <header class="h-16 border-b border-white/5 flex items-center px-6 bg-[#0D0D0D]/80 backdrop-blur-md z-10 shrink-0">
            <div class="flex items-center gap-3">
                <div class="avatar scale-75">G</div>
                <div>
                    <h3 class="font-black italic text-sm tracking-tighter uppercase" id="display-node">GLOBAL_HUB</h3>
                    <p class="text-[8px] text-[var(--primary)] font-bold uppercase tracking-widest">E2E ENCRYPTED</p>
                </div>
            </div>
        </header>

        <div id="messages-container" class="scrollbar-hide" style="background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 32px 32px;"></div>

        <div class="p-4 bg-[#0A0A0A] border-t border-white/5 shrink-0">
            <form id="message-form" class="max-w-4xl mx-auto flex items-center gap-2 bg-[#161616] p-1.5 rounded-2xl border border-white/5 shadow-2xl">
                <input id="message-input" type="text" placeholder="Введите сообщение..." class="flex-1 bg-transparent border-none outline-none px-4 text-sm text-white py-2" autocomplete="off">
                <button id="send-btn" type="submit" class="bg-[var(--primary)] text-black p-3 rounded-xl shadow-lg hover:scale-105 active:scale-95 transition-all">
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
            <p id="spam-warning" class="text-[8px] text-center text-red-500 font-bold mt-2 uppercase hidden">Подождите 3 секунды...</p>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://obqwgeusngfpboklrwob.supabase.co';
        const supabaseKey = 'sb_publishable_y5BsczI_vrBaouWNyS-kFg_vQ1FEUhE';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let myNick = '';
        let processedIds = new Set();
        let lastMessageTime = 0;
        const SPAM_DELAY = 3000;

        // Генерация Fingerprint устройства
        function getDeviceHash() {
            const data = [
                navigator.userAgent,
                screen.width,
                screen.height,
                navigator.language,
                new Date().getTimezoneOffset()
            ].join('|');
            let hash = 0;
            for (let i = 0; i < data.length; i++) {
                hash = ((hash << 5) - hash) + data.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16).toUpperCase();
        }

        document.getElementById('hw-id').innerText = getDeviceHash();

        async function handleLogin() {
            const nick = document.getElementById('nick-input').value.trim().toLowerCase();
            const pin = document.getElementById('pass-input').value.trim();
            const errEl = document.getElementById('auth-error');
            const authBtn = document.getElementById('auth-btn');
            const dHash = getDeviceHash();
            const isAdmin = (nick === 'admin');

            if (!nick || !pin) {
                errEl.innerText = "УКАЖИТЕ НИК И ПИН";
                errEl.classList.remove('hidden');
                return;
            }

            errEl.classList.add('hidden');
            authBtn.classList.add('btn-disabled');

            try {
                let { data: user, error: fetchError } = await supabaseClient
                    .from('mopsogram_users')
                    .select('*')
                    .eq('username', nick)
                    .maybeSingle();

                if (fetchError) throw fetchError;

                if (user) {
                    if (user.pin_code !== pin) throw new Error("НЕВЕРНЫЙ ПИН-КОД");
                    // Защита по хешу отключается для админа
                    if (!isAdmin && user.device_hash !== dHash) {
                        throw new Error("АККАУНТ ПРИВЯЗАН К ДРУГОМУ УСТРОЙСТВУ");
                    }
                } else {
                    // Если не админ, проверяем, нет ли уже аккаунта на этом устройстве
                    if (!isAdmin) {
                        const { data: deviceRecord } = await supabaseClient
                            .from('mopsogram_users')
                            .select('username')
                            .eq('device_hash', dHash)
                            .maybeSingle();

                        if (deviceRecord) throw new Error(`У ВАС УЖЕ ЕСТЬ АККАУНТ: ${deviceRecord.username.toUpperCase()}`);
                    }

                    // Регистрация. Для админа хеш не обязателен или может быть пустым,
                    // но мы запишем dHash только для обычных юзеров.
                    const { error: regErr } = await supabaseClient
                        .from('mopsogram_users')
                        .insert([{ 
                            username: nick, 
                            pin_code: pin, 
                            device_hash: isAdmin ? null : dHash 
                        }]);
                    if (regErr) throw regErr;
                }

                await supabaseClient.auth.signInAnonymously();
                myNick = nick;

                document.getElementById('auth-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app-content').classList.remove('hidden');
                    document.getElementById('sidebar').classList.remove('hidden');
                }, 500);

                document.getElementById('my-name').innerText = myNick;
                document.getElementById('my-avatar').innerText = myNick[0].toUpperCase();
                
                fetchMessages();
                setInterval(fetchMessages, 3000);

            } catch (e) {
                errEl.innerText = e.message.toUpperCase();
                errEl.classList.remove('hidden');
            } finally {
                authBtn.classList.remove('btn-disabled');
            }
        }

        async function fetchMessages() {
            try {
                const { data } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .order('created_at', { ascending: true });
                
                if (data) {
                    const container = document.getElementById('messages-container');
                    const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
                    
                    let hasNew = false;
                    data.forEach(msg => {
                        if (!processedIds.has(msg.id)) {
                            renderMessage(msg);
                            processedIds.add(msg.id);
                            hasNew = true;
                        }
                    });

                    if (hasNew && isAtBottom) {
                        container.scrollTop = container.scrollHeight;
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function sendMessage(e) {
            e.preventDefault();
            const now = Date.now();
            const input = document.getElementById('message-input');
            const warn = document.getElementById('spam-warning');
            const btn = document.getElementById('send-btn');
            const isAdmin = (myNick === 'admin');

            // Анти-спам игнорируется для админа
            if (!isAdmin && (now - lastMessageTime < SPAM_DELAY)) {
                warn.classList.remove('hidden');
                setTimeout(() => warn.classList.add('hidden'), 2000);
                return;
            }

            const content = input.value.trim();
            if (!content) return;

            input.value = '';
            lastMessageTime = now;
            
            if (!isAdmin) {
                btn.classList.add('btn-disabled');
                setTimeout(() => btn.classList.remove('btn-disabled'), SPAM_DELAY);
            }

            try {
                const { error } = await supabaseClient.from('messages').insert([{ 
                    content, 
                    user_name: myNick 
                }]);
                if (error) throw error;
                fetchMessages();
            } catch (err) { console.error(err); }
        }

        function renderMessage(msg) {
            const container = document.getElementById('messages-container');
            const isOwn = msg.user_name === myNick;
            const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";

            const div = document.createElement('div');
            div.className = `flex gap-3 mb-6 message-in ${isOwn ? 'flex-row-reverse' : 'flex-row'}`;
            div.innerHTML = `
                <div class="avatar shrink-0 scale-90">${msg.user_name[0].toUpperCase()}</div>
                <div class="${isOwn ? 'items-end' : 'items-start'} flex flex-col max-w-[80%]">
                    <div class="flex items-center gap-2 mb-1 px-1">
                        <span class="text-[9px] font-black text-[var(--primary)] uppercase italic tracking-tighter">${msg.user_name}</span>
                        <span class="text-[8px] text-gray-600 font-bold">${time}</span>
                    </div>
                    <div class="p-3 rounded-2xl shadow-xl border border-white/5 ${isOwn ? 'bg-[var(--primary)] text-black font-bold rounded-tr-none' : 'bg-[#1A1A1A] text-white rounded-tl-none'}">
                        <p class="text-sm break-words whitespace-pre-wrap">${msg.content}</p>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        document.getElementById('message-form').addEventListener('submit', sendMessage);
        lucide.createIcons();
    </script>
</body>
</html>
