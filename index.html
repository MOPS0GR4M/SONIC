<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM SUPREME 12.8</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* Глобальные переменные стиля */
        :root { 
            --bg: #000000; 
            --card: #0a0a0a; 
            --accent: #ff6600; 
            --text-main: #ffffff; 
            --text-dim: #777777; 
            --border: #1a1a1a; 
            --god-color: #ff0055; 
            --error: #ff3333; 
            --success: #00ff88;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            background: var(--bg); 
            color: var(--text-main); 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Структура страниц */
        .page { 
            display: none; 
            height: 100vh; 
            width: 100vw; 
            flex-direction: row; 
        }

        .page.active { 
            display: flex; 
        }

        /* Боковая панель (Sidebar) */
        .sidebar { 
            width: 320px; 
            background: var(--card); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            z-index: 10; 
        }

        .profile-area { 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 1px solid var(--border); 
        }

        .user-avatar { 
            width: 110px; 
            height: 110px; 
            border-radius: 50%; 
            border: 2px solid var(--accent); 
            margin-bottom: 15px; 
            object-fit: cover; 
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .user-avatar:hover {
            transform: scale(1.05);
        }

        .balance-display { 
            font-size: 32px; 
            font-weight: 900; 
            color: var(--accent); 
            letter-spacing: -1px; 
        }

        /* Навигация */
        .nav-item { 
            padding: 22px 30px; 
            cursor: pointer; 
            color: var(--text-dim); 
            font-weight: bold; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-left: 4px solid transparent; 
            transition: 0.2s; 
        }

        .nav-item:hover { 
            background: rgba(255,102,0,0.05); 
            color: #fff; 
        }

        .nav-item.active { 
            color: var(--accent); 
            background: rgba(255,102,0,0.1); 
            border-left-color: var(--accent); 
        }

        .god-item { 
            color: var(--god-color) !important; 
            border-top: 1px solid var(--border); 
            margin-top: auto; 
        }

        /* Основной контент */
        .content-view { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #000; 
            position: relative; 
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            scroll-behavior: smooth; 
        }

        /* Сообщения */
        .message-bubble { 
            padding: 15px 20px; 
            border-radius: 20px; 
            background: #0d0d0d; 
            border: 1px solid var(--border); 
            max-width: 80%; 
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-bubble.mine { 
            align-self: flex-end; 
            border-color: #402000; 
            background: #150d00; 
        }

        .message-bubble b { 
            color: var(--accent); 
            cursor: pointer; 
            font-size: 14px; 
            text-decoration: underline; 
        }

        .message-bubble i { 
            color: #555; 
            font-style: normal; 
            font-size: 11px; 
            margin-left: 8px; 
        }

        /* Формы и вкладки */
        .tab-content { 
            display: none; 
            padding: 40px; 
            flex-direction: column; 
            gap: 25px; 
            overflow-y: auto; 
            height: 100%; 
        }

        .mopso-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 30px; 
            border-radius: 30px; 
        }

        .input-group { 
            padding: 20px 30px; 
            background: var(--card); 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 15px; 
        }

        input { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 15px 20px; 
            border-radius: 15px; 
            outline: none; 
            font-size: 14px; 
            width: 100%; 
        }

        input:focus { 
            border-color: var(--accent); 
        }

        .mopso-btn { 
            padding: 15px 25px; 
            border-radius: 15px; 
            border: none; 
            background: var(--accent); 
            color: #000; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 12px; 
            transition: 0.2s; 
        }

        .mopso-btn:hover { 
            transform: translateY(-2px); 
            filter: brightness(1.1); 
        }

        /* Уведомление */
        #toast-msg { 
            position: fixed; 
            top: -100px; 
            left: 50%; 
            transform: translateX(-50%); 
            padding: 18px 40px; 
            border-radius: 50px; 
            background: var(--accent); 
            color: #000; 
            font-weight: 900; 
            z-index: 5000; 
            transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
        }

        /* Модальное окно */
        #profile-modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); 
            z-index: 3000; 
            align-items: center; 
            justify-content: center; 
        }

        .modal-body { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 40px; 
            width: 380px; 
            padding: 40px; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div id="toast-msg">СИСТЕМА SUPREME 12.8</div>

    <div id="profile-modal" onclick="closeProfile()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <img id="modal-avatar" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--accent); margin-bottom:20px;">
            <h2 id="modal-username" style="margin:0; font-size: 28px;">USER</h2>
            <p id="modal-stars-count" style="color:var(--accent); font-weight:900; font-size:30px; margin:15px 0;">⭐ 0</p>
            <div id="modal-nft-tags" style="font-size:13px; color:#666; background: #000; padding: 15px; border-radius: 20px;"></div>
            
            <div id="god-actions" style="display:none; margin-top:25px; border-top:1px solid #222; padding-top:20px;">
                <button id="btn-mute" class="mopso-btn" style="width:100%; background:var(--god-color); color:#fff;" onclick="handleMuteToggle()">ПЕРЕКЛЮЧИТЬ МУТ</button>
            </div>
            <button class="mopso-btn" style="width:100%; margin-top:20px; background: #fff;" onclick="closeProfile()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="page-login" class="page active" style="align-items:center; justify-content:center;">
        <div class="mopso-card" style="width:400px; text-align:center;">
            <h1 style="color:var(--accent); letter-spacing:8px; margin-bottom:40px;">MOPSOGRAM</h1>
            <input type="text" id="auth-user" placeholder="ЛОГИН" style="margin-bottom:15px;">
            <input type="password" id="auth-pass" placeholder="ПАРОЛЬ" style="margin-bottom:30px;">
            <button class="mopso-btn" style="width:100%; padding:20px;" onclick="performAuth()">ВОЙТИ В АККАУНТ</button>
        </div>
    </div>

    <div id="page-app" class="page">
        <div class="sidebar">
            <div class="profile-area">
                <img class="user-avatar" id="app-my-avatar" onclick="openProfile(currentUser.username)">
                <div id="app-my-name" style="font-weight: 900; font-size: 22px; margin-top: 10px;">USER</div>
                <div id="app-my-stars" class="balance-display">⭐ 0</div>
            </div>
            <div class="nav-item active" onclick="switchTab('chat', this)">💬 ЧАТ СООБЩЕСТВА</div>
            <div class="nav-item" onclick="switchTab('bank', this)">💰 БАНК И ЧЕКИ</div>
            <div class="nav-item" onclick="switchTab('nft', this)">💎 FRAGMENT NFT</div>
            <div id="god-panel-tab" class="nav-item god-item" style="display:none;" onclick="switchTab('god', this)">⚡ ПАНЕЛЬ БОГА</div>
            <div style="margin-top:auto; padding:25px;">
                <button class="mopso-btn" style="width:100%; background:#111; color:#fff;" onclick="location.reload()">ВЫЙТИ</button>
            </div>
        </div>

        <div class="content-view">
            <div id="tab-chat" class="tab-content" style="display:flex; padding:0;">
                <div id="chat-container"></div>
                <div class="input-group">
                    <input type="text" id="chat-input" placeholder="Ваше сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="mopso-btn" onclick="sendMessage()">ОТПРАВИТЬ</button>
                </div>
            </div>

            <div id="tab-bank" class="tab-content">
                <div class="mopso-card">
                    <h2 style="color:var(--accent); margin-top:0;">АКТИВАЦИЯ ЧЕКА</h2>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="input-check-code" placeholder="Код MOPSO-XXXXXX">
                        <button class="mopso-btn" onclick="claimCheck()">ОК</button>
                    </div>
                </div>
                <div class="mopso-card">
                    <h2 style="color:var(--accent); margin-top:0;">ПЕРЕВОД ЗВЕЗД</h2>
                    <input type="text" id="transfer-to" style="margin-bottom:10px;" placeholder="Ник получателя">
                    <input type="number" id="transfer-amount" style="margin-bottom:20px;" placeholder="Сколько звезд">
                    <button class="mopso-btn" style="width:100%" onclick="sendStars()">ОТПРАВИТЬ СРЕДСТВА</button>
                </div>
            </div>

            <div id="tab-nft" class="tab-content">
                <div class="mopso-card">
                    <h2 style="color:var(--accent); margin-top:0;">MINT USERNAME (NFT)</h2>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="nft-mint-name" placeholder="@username">
                        <button class="mopso-btn" onclick="mintNftName()">ЗАБРАТЬ</button>
                    </div>
                </div>
                <h3 style="color: var(--text-dim); font-size: 14px; margin-left: 10px;">ЗАНЯТЫЕ ИМЕНА:</h3>
                <div id="nft-grid-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            </div>

            <div id="tab-god" class="tab-content">
                <div class="mopso-card" style="border-color:var(--god-color)">
                    <h2 style="color:var(--god-color); margin-top:0;">GOD CONTROL</h2>
                    <p style="color: #777;">Создать подарочный чек:</p>
                    <input type="number" id="god-check-sum" style="margin-bottom:10px;" placeholder="Сумма звезд">
                    <input type="text" id="god-check-note" style="margin-bottom:15px;" placeholder="Записка к чеку">
                    <button class="mopso-btn" style="background:var(--god-color); color:#fff; width:100%;" onclick="generateNewCheck()">ГЕНЕРИРОВАТЬ ЧЕК</button>
                    
                    <div id="display-generated-code" style="margin-top:20px; background:#000; padding:20px; border-radius:15px; color:var(--accent); font-weight: 900; text-align: center; border: 1px dashed var(--accent);">ОЖИДАНИЕ...</div>
                    <hr style="border: 0; border-top: 1px solid #222; margin: 30px 0;">
                    <button class="mopso-btn" style="background:#fff; color:#000; width:100%;" onclick="globalChatClear()">🔥 ПОЛНАЯ ОЧИСТКА ЧАТА</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        let cachedNfts = [];
        let selectedUserProfile = null;

        // --- Авторизация ---
        async function performAuth() {
            const username = document.getElementById('auth-user').value.trim();
            const password = document.getElementById('auth-pass').value.trim();
            if(!username || !password) return showToast("Заполните все поля!", "error");

            try {
                let { data: userRecord, error } = await client.from('users').select('*').eq('username', username).maybeSingle();
                
                if(!userRecord) {
                    // Регистрация нового
                    const { data: newUser, error: regError } = await client.from('users').insert([
                        { username: username, password: password, stars: 1000 }
                    ]).select().single();
                    if(regError) throw regError;
                    currentUser = newUser;
                    showToast("Аккаунт создан! Бонус: 1000 ⭐");
                } else {
                    // Вход в существующий
                    if(userRecord.password === password) {
                        currentUser = userRecord;
                    } else {
                        return showToast("Неверный пароль!", "error");
                    }
                }
                launchApp();
            } catch(e) {
                console.error(e);
                showToast("Ошибка базы данных!", "error");
            }
        }

        // --- Запуск приложения ---
        async function launchApp() {
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('page-app').classList.add('active');
            
            if(currentUser.username.toLowerCase() === 'admin') {
                document.getElementById('god-panel-tab').style.display = 'block';
            }
            
            await syncNfts();
            refreshSidebar();
            renderChat();
            renderNftList();

            // Реалтайм слушатели
            client.channel('public_changes').on('postgres_changes', { event: '*', schema: 'public' }, async (p) => {
                if(p.table === 'fragment_market') await syncNfts();
                renderChat(); 
                renderNftList();
            }).subscribe();

            client.channel('user_updates').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${currentUser.id}` }, (p) => {
                currentUser = p.new;
                refreshSidebar();
            }).subscribe();
        }

        // --- Чат ---
        async function renderChat() {
            const { data: messages } = await client.from('messages').select('*').order('created_at', { ascending: true }).limit(100);
            const chatBox = document.getElementById('chat-container');
            chatBox.innerHTML = '';
            
            if(!messages || messages.length === 0) {
                chatBox.innerHTML = '<div style="text-align:center;color:#333;margin-top:20px;">Сообщений нет. Станьте первым!</div>';
            }

            messages?.forEach(msg => {
                const isMine = msg.username === currentUser.username;
                const userNftStrings = cachedNfts.filter(n => n.owner === msg.username).map(n => n.username_text).join(', ');
                
                chatBox.innerHTML += `
                    <div class="message-bubble ${isMine ? 'mine' : ''}">
                        <b onclick="openProfile('${msg.username}')">${msg.username}</b> 
                        <i>${userNftStrings ? '[' + userNftStrings + ']' : ''}</i>
                        <div style="margin-top:8px; line-height:1.4;">${msg.text}</div>
                    </div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            if(currentUser.is_muted) return showToast("У вас блокировка чата!", "error");
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val) return;
            
            await client.from('messages').insert([{ username: currentUser.username, text: val }]);
            input.value = '';
        }

        // --- Профиль ---
        async function openProfile(name) {
            const { data: target } = await client.from('users').select('*').eq('username', name).maybeSingle();
            if(!target) return;
            selectedUserProfile = target;
            
            const nfts = cachedNfts.filter(n => n.owner === name).map(n => n.username_text).join(', ');
            document.getElementById('modal-avatar').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${target.username}`;
            document.getElementById('modal-username').innerText = target.username + (target.is_muted ? " (MUTED)" : "");
            document.getElementById('modal-stars-count').innerText = "⭐ " + target.stars.toLocaleString();
            document.getElementById('modal-nft-tags').innerText = nfts ? "NFT: " + nfts : "Нет NFT имен";
            
            const godBox = document.getElementById('god-actions');
            if(currentUser.username.toLowerCase() === 'admin' && target.username.toLowerCase() !== 'admin') {
                godBox.style.display = 'block';
            } else {
                godBox.style.display = 'none';
            }

            document.getElementById('profile-modal').style.display = 'flex';
        }

        function closeProfile() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        async function handleMuteToggle() {
            const newStatus = !selectedUserProfile.is_muted;
            await client.from('users').update({ is_muted: newStatus }).eq('id', selectedUserProfile.id);
            showToast("Статус мута обновлен");
            closeProfile();
        }

        // --- NFT ---
        async function syncNfts() {
            const { data } = await client.from('fragment_market').select('*');
            cachedNfts = data || [];
        }

        async function mintNftName() {
            const nameInput = document.getElementById('nft-mint-name');
            const name = nameInput.value.trim();
            if(!name.startsWith('@')) return showToast("Нужен символ @ в начале!", "error");
            
            const { error } = await client.from('fragment_market').insert([{ username_text: name, owner: currentUser.username }]);
            
            if(error) {
                showToast("Это имя уже занято!", "error");
            } else {
                showToast("Поздравляем! Имя ваше.");
                nameInput.value = '';
                await syncNfts();
                renderNftList();
            }
        }

        function renderNftList() {
            const list = document.getElementById('nft-grid-list');
            list.innerHTML = '';
            cachedNfts.forEach(nft => {
                list.innerHTML += `
                    <div class="mopso-card" style="padding:15px; text-align:center; border-color: #222;">
                        <b style="color:var(--accent); font-size:16px;">${nft.username_text}</b><br>
                        <small style="color:#444">Владелец: ${nft.owner}</small>
                    </div>`;
            });
        }

        // --- Банк и Чеки ---
        async function claimCheck() {
            const code = document.getElementById('input-check-code').value.trim();
            const { data: check, error } = await client.from('checks')
                .select('*')
                .eq('code', code)
                .eq('is_used', false)
                .maybeSingle();
            
            if(!check) return showToast("Код недействителен или использован!", "error");
            
            // Помечаем чек как использованный и начисляем звезды
            await client.from('checks').update({ is_used: true }).eq('id', check.id);
            await client.from('users').update({ stars: currentUser.stars + check.amount }).eq('id', currentUser.id);
            
            if(check.message) alert("Записка к чеку: " + check.message);
            showToast(`Успешно! +${check.amount} ⭐`);
            document.getElementById('input-check-code').value = '';
        }

        async function sendStars() {
            const targetName = document.getElementById('transfer-to').value.trim();
            const amount = parseInt(document.getElementById('transfer-amount').value);
            
            if(!amount || amount <= 0) return showToast("Сумма некорректна!", "error");
            if(currentUser.stars < amount) return showToast("Недостаточно звезд!", "error");
            
            const { data: receiver } = await client.from('users').select('*').eq('username', targetName).maybeSingle();
            if(!receiver) return showToast("Получатель не найден!", "error");
            if(receiver.username === currentUser.username) return showToast("Себе нельзя!", "error");

            await client.from('users').update({ stars: receiver.stars + amount }).eq('username', targetName);
            await client.from('users').update({ stars: currentUser.stars - amount }).eq('id', currentUser.id);
            
            showToast("Перевод выполнен!");
            document.getElementById('transfer-amount').value = '';
        }

        // --- Админ-функции ---
        async function generateNewCheck() {
            const amount = parseInt(document.getElementById('god-check-sum').value);
            const message = document.getElementById('god-check-note').value.trim();
            if(!amount) return showToast("Укажите сумму!", "error");
            
            const code = "MOPSO-" + Math.random().toString(36).substring(2, 9).toUpperCase();
            const { error } = await client.from('checks').insert([{ 
                code: code, 
                amount: amount, 
                message: message, 
                is_used: false 
            }]);
            
            if(!error) {
                document.getElementById('display-generated-code').innerText = code;
                showToast("Чек сгенерирован!");
            } else {
                showToast("Ошибка создания чека!", "error");
            }
        }

        async function globalChatClear() {
            if(!confirm("Вы уверены? Чат будет удален для ВСЕХ пользователей.")) return;
            const { error } = await client.from('messages').delete().neq('username', 'system_null');
            if(!error) showToast("Чат полностью очищен!");
        }

        // --- Вспомогательные функции ---
        function refreshSidebar() {
            document.getElementById('app-my-name').innerText = currentUser.username + (currentUser.is_muted ? " [MUTED]" : "");
            document.getElementById('app-my-stars').innerText = "⭐ " + currentUser.stars.toLocaleString();
            document.getElementById('app-my-avatar').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${currentUser.username}`;
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.getElementById('tab-' + tabId).style.display = (tabId === 'chat' ? 'flex' : 'flex');
            // Примечание: для чата и других используем flex, чтобы сохранять верстку
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById('toast-msg');
            toast.innerText = msg;
            toast.style.background = (type === "success" ? "var(--success)" : "var(--error)");
            toast.style.color = "#000";
            toast.style.top = "25px";
            setTimeout(() => { toast.style.top = "-100px"; }, 3500);
        }
    </script>
</body>
</html>
