<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM 25.0 | FIXED</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #ff9000; --bg: #000; --side: #0a0a0a; --chat: #050505; --brd: #1f1f1f; --text: #eee; }
        * { box-sizing: border-box; outline: none; transition: 0.2s; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        .btn { background: var(--p); border: none; padding: 12px; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; width: 100%; }
        input { background: #111; border: 1px solid var(--brd); padding: 12px; border-radius: 12px; color: #fff; width: 100%; margin-bottom: 10px; font-family: 'JetBrains Mono'; }

        /* UI */
        #app { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; background: var(--chat); }

        .nav-item { padding: 15px 20px; cursor: pointer; color: #666; font-weight: 700; font-size: 12px; }
        .nav-item.active { background: var(--p); color: #000; border-radius: 0 50px 50px 0; margin-right: 10px; }

        /* CHAT */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m-wrap { display: flex; flex-direction: column; max-width: 80%; cursor: pointer; }
        .m-wrap.me { align-self: flex-end; }
        .bubble { padding: 12px 16px; border-radius: 18px; background: #111; border: 1px solid var(--brd); font-size: 14px; }
        .me .bubble { border-color: var(--p); background: #1a1300; }
        .u-label { font-size: 10px; font-weight: 800; color: var(--p); margin-bottom: 4px; padding-left: 5px; }

        /* MODAL PROFILE (FIXED) */
        #prof-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .p-card { background: var(--side); width: 300px; border-radius: 30px; border: 1px solid var(--brd); padding: 30px; text-align: center; }
        .p-av { width: 100px; height: 100px; border-radius: 30px; border: 2px solid var(--p); margin-bottom: 15px; }

        #notify { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150px); background: var(--p); color: #000; padding: 10px 25px; border-radius: 50px; font-weight: 800; z-index: 10000; transition: 0.5s; }
    </style>
</head>
<body>

<div id="notify">SYSTEM</div>

<div id="auth-scr" style="position:fixed; inset:0; background:#000; z-index:8000; display:flex; align-items:center; justify-content:center;">
    <div style="width:280px; text-align:center;">
        <h1 style="font-family:'Orbitron'; color:var(--p); margin-bottom:30px;">MOPSOGRAM</h1>
        <input type="text" id="log-u" placeholder="@username">
        <input type="password" id="log-p" placeholder="password">
        <button class="btn" onclick="login()">ENTER TERMINAL</button>
    </div>
</div>

<div id="prof-modal" onclick="this.style.display='none'">
    <div class="p-card" onclick="event.stopPropagation()">
        <img id="m-av" class="p-av">
        <h2 id="m-nick" style="margin:0; color:var(--p);"></h2>
        <div id="m-stars" style="font-size:22px; font-weight:900; margin:10px 0;"></div>
        <div id="m-role" style="font-size:10px; opacity:0.5; text-transform:uppercase; margin-bottom:20px;"></div>
        <div id="m-admin-tools" style="display:none; border-top:1px solid #222; padding-top:15px;">
            <button class="btn" style="background:#ff4444; color:#fff" onclick="adminMute()">MUTE USER</button>
        </div>
    </div>
</div>

<div id="app">
    <aside class="sidebar">
        <div style="padding:30px 20px; border-bottom:1px solid var(--brd);">
            <div id="ui-nick" style="font-weight:900; color:var(--p); font-size:18px;"></div>
            <div id="ui-stars" style="font-size:14px; opacity:0.7;"></div>
        </div>
        <nav style="flex:1; padding-top:10px;">
            <div class="nav-item active" onclick="setTab('chat', this)">📡 CHAT</div>
            <div class="nav-item" onclick="setTab('market', this)">💎 MINT (FREE)</div>
            <div class="nav-item" onclick="setTab('bank', this)">🏦 BANK</div>
            <div id="ui-admin-nav" class="nav-item" style="display:none; color:#ff4444;" onclick="setTab('admin', this)">⚡ ROOT</div>
        </nav>
        <div style="padding:20px;"><button class="btn" style="background:#111; color:#444;" onclick="location.reload()">LOGOUT</button></div>
    </aside>

    <main class="viewport">
        <div id="tab-chat" class="tab" style="display:flex; flex-direction:column; height:100%;">
            <div id="chat-box"></div>
            <div style="padding:20px; background:var(--side); display:flex; gap:10px;">
                <input type="text" id="msg-i" placeholder="Command..." style="margin:0;" onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()" style="width:60px;">➔</button>
            </div>
        </div>

        <div id="tab-market" class="tab" style="display:none; padding:40px;">
            <h2>FREE USERNAME MINT</h2>
            <input type="text" id="mint-i" placeholder="New @username...">
            <button class="btn" onclick="mint()">CLAIM FOR 0 ⭐</button>
        </div>

        <div id="tab-bank" class="tab" style="display:none; padding:40px;">
            <h2>REDEEM CHECK</h2>
            <input type="text" id="check-i" placeholder="MOPSO_SONIX_XXXXX">
            <button class="btn" onclick="redeem()">ACTIVATE</button>
        </div>

        <div id="tab-admin" class="tab" style="display:none; padding:40px;">
            <h2 style="color:#ff4444;">GENERATE CHECK</h2>
            <input type="number" id="gen-a" placeholder="Amount">
            <button class="btn" style="background:#ff4444; color:#fff;" onclick="gen()">GENERATE</button>
            <div id="gen-res" style="margin-top:20px; color:var(--p); font-family:monospace;"></div>
        </div>
    </main>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);

    let currUser = null;
    let viewTarget = null;

    async function login() {
        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value.trim();
        if(!u || !p) return;
        const nick = u.startsWith('@') ? u : '@' + u;

        let { data: user } = await sb.from('users').select('*').eq('username', nick).maybeSingle();

        if(!user) {
            const { data: newUser } = await sb.from('users').insert([{ username: nick, password: p, stars: 1000, role: nick === '@admin' ? 'admin' : 'user' }]).select().single();
            currUser = newUser;
        } else {
            if(user.password !== p) return alert("BAD PASS");
            currUser = user;
        }

        document.getElementById('auth-scr').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if(currUser.role === 'admin') document.getElementById('ui-admin-nav').style.display = 'block';
        
        init();
    }

    function init() {
        updateUI();
        loadChat();
        sb.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, (p) => {
            if(p.table === 'messages') loadChat();
            if(p.table === 'users' && p.new.id === currUser.id) { currUser = p.new; updateUI(); }
        }).subscribe();
    }

    async function loadChat() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        const container = document.getElementById('chat-box');
        container.innerHTML = '';
        msgs?.forEach(m => {
            const isMe = m.username === currUser.username;
            container.innerHTML += `
                <div class="m-wrap ${isMe ? 'me' : ''}" onclick="openProfile('${m.username}')">
                    <div class="u-label">${m.username}</div>
                    <div class="bubble">${m.text}</div>
                </div>`;
        });
        container.scrollTop = container.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('msg-i');
        if(!input.value.trim() || currUser.is_muted) return;
        const text = input.value;
        input.value = '';
        await sb.from('messages').insert({ username: currUser.username, text: text });
    }

    async function openProfile(nick) {
        const { data: p } = await sb.from('users').select('*').eq('username', nick).single();
        if(!p) return;
        viewTarget = p;
        document.getElementById('m-nick').innerText = p.username;
        document.getElementById('m-stars').innerText = p.stars + " ⭐";
        document.getElementById('m-role').innerText = p.role;
        document.getElementById('m-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${p.username}`;
        document.getElementById('m-admin-tools').style.display = currUser.role === 'admin' ? 'block' : 'none';
        document.getElementById('prof-modal').style.display = 'flex';
    }

    async function mint() {
        const newNick = document.getElementById('mint-i').value.trim();
        const formatted = newNick.startsWith('@') ? newNick : '@' + newNick;
        const { data: ex } = await sb.from('users').select('*').eq('username', formatted).maybeSingle();
        if(ex) return toast("TAKEN!");
        await sb.from('users').update({ username: formatted }).eq('id', currUser.id);
        toast("MINTED!"); setTimeout(() => location.reload(), 1000);
    }

    async function redeem() {
        const code = document.getElementById('check-i').value.trim();
        const { data: c } = await sb.from('checks').select('*').eq('code', code).eq('is_used', false).maybeSingle();
        if(!c) return toast("INVALID!");
        await sb.from('checks').update({ is_used: true }).eq('id', c.id);
        await sb.from('users').update({ stars: currUser.stars + c.amount }).eq('id', currUser.id);
        toast("SUCCESS!");
    }

    async function gen() {
        const a = document.getElementById('gen-a').value;
        const code = "MOPSO_SONIX_" + Math.floor(Math.random() * 1e10);
        await sb.from('checks').insert({ code, amount: a });
        document.getElementById('gen-res').innerText = code;
    }

    async function adminMute() {
        if(!viewTarget) return;
        await sb.from('users').update({ is_muted: true }).eq('id', viewTarget.id);
        toast("MUTED!");
    }

    function updateUI() {
        document.getElementById('ui-nick').innerText = currUser.username;
        document.getElementById('ui-stars').innerText = currUser.stars + " ⭐";
    }

    function setTab(name, el) {
        document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + name).style.display = name === 'chat' ? 'flex' : 'block';
        el.classList.add('active');
    }

    function toast(m) {
        const t = document.getElementById('notify');
        t.innerText = m; t.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => t.style.transform = "translateX(-50%) translateY(-150px)", 3000);
    }
</script>
</body>
</html>
