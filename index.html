<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | SUPREME 12.5 FULL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #000; --card: #0a0a0a; --accent: #ff6600; 
            --text: #fff; --text-dim: #777; --border: #1a1a1a; 
            --god: #ff0055; --err: #ff3333; --success: #00ff88;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Красивые анимации */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .page { display: none; height: 100vh; width: 100vw; flex-direction: row; animation: fadeIn 0.4s ease; }
        .page.active { display: flex; }

        /* Боковое меню */
        .sidebar { width: 320px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .profile-area { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .user-avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 15px; cursor: pointer; transition: 0.3s; object-fit: cover; }
        .user-avatar:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255,102,0,0.3); }
        .balance { font-size: 28px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }

        .nav-btn { 
            padding: 20px 30px; cursor: pointer; color: var(--text-dim); font-weight: bold; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid transparent; transition: 0.2s;
        }
        .nav-btn:hover { background: rgba(255,102,0,0.05); color: #fff; }
        .nav-btn.active { color: var(--accent); background: rgba(255,102,0,0.1); border-left-color: var(--accent); }
        .god-btn { color: var(--god) !important; border-top: 1px solid var(--border); margin-top: auto; }

        /* Основной контент */
        .view { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        #chat-box { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { padding: 15px 20px; border-radius: 20px; background: #0d0d0d; border: 1px solid var(--border); max-width: 80%; animation: slideUp 0.3s ease; }
        .msg.mine { align-self: flex-end; border-color: #402000; background: #150d00; }
        .msg b { color: var(--accent); cursor: pointer; font-size: 14px; text-decoration: underline; }
        .msg i { color: #555; font-style: normal; font-size: 11px; margin-left: 8px; }
        .msg-text { margin-top: 8px; line-height: 1.5; font-size: 15px; color: #efefef; word-wrap: break-word; }

        /* Вкладки */
        .tab-view { display: none; padding: 40px; flex-direction: column; gap: 25px; overflow-y: auto; height: 100%; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 30px; position: relative; }

        /* Инпуты и Кнопки */
        .input-bar { padding: 20px 30px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 15px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 15px 20px; border-radius: 15px; outline: none; font-size: 14px; width: 100%; }
        input:focus { border-color: var(--accent); }
        .btn { padding: 15px 25px; border-radius: 15px; border: none; background: var(--accent); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; white-space: nowrap; }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn:active { transform: scale(0.95); }

        /* Модалка профиля */
        #modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index:2000; }
        .mini-profile { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--card); border: 1px solid var(--border); border-radius: 40px; 
            width: 360px; padding: 40px; text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Уведомления */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 18px 40px; border-radius: 50px; background: var(--accent); color: #000; font-weight: 900; z-index: 3000; transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
    </style>
</head>
<body>

    <div id="toast">СИСТЕМА ГОТОВА</div>

    <div id="modal-overlay" onclick="closeProfile()">
        <div class="mini-profile" onclick="event.stopPropagation()">
            <img id="m-av" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--accent); margin-bottom:20px;">
            <h2 id="m-name" style="margin:0; font-size: 28px;">USER</h2>
            <p id="m-stars" style="color:var(--accent); font-weight:900; font-size:30px; margin:15px 0;">⭐ 0</p>
            <div id="m-nfts" style="font-size:13px; color:#666; background: #000; padding: 15px; border-radius: 20px; border: 1px solid #111; min-height: 40px;"></div>
            
            <div id="admin-actions" style="display:none; margin-top:25px; border-top:1px solid #222; padding-top:20px;">
                <button id="mute-btn" class="btn" style="width:100%; background:var(--god); color:#fff;" onclick="toggleMute()">ЗАБЛОКИРОВАТЬ ЧАТ</button>
            </div>
            <button class="btn" style="width:100%; margin-top:20px; background: #fff;" onclick="closeProfile()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="p-auth" class="page active" style="align-items:center; justify-content:center; background: radial-gradient(circle at center, #111 0%, #000 100%);">
        <div class="card" style="width:400px; text-align:center;">
            <h1 style="color:var(--accent); letter-spacing:10px; margin-bottom:40px; font-size: 35px; font-weight: 900;">MOPSOGRAM</h1>
            <input type="text" id="log-u" style="margin-bottom:15px;" placeholder="ЛОГИН">
            <input type="password" id="pass-u" style="margin-bottom:30px;" placeholder="ПАРОЛЬ">
            <button class="btn" style="width:100%; padding:20px;" onclick="auth()">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <div id="p-main" class="page">
        <div class="sidebar">
            <div class="profile-area">
                <img class="user-avatar" id="my-av" onclick="openProfile(user.username)">
                <div id="my-name" style="font-weight: 900; font-size: 22px; margin-top: 10px;">USER</div>
                <div id="my-stars" class="balance">⭐ 0</div>
            </div>
            <div class="nav-btn active" onclick="tab('chat', this)">💬 ОБЩИЙ ЧАТ</div>
            <div class="nav-btn" onclick="tab('bank', this)">💰 БАНК / ЧЕКИ</div>
            <div class="nav-btn" onclick="tab('frag', this)">💎 FRAGMENT NFT</div>
            <div id="god-menu" class="nav-btn god-btn" style="display:none;" onclick="tab('god', this)">⚡ GOD PANEL</div>
            <div style="margin-top:auto; padding:25px;">
                <button class="btn" style="width:100%; background:#111; color:#fff; border: 1px solid #222;" onclick="location.reload()">ВЫЙТИ</button>
            </div>
        </div>

        <div class="view">
            <div id="t-chat" class="tab-view" style="display:flex; padding:0;">
                <div id="chat-box"></div>
                <div class="input-bar">
                    <input type="text" id="m-in" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') send()">
                    <button class="btn" onclick="send()">ОТПРАВИТЬ</button>
                </div>
            </div>

            <div id="t-bank" class="tab-view">
                <div class="card">
                    <h2 style="color:var(--accent); margin-top:0;">АКТИВИРОВАТЬ ЧЕК</h2>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="c-code" placeholder="Введите код MOPSO-XXXX">
                        <button class="btn" onclick="redeemCheck()">ОК</button>
                    </div>
                </div>
                <div class="card">
                    <h2 style="color:var(--accent); margin-top:0;">ПЕРЕВОД ЗВЕЗД</h2>
                    <input type="text" id="g-to" style="margin-bottom:10px;" placeholder="Ник получателя">
                    <input type="number" id="g-amt" style="margin-bottom:20px;" placeholder="Сумма">
                    <button class="btn" style="width:100%" onclick="transfer()">ПОДТВЕРДИТЬ ПЕРЕВОД</button>
                </div>
            </div>

            <div id="t-frag" class="tab-view">
                <div class="card">
                    <h2 style="color:var(--accent); margin-top:0;">MINT USERNAME (FREE)</h2>
                    <p style="color: #666; font-size: 13px; margin-bottom: 15px;">Заберите имя навсегда. Оно будет отображаться в чате рядом с вашим ником.</p>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="n-name" placeholder="@username">
                        <button class="btn" onclick="mint()">ЗАБРАТЬ</button>
                    </div>
                </div>
                <h3 style="margin: 10px 0 0 5px; color: var(--text-dim); font-size: 14px;">ЗАНЯТЫЕ ИМЕНА:</h3>
                <div id="nft-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
            </div>

            <div id="t-god" class="tab-view">
                <div class="card" style="border-color:var(--god)">
                    <h2 style="color:var(--god); margin-top:0;">GOD CONTROL</h2>
                    <p style="color: #777; font-size: 13px;">Создание чека для игроков:</p>
                    <input type="number" id="gen-amt" style="margin-bottom:10px;" placeholder="Сумма звезд">
                    <input type="text" id="gen-msg" style="margin-bottom:15px;" placeholder="Сообщение к чеку (необязательно)">
                    <button class="btn" style="background:var(--god); color:#fff; width:100%;" onclick="createCheck()">ГЕНЕРИРОВАТЬ КОД</button>
                    
                    <div id="last-check" style="margin-top:20px; background:#000; padding:20px; border-radius:15px; color:var(--accent); font-weight: 900; text-align: center; border: 1px dashed var(--accent); font-size: 20px;">ОЖИДАНИЕ...</div>
                    <hr style="border: 0; border-top: 1px solid #222; margin: 30px 0;">
                    <button class="btn" style="background:#1a1a1a; color:var(--err); width:100%;" onclick="clearAllChat()">ОЧИСТИТЬ ЧАТ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Конфиг Supabase
        const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
        const sb = supabase.createClient(S_URL, S_KEY);
        
        let user = null;
        let allNFTs = [];
        let viewingUser = null;

        // Авторизация
        async function auth() {
            const u = document.getElementById('log-u').value.trim();
            const p = document.getElementById('pass-u').value.trim();
            if(!u || !p) return notify("Заполни поля!", "err");

            try {
                let { data: ex, error } = await sb.from('users').select('*').eq('username', u).maybeSingle();
                if(error) throw error;

                if(!ex) {
                    const { data: n, error: nErr } = await sb.from('users').insert([{ username: u, password: p, stars: 500 }]).select().single();
                    if(nErr) throw nErr;
                    user = n;
                    notify("Аккаунт создан! Подарок: 500 ⭐");
                } else {
                    if(ex.password === p) user = ex;
                    else return notify("Неверный пароль!", "err");
                }
                start();
            } catch(e) { 
                console.error(e);
                notify("Ошибка БД! Проверь SQL в консоли.", "err"); 
            }
        }

        // Старт сессии
        async function start() {
            document.getElementById('p-auth').classList.remove('active');
            document.getElementById('p-main').classList.add('active');
            
            if(user.username.toLowerCase() === 'admin') {
                document.getElementById('god-menu').style.display = 'block';
            }
            
            await updateNFTCache();
            updateUI(); 
            loadChat(); 
            loadNFTs();

            // Реалтайм подписки
            sb.channel('db_changes').on('postgres_changes', { event: '*', schema: 'public' }, async (payload) => {
                if(payload.table === 'fragment_market') await updateNFTCache();
                loadChat(); loadNFTs();
            }).subscribe();

            sb.channel('my_data').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${user.id}` }, (p) => {
                user = p.new; updateUI();
            }).subscribe();
        }

        async function updateNFTCache() {
            const { data } = await sb.from('fragment_market').select('*');
            allNFTs = data || [];
        }

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('my-name').innerText = user.username + (user.is_muted ? " [MUTED]" : "");
            document.getElementById('my-stars').innerText = "⭐ " + user.stars.toLocaleString();
            document.getElementById('my-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${user.username}`;
        }

        // Загрузка чата
        async function loadChat() {
            const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true }).limit(60);
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            
            msgs?.forEach(m => {
                const isMe = m.username === user.username;
                const nfts = allNFTs.filter(n => n.owner === m.username).map(n => n.username_text).join(', ');
                box.innerHTML += `
                    <div class="msg ${isMe ? 'mine' : ''}">
                        <b onclick="openProfile('${m.username}')">${m.username}</b> 
                        <i>${nfts ? '['+nfts+']' : ''}</i>
                        <div class="msg-text">${m.text}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

        // Отправка сообщений
        async function send() {
            if(user.is_muted) return notify("У вас мут!", "err");
            const i = document.getElementById('m-in');
            const val = i.value.trim();
            if(!val) return;
            
            const { error } = await sb.from('messages').insert([{ username: user.username, text: val }]);
            if(error) notify("Ошибка отправки!", "err");
            i.value = '';
        }

        // Профиль и Админ-действия
        async function openProfile(name) {
            const { data: target } = await sb.from('users').select('*').eq('username', name).maybeSingle();
            if(!target) return;
            viewingUser = target;
            
            const nfts = allNFTs.filter(n => n.owner === name).map(n => n.username_text).join(', ');
            document.getElementById('m-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${target.username}`;
            document.getElementById('m-name').innerText = target.username + (target.is_muted ? " (MUTED)" : "");
            document.getElementById('m-stars').innerText = "⭐ " + target.stars.toLocaleString();
            document.getElementById('m-nfts').innerText = nfts ? "NFT Имена: " + nfts : "Нет NFT имен";
            
            const adm = document.getElementById('admin-actions');
            if(user.username.toLowerCase() === 'admin' && target.username.toLowerCase() !== 'admin') {
                adm.style.display = 'block';
                document.getElementById('mute-btn').innerText = target.is_muted ? "РАЗМУТИТЬ" : "ДАТЬ МУТ";
            } else adm.style.display = 'none';

            document.getElementById('modal-overlay').style.display = 'block';
        }

        function closeProfile() { document.getElementById('modal-overlay').style.display = 'none'; }

        async function toggleMute() {
            await sb.from('users').update({ is_muted: !viewingUser.is_muted }).eq('id', viewingUser.id);
            notify("Статус изменен!");
            closeProfile();
        }

        // Чеки
        async function createCheck() {
            const amt = parseInt(document.getElementById('gen-amt').value);
            const msg = document.getElementById('gen-msg').value.trim();
            if(!amt) return notify("Укажите сумму!", "err");
            
            const code = "MOPSO-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            const { error } = await sb.from('checks').insert([{ code, amount: amt, message: msg }]);
            
            if(!error) {
                document.getElementById('last-check').innerText = code;
                notify("Чек создан!");
            } else notify("Ошибка создания!", "err");
        }

        async function redeemCheck() {
            const code = document.getElementById('c-code').value.trim();
            const { data: c, error } = await sb.from('checks').select('*').eq('code', code).eq('is_used', false).maybeSingle();
            
            if(!c) return notify("Неверный код!", "err");
            
            await sb.from('checks').update({ is_used: true }).eq('id', c.id);
            await sb.from('users').update({ stars: user.stars + c.amount }).eq('id', user.id);
            
            let res = `Вы получили ⭐ ${c.amount}`;
            if(c.message) res += `\nСообщение: ${c.message}`;
            alert(res);
            
            document.getElementById('c-code').value = '';
            notify("Звезды зачислены!");
        }

        // Переводы
        async function transfer() {
            const to = document.getElementById('g-to').value.trim();
            const amt = parseInt(document.getElementById('g-amt').value);
            if(user.stars < amt) return notify("Недостаточно звезд!", "err");
            
            const { data: rec } = await sb.from('users').select('*').eq('username', to).maybeSingle();
            if(!rec) return notify("Игрок не найден!", "err");

            await sb.from('users').update({ stars: rec.stars + amt }).eq('username', to);
            await sb.from('users').update({ stars: user.stars - amt }).eq('id', user.id);
            notify("Успешно отправлено!");
            document.getElementById('g-amt').value = '';
        }

        // NFT Минт
        async function mint() {
            const name = document.getElementById('n-name').value.trim();
            if(!name.startsWith('@')) return notify("Нужен @ в начале!", "err");
            
            const { error } = await sb.from('fragment_market').insert([{ username_text: name, owner: user.username }]);
            
            if(error) {
                notify("Имя уже занято!", "err");
            } else {
                notify("Вы успешно заняли имя!");
                document.getElementById('n-name').value = '';
                await updateNFTCache();
                loadNFTs();
            }
        }

        async function loadNFTs() {
            const l = document.getElementById('nft-list'); l.innerHTML = '';
            allNFTs.forEach(x => {
                l.innerHTML += `
                    <div class="card" style="padding:15px; text-align:center;">
                        <b style="color:var(--accent); font-size:16px;">${x.username_text}</b><br>
                        <small style="color:#555">Владелец: ${x.owner}</small>
                    </div>`;
            });
        }

        // Сервис
        async function clearAllChat() {
            if(confirm("Удалить все сообщения?")) {
                await sb.from('messages').delete().neq('username', '0');
                notify("Чат очищен!");
            }
        }

        function tab(t, btn) {
            document.querySelectorAll('.tab-view').forEach(x => x.style.display = 'none');
            document.getElementById('t-' + t).style.display = 'flex';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function notify(m, ty="success") {
            const t = document.getElementById('toast'); t.innerText = m;
            t.style.background = ty === "success" ? "var(--success)" : "var(--err)";
            t.style.top = "20px"; setTimeout(() => t.style.top = "-100px", 3000);
        }
    </script>
</body>
</html>
