<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM 29.0 | ADMIN SUPREMACY</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #ff9000; --bg: #000; --side: #0a0a0a; --chat: #050505; --brd: #1f1f1f; --text: #eee; --red: #ff3333; }
        * { box-sizing: border-box; outline: none; transition: 0.15s; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Buttons */
        .btn { background: var(--p); border: none; padding: 14px; border-radius: 14px; font-weight: 900; cursor: pointer; color: #000; width: 100%; font-size: 12px; text-transform: uppercase; }
        .btn-red { background: var(--red); color: #fff; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,144,0,0.3); }
        
        input { background: #111; border: 1px solid var(--brd); padding: 14px; border-radius: 14px; color: #fff; width: 100%; margin-bottom: 12px; font-family: 'JetBrains Mono'; }
        input:focus { border-color: var(--p); }

        /* Layout */
        #app { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; background: var(--chat); }

        /* Sidebar Profile */
        .side-profile { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--brd); cursor: pointer; background: #0d0d0d; }
        .side-av { width: 85px; height: 85px; border-radius: 35px; border: 3px solid var(--p); margin-bottom: 12px; }
        
        /* Badges */
        .badge { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 900; margin-right: 6px; letter-spacing: 1px; }
        .badge-admin { background: var(--red); color: #fff; box-shadow: 0 0 10px rgba(255,0,0,0.4); }
        .badge-user { background: #222; color: #888; }

        .nav-item { padding: 16px 25px; cursor: pointer; color: #444; font-weight: 800; font-size: 11px; }
        .nav-item.active { background: var(--p); color: #000; border-radius: 0 50px 50px 0; margin-right: 10px; }

        /* Chat */
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
        .m-wrap { display: flex; flex-direction: column; max-width: 75%; align-self: flex-start; cursor: pointer; }
        .m-wrap.me { align-self: flex-end; }
        .bubble { padding: 14px 18px; border-radius: 20px; background: #111; border: 1px solid var(--brd); font-size: 14px; position: relative; }
        .me .bubble { border-color: var(--p); background: #1a1300; }
        .u-label { font-size: 11px; font-weight: 900; color: var(--p); margin-bottom: 5px; display: flex; align-items: center; }

        /* Modal */
        #prof-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .p-card { background: var(--side); width: 330px; border-radius: 45px; border: 1px solid var(--brd); padding: 40px; text-align: center; }

        #notify { position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-150px); background: var(--p); color: #000; padding: 14px 35px; border-radius: 50px; font-weight: 900; z-index: 10000; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
    </style>
</head>
<body>

<div id="notify">SYSTEM_ONLINE</div>

<div id="auth-scr" style="position:fixed; inset:0; background:#000; z-index:8000; display:flex; align-items:center; justify-content:center;">
    <div style="width:290px; text-align:center;">
        <h1 style="font-family:'Orbitron'; color:var(--p); letter-spacing:5px;">MOPSO</h1>
        <p style="font-size:10px; color:#333; margin-bottom:30px;">SECURE TERMINAL V.29</p>
        <input type="text" id="log-u" placeholder="@username">
        <input type="password" id="log-p" placeholder="password">
        <button class="btn" onclick="login()">AUTHORIZE</button>
    </div>
</div>

<div id="prof-modal" onclick="this.style.display='none'">
    <div class="p-card" onclick="event.stopPropagation()">
        <img id="m-av" style="width:110px; height:110px; border-radius:35px; border:3px solid var(--p); margin-bottom:20px;">
        <h2 id="m-nick" style="margin:0; color:var(--p); font-family:'Orbitron';"></h2>
        <div id="m-stars" style="font-size:28px; font-weight:900; margin:15px 0; color:#00ff88;"></div>
        <div id="m-status" style="margin-bottom:30px;"></div>
        
        <div id="m-admin-tools" style="display:none; border-top:1px solid #222; padding-top:20px;">
            <button id="mute-btn" class="btn btn-red" onclick="adminToggleMute()" style="margin-bottom:10px;">BAN FROM CHAT</button>
            <button class="btn" style="background:#444; color:#fff" onclick="adminGiveStars()">GRANT 10,000 ⭐</button>
        </div>
    </div>
</div>

<div id="app">
    <aside class="sidebar">
        <div class="side-profile" onclick="openMyProfile()">
            <img id="ui-av" class="side-av">
            <div id="ui-nick-box" style="font-weight:900; color:var(--p); font-size:15px;"></div>
            <div id="ui-stars" style="font-size:13px; color:#00ff88; margin-top:6px; font-family:monospace;"></div>
        </div>
        <nav style="flex:1; padding-top:15px;">
            <div class="nav-item active" onclick="setTab('chat', this)">📡 TERMINAL</div>
            <div class="nav-item" onclick="setTab('market', this)">💎 MINT NICK (FREE)</div>
            <div class="nav-item" onclick="setTab('bank', this)">🏦 STAR BANK</div>
            <div id="ui-admin-nav" class="nav-item" style="display:none; color:var(--red);" onclick="setTab('admin', this)">⚡ ROOT ACCESS</div>
        </nav>
        <div style="padding:20px;"><button class="btn" style="background:#111; color:#333;" onclick="location.reload()">RE-BOOT</button></div>
    </aside>

    <main class="viewport">
        <div id="tab-chat" class="tab" style="display:flex; flex-direction:column; height:100%;">
            <div id="chat-box"></div>
            <div style="padding:20px; background:var(--side); display:flex; gap:12px; border-top:1px solid var(--brd);">
                <input type="text" id="msg-i" placeholder="Enter message..." style="margin:0;" onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()" style="width:70px;">SEND</button>
            </div>
        </div>

        <div id="tab-market" class="tab" style="display:none; padding:50px;">
            <h1 style="font-family:'Orbitron'; color:var(--p);">FRAGMENT_MINT</h1>
            <p style="color:#555; margin-bottom:30px;">Change your global @identity for 0 ⭐</p>
            <input type="text" id="mint-i" placeholder="Enter new @nick...">
            <button class="btn" onclick="mint()">CLAIM USERNAME</button>
        </div>

        <div id="tab-bank" class="tab" style="display:none; padding:50px;">
            <h1 style="font-family:'Orbitron'; color:var(--p);">VAULT</h1>
            <input type="text" id="check-i" placeholder="MOPSO_SONIX_XXXXXXXXXX">
            <button class="btn" onclick="redeem()">ACTIVATE CHECK</button>
        </div>

        <div id="tab-admin" class="tab" style="display:none; padding:50px;">
            <h1 style="color:var(--red); font-family:'Orbitron';">ROOT_OVERRIDE</h1>
            
            <div style="background:#111; padding:25px; border-radius:20px; border:1px solid var(--red); margin-bottom:20px;">
                <h3 style="margin-top:0;">FREE MONEY GENERATOR</h3>
                <button class="btn" onclick="genAdminCheck()">GENERATE 50,000 ⭐ CHECK</button>
                <div id="gen-res" style="margin-top:15px; font-family:monospace; color:var(--p); font-size:18px; word-break:break-all;"></div>
            </div>

            <div style="background:#111; padding:25px; border-radius:20px; border:1px solid #333;">
                <h3 style="margin-top:0;">SYSTEM CLEANUP</h3>
                <button class="btn btn-red" onclick="clearChat()">WIPE ENTIRE CHAT HISTORY</button>
            </div>
        </div>
    </main>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);

    let currUser = null;
    let viewTarget = null;

    async function login() {
        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value.trim();
        if(!u) return;
        const nick = u.startsWith('@') ? u : '@' + u;

        try {
            let { data: user } = await sb.from('users').select('*').eq('username', nick).maybeSingle();
            
            if (!user) {
                const { data: n, error: e } = await sb.from('users').insert([{ 
                    username: nick, password: p, stars: 1000, role: nick === '@admin' ? 'admin' : 'user' 
                }]).select().single();
                if(e) throw e;
                currUser = n;
            } else {
                if(user.password !== p) return toast("AUTH_FAILED: WRONG PASS", "#ff3333");
                currUser = user;
            }

            document.getElementById('auth-scr').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            if(currUser.role === 'admin') document.getElementById('ui-admin-nav').style.display = 'block';
            init();
        } catch (e) { toast("ERROR: " + e.message, "#ff3333"); }
    }

    function init() {
        updateUI(); loadChat();
        sb.channel('db').on('postgres_changes', { event: '*', schema: 'public' }, (pl) => {
            if(pl.table === 'messages') loadChat();
            if(pl.table === 'users' && pl.new?.id === currUser.id) { currUser = pl.new; updateUI(); }
        }).subscribe();
    }

    async function loadChat() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('chat-box'); box.innerHTML = '';
        msgs?.forEach(m => {
            const isMe = m.username === currUser.username;
            const isAdmin = m.username === '@admin';
            box.innerHTML += `
                <div class="m-wrap ${isMe ? 'me' : ''}" onclick="openProfile('${m.username}')">
                    <div class="u-label">
                        <span class="badge ${isAdmin ? 'badge-admin' : 'badge-user'}">${isAdmin ? 'SYSTEM ADMIN' : 'USER'}</span>
                        ${m.username}
                    </div>
                    <div class="bubble">${m.text}</div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msg-i');
        if(!i.value.trim() || currUser.is_muted) {
            if(currUser.is_muted) toast("COMMUNICATION RESTRICTED (MUTED)", "#ff3333");
            return;
        }
        await sb.from('messages').insert({ username: currUser.username, text: i.value });
        i.value = '';
    }

    async function openProfile(nick) {
        const { data: p } = await sb.from('users').select('*').eq('username', nick).single();
        if(!p) return;
        viewTarget = p;
        document.getElementById('m-nick').innerText = p.username;
        document.getElementById('m-stars').innerText = p.stars.toLocaleString() + " ⭐";
        document.getElementById('m-status').innerHTML = p.is_muted ? '<b style="color:red">MUTED</b>' : '<b style="color:#00ff88">ONLINE</b>';
        document.getElementById('m-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${p.username}`;
        
        const tools = document.getElementById('m-admin-tools');
        tools.style.display = (currUser.role === 'admin' && p.id !== currUser.id) ? 'block' : 'none';
        document.getElementById('mute-btn').innerText = p.is_muted ? "LIFT BAN" : "BAN USER";
        document.getElementById('prof-modal').style.display = 'flex';
    }

    function openMyProfile() { openProfile(currUser.username); }

    async function adminToggleMute() {
        const newState = !viewTarget.is_muted;
        await sb.from('users').update({ is_muted: newState }).eq('id', viewTarget.id);
        toast(newState ? "USER BANNED" : "USER UNBANNED");
        document.getElementById('prof-modal').style.display = 'none';
    }

    async function adminGiveStars() {
        await sb.from('users').update({ stars: viewTarget.stars + 10000 }).eq('id', viewTarget.id);
        toast("GRANTED 10K STARS");
        document.getElementById('prof-modal').style.display = 'none';
    }

    async function clearChat() {
        if(!confirm("WIPE ENTIRE DATABASE?")) return;
        await sb.from('messages').delete().neq('id', 0);
        toast("CHAT WIPED", "#ff3333");
    }

    async function mint() {
        const n = document.getElementById('mint-i').value.trim();
        const formatted = n.startsWith('@') ? n : '@' + n;
        const { data: ex } = await sb.from('users').select('*').eq('username', formatted).maybeSingle();
        if(ex) return toast("ID ALREADY CLAIMED", "#ff3333");
        
        await sb.from('messages').update({ username: formatted }).eq('username', currUser.username);
        await sb.from('users').update({ username: formatted }).eq('id', currUser.id);
        toast("IDENTITY UPDATED");
        setTimeout(() => location.reload(), 1000);
    }

    async function redeem() {
        const code = document.getElementById('check-i').value.trim();
        const { data: c } = await sb.from('checks').select('*').eq('code', code).eq('is_used', false).maybeSingle();
        if(!c) return toast("INVALID OR EXPIRED", "#ff3333");
        await sb.from('checks').update({ is_used: true }).eq('id', c.id);
        await sb.from('users').update({ stars: currUser.stars + c.amount }).eq('id', currUser.id);
        toast("ADDED " + c.amount + " ⭐");
    }

    async function genAdminCheck() {
        const code = "MOPSO_SONIX_" + Math.random().toString(36).substr(2, 10).toUpperCase();
        await sb.from('checks').insert({ code, amount: 50000 });
        document.getElementById('gen-res').innerText = code;
        toast("50K CHECK CREATED");
    }

    function updateUI() {
        const isAdmin = currUser.role === 'admin';
        document.getElementById('ui-nick-box').innerHTML = `
            <span class="badge ${isAdmin ? 'badge-admin' : 'badge-user'}">${isAdmin ? 'SYSTEM ADMIN' : 'USER'}</span>
            ${currUser.username}
        `;
        document.getElementById('ui-stars').innerText = currUser.stars.toLocaleString() + " ⭐";
        document.getElementById('ui-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${currUser.username}`;
    }

    function setTab(t, el) {
        document.querySelectorAll('.tab').forEach(x => x.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-' + t).style.display = t === 'chat' ? 'flex' : 'block';
        el.classList.add('active');
    }

    function toast(m, bg = "#ff9000") {
        const t = document.getElementById('notify');
        t.innerText = m; t.style.background = bg;
        t.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => t.style.transform = "translateX(-50%) translateY(-150px)", 3000);
    }
</script>
</body>
</html>
