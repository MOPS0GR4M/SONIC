<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM 28.0 | ADMIN POWER</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #ff9000; --bg: #000; --side: #0a0a0a; --chat: #050505; --brd: #1f1f1f; --text: #eee; --red: #ff4444; }
        * { box-sizing: border-box; outline: none; transition: 0.2s; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        .btn { background: var(--p); border: none; padding: 12px; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; width: 100%; font-size: 13px; }
        .btn-red { background: var(--red); color: #fff; }
        input { background: #111; border: 1px solid var(--brd); padding: 12px; border-radius: 12px; color: #fff; width: 100%; margin-bottom: 10px; font-family: 'JetBrains Mono'; }

        #app { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; background: var(--chat); }

        /* Профиль */
        .side-profile { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--brd); cursor: pointer; }
        .side-av { width: 80px; height: 80px; border-radius: 30px; border: 2px solid var(--p); margin-bottom: 10px; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-right: 5px; font-weight: 900; }
        .badge-admin { background: var(--red); color: white; }
        .badge-user { background: #333; color: #aaa; }

        .nav-item { padding: 15px 25px; cursor: pointer; color: #555; font-weight: 800; font-size: 11px; text-transform: uppercase; }
        .nav-item.active { background: var(--p); color: #000; border-radius: 0 50px 50px 0; margin-right: 10px; }

        /* Чат */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m-wrap { display: flex; flex-direction: column; max-width: 80%; align-self: flex-start; cursor: pointer; }
        .m-wrap.me { align-self: flex-end; }
        .bubble { padding: 12px 16px; border-radius: 18px; background: #111; border: 1px solid var(--brd); font-size: 14px; }
        .me .bubble { border-color: var(--p); background: #1a1300; }
        .u-label { font-size: 10px; font-weight: 900; color: var(--p); margin-bottom: 4px; display: flex; align-items: center; }

        /* Модалка */
        #prof-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .p-card { background: var(--side); width: 320px; border-radius: 40px; border: 1px solid var(--brd); padding: 40px; text-align: center; }

        #notify { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150px); background: var(--p); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 900; z-index: 10000; transition: 0.5s; }
    </style>
</head>
<body>

<div id="notify">SYSTEM_READY</div>

<div id="auth-scr" style="position:fixed; inset:0; background:#000; z-index:8000; display:flex; align-items:center; justify-content:center;">
    <div style="width:300px; text-align:center;">
        <h1 style="font-family:'Orbitron'; color:var(--p);">MOPSOGRAM</h1>
        <input type="text" id="log-u" placeholder="@username">
        <input type="password" id="log-p" placeholder="password">
        <button class="btn" onclick="login()">SYNC SESSION</button>
    </div>
</div>

<div id="prof-modal" onclick="this.style.display='none'">
    <div class="p-card" onclick="event.stopPropagation()">
        <img id="m-av" style="width:100px; height:100px; border-radius:30px; border:2px solid var(--p); margin-bottom:15px;">
        <h2 id="m-nick" style="margin:0; color:var(--p);"></h2>
        <div id="m-stars" style="font-size:24px; font-weight:900; margin:10px 0;"></div>
        <div id="m-status" style="margin-bottom:20px;"></div>
        
        <div id="m-admin-tools" style="display:none; border-top:1px solid #222; padding-top:20px; gap:10px; display:none;">
            <button id="mute-btn" class="btn btn-red" onclick="adminToggleMute()" style="margin-bottom:10px;">MUTE USER</button>
            <button class="btn" style="background:#555; color:#fff" onclick="adminGiveStars()">GIVE 1000 ⭐</button>
        </div>
    </div>
</div>

<div id="app">
    <aside class="sidebar">
        <div class="side-profile" onclick="openMyProfile()">
            <img id="ui-av" class="side-av">
            <div id="ui-nick-container" style="font-weight:900; color:var(--p);"></div>
            <div id="ui-stars" style="font-size:14px; color:#00ff88; margin-top:5px;"></div>
        </div>
        <nav style="flex:1;">
            <div class="nav-item active" onclick="setTab('chat', this)">📡 TERMINAL</div>
            <div class="nav-item" onclick="setTab('market', this)">💎 MINT NICK</div>
            <div class="nav-item" onclick="setTab('bank', this)">🏦 BANK</div>
            <div id="ui-admin-nav" class="nav-item" style="display:none; color:var(--red);" onclick="setTab('admin', this)">⚡ ROOT</div>
        </nav>
        <div style="padding:20px;"><button class="btn" style="background:#111; color:#444;" onclick="location.reload()">EXIT</button></div>
    </aside>

    <main class="viewport">
        <div id="tab-chat" class="tab" style="display:flex; flex-direction:column; height:100%;">
            <div id="chat-box"></div>
            <div style="padding:20px; background:var(--side); display:flex; gap:10px;">
                <input type="text" id="msg-i" placeholder="Write..." style="margin:0;" onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()" style="width:60px;">➔</button>
            </div>
        </div>

        <div id="tab-market" class="tab" style="display:none; padding:40px;">
            <h2>FREE MINT</h2>
            <input type="text" id="mint-i" placeholder="New @nick...">
            <button class="btn" onclick="mint()">CHANGE NICKNAME</button>
        </div>

        <div id="tab-bank" class="tab" style="display:none; padding:40px;">
            <h2>BANK</h2>
            <input type="text" id="check-i" placeholder="MOPSO_SONIX_XXXXX">
            <button class="btn" onclick="redeem()">REDEEM</button>
        </div>

        <div id="tab-admin" class="tab" style="display:none; padding:40px;">
            <h2 style="color:var(--red);">ROOT PANEL</h2>
            <button class="btn" onclick="gen()" style="margin-bottom:20px;">GENERATE 5000 ⭐ CHECK</button>
            <div id="gen-res" style="margin-bottom:30px; font-family:monospace; color:var(--p);"></div>
            
            <h3 style="color:var(--red);">DANGER ZONE</h3>
            <button class="btn btn-red" onclick="clearChat()">WIPE ALL MESSAGES (CLEAN)</button>
        </div>
    </main>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);

    let currUser = null;
    let viewTarget = null;

    async function login() {
        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value.trim();
        if(!u) return;
        const nick = u.startsWith('@') ? u : '@' + u;

        let { data: user } = await sb.from('users').select('*').eq('username', nick).maybeSingle();
        
        if (!user) {
            const { data: n } = await sb.from('users').insert([{ username: nick, password: p, stars: 1000, role: nick === '@admin' ? 'admin' : 'user' }]).select().single();
            currUser = n;
        } else {
            if(user.password !== p) return toast("WRONG PASS", "#ff4444");
            currUser = user;
        }

        document.getElementById('auth-scr').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if(currUser.role === 'admin') document.getElementById('ui-admin-nav').style.display = 'block';
        init();
    }

    function init() {
        updateUI(); loadChat();
        sb.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, (pl) => {
            if(pl.table === 'messages') loadChat();
            if(pl.table === 'users' && pl.new?.id === currUser.id) { currUser = pl.new; updateUI(); }
        }).subscribe();
    }

    async function loadChat() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('chat-box');
        box.innerHTML = '';
        msgs?.forEach(m => {
            const isMe = m.username === currUser.username;
            const isAdmin = m.username === '@admin';
            box.innerHTML += `
                <div class="m-wrap ${isMe ? 'me' : ''}" onclick="openProfile('${m.username}')">
                    <div class="u-label">
                        <span class="badge ${isAdmin ? 'badge-admin' : 'badge-user'}">${isAdmin ? 'ADMIN' : 'USER'}</span>
                        ${m.username}
                    </div>
                    <div class="bubble">${m.text}</div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const i = document.getElementById('msg-i');
        if(!i.value.trim() || currUser.is_muted) {
            if(currUser.is_muted) toast("YOU ARE MUTED", "#ff4444");
            return;
        }
        await sb.from('messages').insert({ username: currUser.username, text: i.value });
        i.value = '';
    }

    async function openProfile(nick) {
        const { data: p } = await sb.from('users').select('*').eq('username', nick).single();
        if(!p) return;
        viewTarget = p;
        document.getElementById('m-nick').innerText = p.username;
        document.getElementById('m-stars').innerText = p.stars + " ⭐";
        document.getElementById('m-status').innerHTML = p.is_muted ? '<b style="color:red">MUTED</b>' : '<b style="color:green">ACTIVE</b>';
        document.getElementById('m-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${p.username}`;
        
        const tools = document.getElementById('m-admin-tools');
        tools.style.display = (currUser.role === 'admin' && p.id !== currUser.id) ? 'block' : 'none';
        document.getElementById('mute-btn').innerText = p.is_muted ? "UNMUTE" : "MUTE USER";
        
        document.getElementById('prof-modal').style.display = 'flex';
    }

    function openMyProfile() { openProfile(currUser.username); }

    async function adminToggleMute() {
        const newState = !viewTarget.is_muted;
        await sb.from('users').update({ is_muted: newState }).eq('id', viewTarget.id);
        toast(newState ? "MUTED" : "UNMUTED");
        document.getElementById('prof-modal').style.display = 'none';
    }

    async function adminGiveStars() {
        await sb.from('users').update({ stars: viewTarget.stars + 1000 }).eq('id', viewTarget.id);
        toast("GAVE 1000 STARS");
        document.getElementById('prof-modal').style.display = 'none';
    }

    async function clearChat() {
        if(!confirm("WIPE ALL MESSAGES?")) return;
        const { error } = await sb.from('messages').delete().neq('id', 0); // Удаляет всё
        if(!error) toast("CHAT CLEANED");
    }

    async function mint() {
        const n = document.getElementById('mint-i').value.trim();
        const formatted = n.startsWith('@') ? n : '@' + n;
        const { data: ex } = await sb.from('users').select('*').eq('username', formatted).maybeSingle();
        if(ex) return toast("TAKEN");
        
        // Обновляем ник и сообщения
        await sb.from('messages').update({ username: formatted }).eq('username', currUser.username);
        await sb.from('users').update({ username: formatted }).eq('id', currUser.id);
        location.reload();
    }

    async function redeem() {
        const code = document.getElementById('check-i').value.trim();
        const { data: c } = await sb.from('checks').select('*').eq('code', code).eq('is_used', false).maybeSingle();
        if(!c) return toast("INVALID");
        await sb.from('checks').update({ is_used: true }).eq('id', c.id);
        await sb.from('users').update({ stars: currUser.stars + c.amount }).eq('id', currUser.id);
        toast("SUCCESS");
    }

    async function gen() {
        const code = "MOPSO_SONIX_" + Math.floor(Math.random() * 1e10);
        await sb.from('checks').insert({ code, amount: 5000 });
        document.getElementById('gen-res').innerText = code;
    }

    function updateUI() {
        const isAdmin = currUser.role === 'admin';
        document.getElementById('ui-nick-container').innerHTML = `
            <span class="badge ${isAdmin ? 'badge-admin' : 'badge-user'}">${isAdmin ? 'ADMIN' : 'USER'}</span>
            ${currUser.username}
        `;
        document.getElementById('ui-stars').innerText = currUser.stars.toLocaleString() + " ⭐";
        document.getElementById('ui-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${currUser.username}`;
    }

    function setTab(t, el) {
        document.querySelectorAll('.tab').forEach(x => x.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        document.getElementById('tab-' + t).style.display = t === 'chat' ? 'flex' : 'block';
        el.classList.add('active');
    }

    function toast(m, bg = "#ff9000") {
        const t = document.getElementById('notify');
        t.innerText = m; t.style.background = bg;
        t.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => t.style.transform = "translateX(-50%) translateY(-150px)", 3000);
    }
</script>
</body>
</html>
