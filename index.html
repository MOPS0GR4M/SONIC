<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | SUPREME CONTROL V4</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #000; --card: #0a0a0a; --accent: #ff6600; 
            --text: #fff; --text-dim: #777; --border: #151515; 
            --bot: #00e5ff; --err: #ff3333;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* ГЛАВНЫЕ СТРАНИЦЫ - УБРАНА ПРОЗРАЧНОСТЬ */
        .page { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .page.active { display: flex; }

        /* ЭКРАН ВХОДА */
        .auth-screen { align-items: center; justify-content: center; background: radial-gradient(circle, #1a0d00, #000); }
        .auth-card { 
            background: var(--card); border: 1px solid var(--border); padding: 50px; border-radius: 40px; 
            width: 380px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }
        .auth-card h1 { font-size: 28px; letter-spacing: 8px; color: var(--accent); margin-bottom: 30px; font-weight: 900; }
        .auth-input { 
            width: 100%; padding: 15px; margin-bottom: 12px; background: #000; border: 1px solid var(--border); 
            color: #fff; border-radius: 12px; outline: none; font-size: 16px;
        }
        .auth-input:focus { border-color: var(--accent); }

        /* САЙДБАР */
        .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .profile-area { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .user-avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); margin-bottom: 12px; object-fit: cover; }
        .balance { font-size: 26px; font-weight: 900; color: var(--accent); }

        .nav-btn { 
            padding: 20px 30px; cursor: pointer; color: var(--text-dim); font-weight: bold; font-size: 11px; 
            text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid transparent;
        }
        .nav-btn:hover { background: rgba(255,102,0,0.05); color: #fff; }
        .nav-btn.active { color: var(--accent); background: rgba(255,102,0,0.08); border-left-color: var(--accent); }

        /* КОНТЕНТ */
        .main-view { flex: 1; display: flex; flex-direction: column; background: #000; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .msg { 
            max-width: 80%; padding: 14px 18px; border-radius: 20px; background: #0d0d0d; border: 1px solid var(--border); 
            position: relative; animation: msgIn 0.3s ease; line-height: 1.4;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-out { align-self: flex-end; border-color: #352100; background: #120c00; }
        .msg-bot { align-self: center; border-color: var(--bot); color: var(--bot); width: 90%; text-align: center; border-style: dashed; }
        
        .msg-info { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
        .msg-info b { color: var(--accent); cursor: pointer; }
        .del-x { color: var(--err); cursor: pointer; margin-left: 10px; font-weight: 900; }

        .input-bar { padding: 20px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .input-bar input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; outline: none; }

        .btn { 
            padding: 14px 25px; border-radius: 12px; border: none; background: var(--accent); color: #000; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 11px;
        }
        .btn:hover { transform: scale(1.03); }

        /* ВКЛАДКИ */
        .tab-view { display: none; padding: 35px; flex-direction: column; gap: 20px; overflow-y: auto; height: 100%; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 30px; }

        /* УВЕДОМЛЕНИЯ */
        #toast { 
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); 
            padding: 15px 35px; border-radius: 50px; background: var(--accent); color: #000; 
            font-weight: 900; z-index: 1000; transition: 0.5s; 
        }
    </style>
</head>
<body>

    <div id="toast">СИСТЕМА ГОТОВА</div>

    <div id="page-auth" class="page active auth-screen">
        <div class="auth-card">
            <h1>MOPSOGRAM</h1>
            <input type="text" id="login-u" class="auth-input" placeholder="ЛОГИН">
            <input type="password" id="pass-u" class="auth-input" placeholder="ПАРОЛЬ">
            <button class="btn" style="width: 100%; margin-top: 10px; padding: 18px;" onclick="doAuth()">ВОЙТИ</button>
        </div>
    </div>

    <div id="page-main" class="page">
        <div class="sidebar">
            <div class="profile-area">
                <img class="user-avatar" id="avatar-img" src="">
                <div id="user-name" style="font-weight: 900; font-size: 20px;">USER</div>
                <div id="user-stars" class="balance">⭐ 0</div>
            </div>
            <div class="nav-btn active" onclick="setTab('chat', this)">💬 ЧАТ</div>
            <div class="nav-btn" onclick="setTab('bank', this)">💰 БАНК</div>
            <div class="nav-btn" onclick="setTab('frag', this)">💎 FRAGMENT</div>
            <div style="margin-top: auto; padding: 20px;">
                <button class="btn" style="width:100%; background: #111; color: #fff;" onclick="location.reload()">ВЫЙТИ</button>
            </div>
        </div>

        <div class="main-view">
            <div id="tab-chat" class="tab-view" style="display: flex; padding: 0;">
                <div id="chat-box"></div>
                <div class="input-bar">
                    <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
                    <button class="btn" onclick="sendMsg()">SEND</button>
                </div>
            </div>

            <div id="tab-bank" class="tab-view">
                <div class="card">
                    <h2 style="color:var(--accent); margin-top:0;">ПЕРЕВОД</h2>
                    <input type="text" id="gift-to" class="auth-input" placeholder="Кому (логин)">
                    <input type="number" id="gift-amt" class="auth-input" placeholder="Сумма ⭐">
                    <button class="btn" onclick="transfer()">ОТПРАВИТЬ</button>
                </div>
                <div class="card">
                    <h2 style="margin-top:0;">ЧЕКИ</h2>
                    <input type="text" id="check-code" class="auth-input" placeholder="GIFT-XXXXXX">
                    <button class="btn" style="background:#fff; color:#000" onclick="claim()">АКТИВИРОВАТЬ</button>
                </div>
            </div>

            <div id="tab-frag" class="tab-view">
                <div class="card">
                    <h2 style="color:var(--accent); margin-top:0;">MINT NFT (БЕСПЛАТНО)</h2>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="nft-name" class="auth-input" placeholder="@username" style="margin-bottom:0;">
                        <button class="btn" onclick="mintNFT()">MINT</button>
                    </div>
                </div>
                <div id="nft-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. СРАЗУ СОЗДАЕМ КЛИЕНТ (Без этого всё упадет)
        const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
        const sb = supabase.createClient(S_URL, S_KEY);
        
        let user = null;

        // 2. ФУНКЦИЯ ВХОДА
        async function doAuth() {
            const u = document.getElementById('login-u').value.trim();
            const p = document.getElementById('pass-u').value.trim();
            if(!u || !p) return notify("Заполни всё!", "err");

            try {
                let { data: ex, error } = await sb.from('users').select('*').eq('username', u).maybeSingle();
                
                if(!ex) {
                    const { data: n, error: e2 } = await sb.from('users').insert([{ username: u, password: p, stars: 1000 }]).select().single();
                    user = n;
                } else {
                    if(ex.password === p) user = ex;
                    else return notify("Пароль не тот!", "err");
                }
                
                if(user) startApp();
            } catch(e) {
                alert("Ошибка: " + e.message);
            }
        }

        // 3. ЗАПУСК ПРИЛОЖЕНИЯ
        function startApp() {
            document.getElementById('page-auth').classList.remove('active');
            document.getElementById('page-main').classList.add('active');
            
            if(user.stars === null) user.stars = 0;
            
            updateUI();
            loadChat();
            loadNFTs();

            // REALTIME ОБНОВЛЕНИЯ
            sb.channel('ch').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadChat()).subscribe();
            sb.channel('us').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `username=eq.${user.username}` }, (pl) => {
                user = pl.new;
                updateUI();
            }).subscribe();
        }

        function updateUI() {
            document.getElementById('user-name').innerText = user.username;
            document.getElementById('user-stars').innerText = `⭐ ${(user.stars || 0).toLocaleString()}`;
            document.getElementById('avatar-img').src = `https://api.dicebear.com/7.x/identicon/svg?seed=${user.username}`;
        }

        async function loadChat() {
            const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true });
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            const isAdmin = user.username.toLowerCase() === 'admin';

            data?.forEach(m => {
                const isMe = m.username === user.username;
                box.innerHTML += `
                    <div class="msg ${isMe ? 'msg-out' : ''} ${m.username.includes('BOT') ? 'msg-bot' : ''}">
                        <div class="msg-info">
                            <b>${m.username}</b>
                            ${isAdmin && !m.username.includes('BOT') ? `<span class="del-x" onclick="delMsg(${m.id})">×</span>` : ''}
                        </div>
                        <div>${m.text}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        }

        async function sendMsg() {
            const i = document.getElementById('msg-input');
            const v = i.value.trim();
            if(!v) return;

            if(user.username.toLowerCase() === 'admin' && v.startsWith('!check')) {
                const p = v.split(' ');
                const code = "GIFT-" + Math.random().toString(36).substring(2,8).toUpperCase();
                await sb.from('checks').insert([{ code: code, amount: parseInt(p[1])||1000, uses_left: parseInt(p[2])||1 }]);
                await sb.from('messages').insert([{ username: '🤖 BOT', text: `РАЗДАЧА: <b>${code}</b> на ⭐${p[1]||1000}` }]);
            } else {
                await sb.from('messages').insert([{ username: user.username, text: v }]);
            }
            i.value = '';
        }

        async function delMsg(id) { await sb.from('messages').delete().eq('id', id); }

        async function transfer() {
            const to = document.getElementById('gift-to').value.trim();
            const amt = parseInt(document.getElementById('gift-amt').value);
            if(user.stars < amt) return notify("Мало звезд!", "err");
            const { data: r } = await sb.from('users').select('*').eq('username', to).maybeSingle();
            if(!r) return notify("Нет юзера!", "err");

            await sb.from('users').update({ stars: user.stars - amt }).eq('username', user.username);
            await sb.from('users').update({ stars: r.stars + amt }).eq('username', to);
            notify("Отправлено!");
        }

        async function claim() {
            const c = document.getElementById('check-code').value.trim();
            const { data: ch } = await sb.from('checks').select('*').eq('code', c).maybeSingle();
            if(!ch || ch.uses_left <= 0) return notify("Код не работает", "err");

            await sb.from('users').update({ stars: user.stars + ch.amount }).eq('username', user.username);
            await sb.from('checks').update({ uses_left: ch.uses_left - 1 }).eq('code', c);
            notify("Звезды получены!");
        }

        async function mintNFT() {
            const n = document.getElementById('nft-name').value.trim();
            if(!n.startsWith('@')) return notify("Нужно @", "err");
            const { error } = await sb.from('fragment_market').insert([{ username_text: n, owner: user.username }]);
            if(error) return notify("Занято!", "err");
            notify("NFT создан!");
            loadNFTs();
        }

        async function loadNFTs() {
            const { data } = await sb.from('fragment_market').select('*').order('created_at', { ascending: false });
            const l = document.getElementById('nft-list'); l.innerHTML = '';
            data?.forEach(x => {
                l.innerHTML += `<div class="card" style="padding:15px"><b>${x.username_text}</b><br><small>${x.owner}</small></div>`;
            });
        }

        function setTab(t, btn) {
            document.querySelectorAll('.tab-view').forEach(x => x.style.display = 'none');
            document.getElementById('tab-' + t).style.display = 'flex';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function notify(m, ty="success") {
            const t = document.getElementById('toast');
            t.innerText = m;
            t.style.background = ty === "success" ? "var(--accent)" : "var(--err)";
            t.style.top = "20px";
            setTimeout(() => t.style.top = "-100px", 3000);
        }
    </script>
</body>
</html>
