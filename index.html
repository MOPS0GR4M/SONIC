<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | FRAGMENT EDITION</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --p: #ff9000; --bg: #000; --side: #0a0a0a; --chat: #050505;
            --brd: #1f1f1f; --text: #eee; --muted: #666;
        }

        * { box-sizing: border-box; outline: none; transition: 0.2s; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* UI ELEMENTS */
        .btn { background: var(--p); border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; font-size: 13px; }
        .btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,144,0,0.3); }
        input { background: #111; border: 1px solid var(--brd); padding: 12px 15px; border-radius: 12px; color: #fff; font-family: 'JetBrains Mono'; width: 100%; }
        input:focus { border-color: var(--p); }

        /* LAYOUT */
        .app-grid { display: none; height: 100vh; width: 100vw; display: flex; }
        .sidebar { width: 320px; background: var(--side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .nav-link { padding: 18px 25px; cursor: pointer; color: var(--muted); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link.active { background: var(--p); color: #000; border-radius: 0 50px 50px 0; margin-right: 15px; }

        .viewport { flex: 1; display: flex; flex-direction: column; background: var(--chat); }

        /* VIEWS */
        .tab-content { display: none; flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }

        /* CHAT */
        #messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; background: #111; border: 1px solid var(--brd); cursor: pointer; animation: slideUp 0.3s ease; }
        .msg.me { align-self: flex-end; border-color: var(--p); background: #1a1300; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MODAL (MINI-PROFILE) */
        #profile-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .profile-card { background: var(--side); width: 340px; border-radius: 35px; border: 1px solid var(--brd); padding: 40px; text-align: center; }
        .profile-av { width: 120px; height: 120px; border-radius: 40px; border: 3px solid var(--p); margin-bottom: 20px; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--p); color: #000; padding: 12px 30px; border-radius: 50px; font-weight: 800; z-index: 10000; }
    </style>
</head>
<body>

<div id="toast">SYSTEM_INIT</div>

<div id="auth-screen" style="position:fixed; inset:0; background:#000; z-index:9000; display:flex; align-items:center; justify-content:center;">
    <div style="width:300px; text-align:center;">
        <h1 style="font-family:'Orbitron'; color:var(--p); font-size:24px;">MOPSOGRAM</h1>
        <input type="text" id="a-u" placeholder="@username" style="margin-bottom:10px">
        <input type="password" id="a-p" placeholder="password" style="margin-bottom:20px">
        <button class="btn" style="width:100%" onclick="auth()">OPEN TERMINAL</button>
    </div>
</div>

<div id="profile-modal" onclick="this.style.display='none'">
    <div class="profile-card" onclick="event.stopPropagation()">
        <img id="p-av" class="profile-av" src="">
        <h2 id="p-nick" style="color:var(--p); margin:0;"></h2>
        <div id="p-stars" style="font-size: 24px; font-weight: 900; margin: 15px 0;">0 ⭐</div>
        <div id="p-role" style="font-size: 10px; color: var(--muted); text-transform: uppercase; margin-bottom: 25px;">LEVEL 1 USER</div>
        
        <div id="p-admin-tools" style="display:none; border-top: 1px solid var(--brd); padding-top: 20px;">
            <button class="btn" style="background:#ff4444; color:#fff; width:100%" onclick="muteUser()">MUTE USER</button>
        </div>
    </div>
</div>

<div class="app-grid" id="app">
    <aside class="sidebar">
        <div style="padding:40px 30px; border-bottom:1px solid var(--brd);">
            <div id="my-nick" style="font-weight:900; color:var(--p);">@GUEST</div>
            <div id="my-stars" style="font-size:20px; margin-top:5px;">0 ⭐</div>
        </div>
        <nav style="flex:1; padding-top:20px;">
            <div class="nav-link active" onclick="showTab('chat', this)">📡 Global Chat</div>
            <div class="nav-link" onclick="showTab('market', this)">💎 Fragment Market</div>
            <div class="nav-link" onclick="showTab('bank', this)">🏦 Central Bank</div>
            <div id="adm-nav" class="nav-link" style="display:none; color:#ff4444;" onclick="showTab('admin', this)">⚡ Root Control</div>
        </nav>
        <button class="nav-link" style="border:none; background:none; text-align:left; width:100%; color:#ff4444" onclick="location.reload()">🔌 Logout</button>
    </aside>

    <main class="viewport">
        <div id="view-chat" class="tab-content active" style="display:flex; flex-direction:column;">
            <div id="messages"></div>
            <div style="padding-top:20px; display:flex; gap:10px;">
                <input type="text" id="chat-i" placeholder="Write to terminal..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()">➔</button>
            </div>
        </div>

        <div id="view-market" class="tab-content">
            <h1 style="font-family:'Orbitron'; color:var(--p);">FRAGMENT_MARKET</h1>
            <p style="color:var(--muted)">Buy exclusive usernames for Stars.</p>
            <div style="background:var(--side); padding:30px; border-radius:20px; border:1px solid var(--brd);">
                <h3>BUY NEW USERNAME</h3>
                <input type="text" id="new-nick-i" placeholder="Enter new @username..." style="margin-bottom:15px;">
                <div style="color:var(--muted); font-size:12px; margin-bottom:20px;">Price: 2,500 ⭐</div>
                <button class="btn" onclick="buyNick()">PURCHASE NFT NICK</button>
            </div>
        </div>

        <div id="view-bank" class="tab-content">
            <h1 style="font-family:'Orbitron'; color:var(--p);">CENTRAL_BANK</h1>
            <div style="background:var(--side); padding:30px; border-radius:20px; border:1px solid var(--brd);">
                <h3>REDEEM STAR-CHECK</h3>
                <p style="font-size:12px; color:var(--muted)">Example: MOPSO_SONIX_123321123</p>
                <input type="text" id="check-i" placeholder="Enter check code..." style="margin-bottom:20px;">
                <button class="btn" style="width:100%" onclick="redeem()">ACTIVATE CHECK</button>
            </div>
        </div>

        <div id="view-admin" class="tab-content">
            <h1 style="color:#ff4444; font-family:'Orbitron';">ROOT_TERMINAL</h1>
            <div style="background:var(--side); padding:30px; border-radius:20px; border:1px solid #ff444433;">
                <h3>GENERATE CHECK</h3>
                <input type="number" id="gen-amt" placeholder="Amount of stars" style="margin-bottom:15px;">
                <button class="btn" style="background:#ff4444; color:#fff" onclick="genCheck()">CREATE CODE</button>
                <div id="gen-res" style="margin-top:20px; font-family:'JetBrains Mono'; color:var(--p);"></div>
            </div>
        </div>
    </main>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = null;
    let targetUser = null;

    async function auth() {
        const u = document.getElementById('a-u').value.trim();
        const p = document.getElementById('a-p').value.trim();
        if(!u || !p) return;
        const nick = u.startsWith('@') ? u : '@' + u;

        let { data: ex } = await sb.from('users').select('*').eq('username', nick).maybeSingle();
        if(!ex) {
            const { data: n } = await sb.from('users').insert([{ username: nick, password: p, stars: 1000, role: nick === '@admin' ? 'admin' : 'user' }]).select().single();
            user = n;
        } else {
            if(ex.password !== p) return alert("Wrong password");
            user = ex;
        }

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if(user.role === 'admin') document.getElementById('adm-nav').style.display = 'block';
        init();
    }

    function init() {
        updateUI();
        syncChat();
        sb.channel('global').on('postgres_changes', { event: '*', schema: 'public' }, (pl) => {
            if(pl.table === 'messages') syncChat();
            if(pl.table === 'users' && pl.new.id === user.id) { user = pl.new; updateUI(); }
        }).subscribe();
    }

    async function syncChat() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('messages');
        box.innerHTML = '';
        msgs?.forEach(m => {
            const isMe = m.username === user.username;
            box.innerHTML += `<div class="msg ${isMe ? 'me' : ''}" onclick="openProfile('${m.username}')">
                <div style="font-size:10px; font-weight:800; color:var(--p); margin-bottom:4px;">${m.username}</div>
                <div>${m.text}</div>
            </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function openProfile(nick) {
        const { data: p } = await sb.from('users').select('*').eq('username', nick).single();
        if(!p) return;
        targetUser = p;
        document.getElementById('p-nick').innerText = p.username;
        document.getElementById('p-stars').innerText = p.stars + " ⭐";
        document.getElementById('p-av').src = `https://api.dicebear.com/7.x/bottts-neutral/svg?seed=${p.username}`;
        document.getElementById('p-admin-tools').style.display = user.role === 'admin' ? 'block' : 'none';
        document.getElementById('profile-modal').style.display = 'flex';
    }

    async function send() {
        const i = document.getElementById('chat-i');
        if(!i.value.trim() || user.is_muted) return;
        await sb.from('messages').insert({ username: user.username, text: i.value });
        i.value = '';
    }

    async function redeem() {
        const code = document.getElementById('check-i').value.trim();
        const { data: c } = await sb.from('checks').select('*').eq('code', code).eq('is_used', false).maybeSingle();
        if(!c) return notify("INVALID CHECK", "#ff4444");

        await sb.from('checks').update({ is_used: true }).eq('id', c.id);
        await sb.from('users').update({ stars: user.stars + c.amount }).eq('id', user.id);
        notify("SUCCESS: +" + c.amount + " STARS");
    }

    async function buyNick() {
        const n = document.getElementById('new-nick-i').value.trim();
        const formatted = n.startsWith('@') ? n : '@' + n;
        if(user.stars < 2500) return notify("NOT ENOUGH STARS", "#ff4444");
        
        const { data: ex } = await sb.from('users').select('*').eq('username', formatted).maybeSingle();
        if(ex) return notify("ALREADY TAKEN", "#ff4444");

        await sb.from('users').update({ username: formatted, stars: user.stars - 2500 }).eq('id', user.id);
        notify("OWNERSHIP TRANSFERRED!");
        setTimeout(() => location.reload(), 2000);
    }

    async function genCheck() {
        const amt = document.getElementById('gen-amt').value;
        const code = "MOPSO_SONIX_" + Math.floor(Math.random() * 999999999);
        await sb.from('checks').insert({ code, amount: amt });
        document.getElementById('gen-res').innerText = code;
    }

    function updateUI() {
        document.getElementById('my-nick').innerText = user.username;
        document.getElementById('my-stars').innerText = user.stars.toLocaleString() + " ⭐";
    }

    function showTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('view-' + t).classList.add('active');
        el.classList.add('active');
    }

    function notify(m, bg = "#ff9000") {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.background = bg;
        t.style.transform = "translateX(-50%) translateY(0)";
        setTimeout(() => t.style.transform = "translateX(-50%) translateY(-100px)", 3000);
    }
</script>
</body>
</html>
