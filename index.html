<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM | SUPREME EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg: #020202; --card: #0a0a0a; --accent: #ff6600; --accent-glow: rgba(255, 102, 0, 0.2);
            --text: #ffffff; --text-dim: #777; --border: #151515; --bot: #00e5ff; --err: #ff3333;
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Segoe UI', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); height: 100vh; width: 100vw; overflow: hidden; }

        .page { display: none; height: 100vh; width: 100vw; flex-direction: row; animation: fadeIn 0.4s ease; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ЭКРАН ВХОДА */
        .auth-screen { width: 100%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0f00, #000); }
        .auth-card { background: var(--card); border: 1px solid var(--border); padding: 50px; border-radius: 40px; width: 360px; text-align: center; box-shadow: 0 20px 60px #000; }
        .auth-card h1 { font-size: 28px; letter-spacing: 10px; color: var(--accent); margin-bottom: 30px; font-weight: 900; }

        /* САЙДБАР */
        .sidebar { width: 300px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .profile-area { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); background: linear-gradient(to bottom, rgba(255,102,0,0.05), transparent); }
        .user-avatar { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; margin-bottom: 12px; }
        .username-display { font-size: 18px; font-weight: 800; margin: 0; }
        .star-balance { font-size: 26px; font-weight: 900; color: var(--accent); margin-top: 8px; }

        .nav-btn { padding: 18px 30px; cursor: pointer; color: var(--text-dim); font-weight: bold; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 15px; }
        .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.02); }
        .nav-btn.active-tab { color: var(--accent); background: rgba(255,102,0,0.07); border-left: 4px solid var(--accent); }

        /* ГЛАВНЫЙ КОНТЕНТ */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; overflow: hidden; position: relative; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }

        /* СООБЩЕНИЯ */
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 20px; background: #0d0d0d; border: 1px solid var(--border); position: relative; }
        .msg-out { align-self: flex-end; border-color: #301b00; background: #150d00; }
        .msg-bot { align-self: center; border-color: var(--bot); color: var(--bot); text-align: center; width: 90%; background: rgba(0, 229, 255, 0.05); }
        
        .msg-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .msg b { color: var(--accent); cursor: pointer; font-size: 13px; }
        .del-x { color: var(--err); cursor: pointer; font-weight: 900; font-size: 14px; padding-left: 10px; }

        /* ИНПУТ */
        .input-bar { padding: 20px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 12px; }
        input { background: #050505; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 14px; width: 100%; outline: none; }
        .btn { padding: 14px 24px; border-radius: 14px; border: none; background: var(--accent); color: #000; font-weight: 900; cursor: pointer; font-size: 11px; }

        /* ОВЕРЛЕЙ ПРОФИЛЯ */
        #p-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:1000; }
        .p-card { background:var(--card); border:1px solid var(--accent); padding:40px; border-radius:40px; text-align:center; min-width:300px; }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 16px 35px; border-radius: 50px; background: var(--accent); color: #000; font-weight: bold; z-index: 9999; }
    </style>
</head>
<body>

    <div id="toast">SYSTEM READY</div>

    <div id="p-overlay" onclick="this.style.display='none'">
        <div class="p-card" onclick="event.stopPropagation()">
            <img id="p-img" class="user-avatar" src="" style="width:100px; height:100px;">
            <h2 id="p-user" style="margin:10px 0; color:var(--accent);"></h2>
            <div id="p-stars" style="font-size:20px; font-weight:900; margin-bottom:15px;"></div>
            <div id="p-nicks" style="color:var(--text-dim); font-size:12px;"></div>
        </div>
    </div>

    <div id="auth-page" class="page active auth-screen">
        <div class="auth-card">
            <h1>MOPSOGRAM</h1>
            <input type="text" id="u-login" placeholder="ЛОГИН">
            <input type="password" id="u-pass" placeholder="ПАРОЛЬ">
            <button class="btn" style="width: 100%; margin-top: 15px;" onclick="auth()">OPEN GATE</button>
        </div>
    </div>

    <div id="main-page" class="page">
        <div class="sidebar">
            <div class="profile-area">
                <img id="my-av" class="user-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <h3 id="display-u" class="username-display">USER</h3>
                <div id="display-s" class="star-balance">⭐ 0</div>
            </div>
            <div class="nav-btn active-tab" onclick="tab('chat', this)">💬 ОБЩИЙ ЧАТ</div>
            <div class="nav-btn" onclick="tab('bank', this)">💰 БАНКИНГ</div>
            <div class="nav-btn" onclick="tab('frag', this)">💎 ФРАГМЕНТ</div>
        </div>

        <div id="tab-chat" class="main-content">
            <div id="chat-box"></div>
            <div class="input-bar">
                <input type="text" id="m-input" placeholder="Начни писать..." onkeypress="if(event.key==='Enter') send()">
                <button class="btn" onclick="send()">SEND</button>
            </div>
        </div>

        <div id="tab-bank" class="main-content" style="display:none; padding:30px;">
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
                <h2 style="color:var(--accent)">ПЕРЕВОД ЗВЕЗД</h2>
                <input type="text" id="gift-to" placeholder="Кому (логин)">
                <input type="number" id="gift-amt" placeholder="Сумма">
                <button class="btn" style="width:100%; margin-top:10px;" onclick="transfer()">ОТПРАВИТЬ ⭐</button>
            </div>
            <br>
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
                <h3>АКТИВАЦИЯ ЧЕКА</h3>
                <input type="text" id="check-code" placeholder="GIFT-XXXXXX">
                <button class="btn" style="width:100%; background:#fff; color:#000; margin-top:10px;" onclick="redeem()">ЗАБРАТЬ</button>
            </div>
        </div>

        <div id="tab-frag" class="main-content" style="display:none; padding:30px;">
            <div style="background:var(--card); padding:25px; border-radius:25px; border:1px solid var(--border);">
                <h2 style="color:var(--accent)">NFT MARKET</h2>
                <input type="text" id="new-nick" placeholder="@username">
                <button class="btn" style="width:100%; margin-top:10px;" onclick="mint()">MINT NFT NAME</button>
            </div>
            <div id="nick-list" style="margin-top:20px; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
        const client = supabase.createClient(SB_URL, SB_KEY);
        
        let user = null;

        async function auth() {
            const u = document.getElementById('u-login').value.trim();
            const p = document.getElementById('u-pass').value.trim();
            if(!u || !p) return;

            let { data, error } = await client.from('users').select('*').eq('username', u).maybeSingle();
            if(error) return alert(error.message);

            if(!data) {
                const { data: n } = await client.from('users').insert([{ username: u, password: p, stars: 1000 }]).select().single();
                user = n;
            } else {
                if(data.password === p) user = data;
                else return notify("Неверный пароль!", "err");
            }
            startApp();
        }

        function startApp() {
            document.getElementById('auth-page').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            updateUI(); loadMsgs(); loadNicks();

            // Реалтайм подписки
            client.channel('chat').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMsgs()).subscribe();
            client.channel('users').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `username=eq.${user.username}` }, (pl) => {
                user = pl.new; updateUI();
            }).subscribe();
        }

        function updateUI() {
            document.getElementById('display-u').innerText = user.username;
            document.getElementById('display-s').innerText = `⭐ ${user.stars.toLocaleString()}`;
        }

        async function loadMsgs() {
            const { data } = await client.from('messages').select('*').order('created_at', { ascending: true });
            const b = document.getElementById('chat-box'); b.innerHTML = '';
            const isAdmin = user.username.toLowerCase() === 'admin';

            data?.forEach(m => {
                const isMe = m.username === user.username;
                const isBot = m.username.includes('BOT');
                b.innerHTML += `
                    <div class="msg ${isMe ? 'msg-out' : ''} ${isBot ? 'msg-bot' : ''}">
                        <div class="msg-top">
                            <b onclick="showProfile('${m.username}')">${m.username}</b>
                            ${isAdmin && !isBot ? `<span class="del-x" onclick="deleteMsg(${m.id})">×</span>` : ''}
                        </div>
                        <div>${m.text}</div>
                    </div>`;
            });
            b.scrollTop = b.scrollHeight;
        }

        async function send() {
            const i = document.getElementById('m-input');
            const val = i.value.trim();
            if(!val) return;

            // АДМИН-КОМАНДА НА ЧЕК
            if(user.username.toLowerCase() === 'admin' && val.startsWith('!check')) {
                const p = val.split(' ');
                const amt = parseInt(p[1]) || 5000;
                const uses = parseInt(p[2]) || 1;
                const code = "GIFT-" + Math.random().toString(36).substring(2,8).toUpperCase();
                
                await client.from('checks').insert([{ code: code, amount: amt, uses_left: uses }]);
                await client.from('messages').insert([{ 
                    username: '🤖 MOPSO-BOT', 
                    text: `🎁 <b>АДМИН-ДРОП!</b><br>Код: <span style="color:#fff">${code}</span><br>Сумма: ⭐ ${amt.toLocaleString()}<br>Мест: ${uses}` 
                }]);
                i.value = ''; return;
            }

            await client.from('messages').insert([{ username: user.username, text: val }]);
            i.value = '';
        }

        async function deleteMsg(id) {
            await client.from('messages').delete().eq('id', id);
            notify("Удалено");
        }

        async function transfer() {
            const to = document.getElementById('gift-to').value.trim();
            const amt = parseInt(document.getElementById('gift-amt').value);
            if(!to || isNaN(amt) || amt <= 0) return;
            if(user.stars < amt) return notify("Недостаточно звезд!", "err");

            const { data: target } = await client.from('users').select('*').eq('username', to).maybeSingle();
            if(!target) return notify("Пользователь не найден!", "err");

            await client.from('users').update({ stars: user.stars - amt }).eq('username', user.username);
            await client.from('users').update({ stars: target.stars + amt }).eq('username', to);
            notify(`Отправлено ⭐ ${amt} для ${to}`);
        }

        async function redeem() {
            const c = document.getElementById('check-code').value.trim();
            const { data: chk } = await client.from('checks').select('*').eq('code', c).maybeSingle();
            
            if(!chk || chk.uses_left <= 0) return notify("Чек недействителен!", "err");

            const { data: me } = await client.from('users').select('stars').eq('username', user.username).single();
            await client.from('users').update({ stars: me.stars + chk.amount }).eq('username', user.username);
            await client.from('checks').update({ uses_left: chk.uses_left - 1 }).eq('code', c);
            
            user.stars += chk.amount; updateUI();
            notify(`Вы получили ⭐ ${chk.amount}!`);
        }

        async function mint() {
            const n = document.getElementById('new-nick').value.trim();
            if(!n.startsWith('@')) return notify("Имя должно быть с @", "err");
            const { error } = await client.from('fragment_market').insert([{ username_text: n, owner: user.username }]);
            if(error) return notify("Уже занято!", "err");
            notify("NFT успешно создано!"); loadNicks();
        }

        async function loadNicks() {
            const { data } = await client.from('fragment_market').select('*');
            const l = document.getElementById('nick-list'); l.innerHTML = '';
            data?.forEach(n => {
                l.innerHTML += `<div style="padding:12px; background:#111; border-radius:12px; margin-bottom:8px; border:1px solid #222;">
                    <b style="color:var(--accent)">${n.username_text}</b> <br> <small style="color:#555">Owner: ${n.owner}</small>
                </div>`;
            });
        }

        async function showProfile(name) {
            const { data: u } = await client.from('users').select('*').eq('username', name).single();
            const { data: n } = await client.from('fragment_market').select('username_text').eq('owner', name);
            
            document.getElementById('p-img').src = u.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
            document.getElementById('p-user').innerText = u.username;
            document.getElementById('p-stars').innerText = `⭐ ${u.stars.toLocaleString()}`;
            document.getElementById('p-nicks').innerText = n.length ? "NFT: " + n.map(x => x.username_text).join(', ') : "Нет NFT имен";
            document.getElementById('p-overlay').style.display = 'flex';
        }

        function tab(t, el) {
            document.querySelectorAll('.main-content').forEach(v => v.style.display = 'none');
            document.getElementById('tab-'+t).style.display = 'flex';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-tab'));
            el.classList.add('active-tab');
        }

        function notify(m, type="success") {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.background = type === "success" ? "var(--accent)" : "var(--err)";
            t.style.top = "20px"; setTimeout(() => t.style.top = "-100px", 3000);
        }
    </script>
</body>
</html>
