<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM I RED SQUARE TEAM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p-color: #ff6600; --p-glow: rgba(255, 102, 0, 0.5);
            --bg: #030303; --card: rgba(15, 15, 15, 0.85);
            --border: rgba(255, 255, 255, 0.08); --glass: blur(20px);
            --success: #00ff88; --error: #ff3333;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.25s cubic-bezier(0.2, 0, 0.2, 1); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* Живой фон с частицами (CSS-only) */
        .bg-fx { position: fixed; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at center, #111 0%, #000 100%); overflow: hidden; }
        .bg-fx::after { content: ""; position: absolute; width: 200%; height: 200%; background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); opacity: 0.1; animation: bgMove 60s linear infinite; }
        @keyframes bgMove { from { transform: translate(0,0); } to { transform: translate(-50%, -50%); } }

        /* Плавные переходы страниц */
        .page { display: none; height: 100vh; width: 100vw; opacity: 0; filter: blur(10px); }
        .page.active { display: flex; opacity: 1; filter: blur(0); }

        /* Sidebar с неоновым свечением */
        .sidebar { width: 340px; background: var(--card); backdrop-filter: var(--glass); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        .sidebar::before { content: ""; position: absolute; right: 0; top: 0; height: 100%; width: 2px; background: linear-gradient(to bottom, transparent, var(--p-color), transparent); }

        .profile-header { padding: 50px 30px; text-align: center; }
        .avatar-wrap { position: relative; display: inline-block; margin-bottom: 20px; }
        .user-av { width: 120px; height: 120px; border-radius: 35%; border: 2px solid var(--p-color); box-shadow: 0 0 30px var(--p-glow); object-fit: cover; transform: rotate(-5deg); }
        .user-av:hover { transform: rotate(0deg) scale(1.1); }
        .status-dot { position: absolute; bottom: 10px; right: 10px; width: 18px; height: 18px; background: var(--success); border-radius: 50%; border: 3px solid #000; box-shadow: 0 0 10px var(--success); }

        .balance-card { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; border: 1px solid var(--border); margin: 0 30px 30px; text-align: center; }
        .stars-val { font-family: 'Orbitron'; font-size: 32px; color: var(--p-color); text-shadow: 0 0 15px var(--p-glow); }

        /* Навигация */
        .menu-item { padding: 18px 40px; cursor: pointer; color: #666; font-size: 13px; font-weight: 800; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
        .menu-item i { font-size: 18px; }
        .menu-item.active { color: #fff; background: linear-gradient(90deg, rgba(255,102,0,0.15) 0%, transparent 100%); border-left: 4px solid var(--p-color); }
        .menu-item:hover { color: #fff; padding-left: 50px; }

        /* Чат */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }

        /* Стиль сообщений с анимацией */
        .msg-container { display: flex; flex-direction: column; animation: slideIn 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; opacity: 0; }
        @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .msg-body { padding: 18px 25px; border-radius: 25px; background: var(--card); border: 1px solid var(--border); max-width: 70%; position: relative; backdrop-filter: var(--glass); }
        .msg-info { font-size: 10px; font-weight: 900; color: #555; margin-bottom: 8px; display: flex; gap: 10px; text-transform: uppercase; }
        .role-tag { color: var(--p-color); background: rgba(255,102,0,0.1); padding: 2px 8px; border-radius: 5px; }

        .msg-container.me { align-items: flex-end; }
        .msg-container.me .msg-body { background: linear-gradient(135deg, #221100 0%, #050505 100%); border-color: #552200; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

        /* Футуристичный ввод */
        .input-zone { padding: 30px; background: rgba(0,0,0,0.8); border-top: 1px solid var(--border); display: flex; gap: 20px; align-items: center; }
        .input-box { flex: 1; background: #0a0a0a; border: 1px solid var(--border); border-radius: 20px; padding: 18px 25px; color: #fff; outline: none; font-size: 15px; }
        .input-box:focus { border-color: var(--p-color); box-shadow: 0 0 20px rgba(255,102,0,0.2); }

        .send-btn { width: 60px; height: 60px; border-radius: 20px; background: var(--p-color); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--p-glow); }
        .send-btn:hover { transform: scale(1.1) rotate(5deg); filter: brightness(1.2); }

        /* Табы (Магазин, Банк) */
        .tab-content { display: none; padding: 50px; flex-direction: column; gap: 30px; overflow-y: auto; height: 100%; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .action-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 30px; position: relative; overflow: hidden; }
        .action-card:hover { border-color: var(--p-color); transform: translateY(-10px); }

        /* Уведомление */
        #notify { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #000; padding: 20px 40px; border-radius: 20px; font-weight: 900; z-index: 10000; transform: translateY(200px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* Скроллбар */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--p-color); }
    </style>
</head>
<body>

<div class="bg-fx"></div>
<div id="notify">SYSTEM UPDATED</div>

<div id="p-login" class="page active" style="align-items:center; justify-content:center;">
    <div class="action-card" style="width: 420px; text-align: center; border-width: 2px;">
        <div style="font-family: 'Orbitron'; font-size: 28px; letter-spacing: 10px; color: var(--p-color); margin-bottom: 10px;">MOPSOGRAM</div>
        <div style="font-size: 10px; letter-spacing: 5px; color: #444; margin-bottom: 40px;">SUPREME BLACK EDITION</div>
        <input type="text" id="in-u" class="input-box" placeholder="ACCESS KEY (LOGIN)" style="margin-bottom:15px; width: 100%;">
        <input type="password" id="in-p" class="input-box" placeholder="PASSWORD" style="margin-bottom:30px; width: 100%;">
        <button class="send-btn" style="width: 100%; border-radius: 15px;" onclick="handleAuth()">LOGIN TO SYSTEM</button>
    </div>
</div>

<div id="p-app" class="page">
    <div class="sidebar">
        <div class="profile-header">
            <div class="avatar-wrap">
                <img id="my-av" class="user-av" src="">
                <div class="status-dot"></div>
            </div>
            <div id="my-name" style="font-family: 'Orbitron'; font-size: 18px; letter-spacing: 2px;">USER</div>
        </div>

        <div class="balance-card">
            <div style="font-size: 10px; color: #555; margin-bottom: 5px; font-weight: 900;">CRYPTO BALANCE</div>
            <div class="stars-val" id="my-stars">0</div>
        </div>

        <div class="menu-item active" onclick="switchTab('chat', this)"><i>💬</i> NEURAL CHAT</div>
        <div class="menu-item" onclick="switchTab('bank', this)"><i>🏦</i> TERMINAL BANK</div>
        <div class="menu-item" onclick="switchTab('market', this)"><i>💎</i> NFT MARKET</div>
        
        <div style="margin-top:auto; padding:30px;">
            <button class="send-btn" style="width: 100%; background: #111; color: #fff; font-size: 10px;" onclick="location.reload()">TERMINATE SESSION</button>
        </div>
    </div>

    <div class="main-content">
        <div id="tab-chat" class="tab-content" style="display: flex; padding: 0;">
            <div id="chat-flow"></div>
            <div class="input-zone">
                <input type="text" id="chat-in" class="input-box" placeholder="Write a message..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">➔</button>
            </div>
        </div>

        <div id="tab-bank" class="tab-content">
            <h1 style="font-family: 'Orbitron'; color: var(--p-color);">BANKING TERMINAL</h1>
            <div class="grid-cards">
                <div class="action-card">
                    <h3>REDEEM VOUCHER</h3>
                    <input type="text" id="chk-code" class="input-box" placeholder="CODE-XXXX-XXXX">
                    <button class="send-btn" style="width:100%; margin-top:15px; border-radius: 10px;" onclick="redeemCheck()">REDEEM</button>
                </div>
                <div class="action-card">
                    <h3>TRANSFER STARS</h3>
                    <input type="text" id="tr-to" class="input-box" placeholder="Recipient Name">
                    <input type="number" id="tr-amt" class="input-box" placeholder="Amount" style="margin-top:10px;">
                    <button class="send-btn" style="width:100%; margin-top:15px; border-radius: 10px;" onclick="transferStars()">SEND CRYPTO</button>
                </div>
            </div>
        </div>

        <div id="tab-market" class="tab-content">
            <h1 style="font-family: 'Orbitron'; color: var(--p-color);">NFT MARKET</h1>
            <div id="nft-container" class="grid-cards">
                </div>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = null;

    async function handleAuth() {
        const u = document.getElementById('in-u').value.trim();
        const p = document.getElementById('in-p').value.trim();
        if(!u || !p) return showNotify("FIELDS REQUIRED", "var(--error)");

        let { data: ex } = await sb.from('users').select('*').eq('username', u).maybeSingle();
        if(!ex) {
            const { data: n } = await sb.from('users').insert([{ username: u, password: p, stars: 5000 }]).select().single();
            user = n;
        } else {
            if(ex.password === p) user = ex;
            else return showNotify("INVALID PASSWORD", "var(--error)");
        }
        enterApp();
    }

    function enterApp() {
        document.getElementById('p-login').classList.remove('active');
        document.getElementById('p-app').classList.add('active');
        updateUI();
        syncChat();
        
        // REALTIME SUBSCRIPTION
        sb.channel('realtime_core').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => {
            syncChat();
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'users', filter: `id=eq.${user.id}` }, (p) => {
            user = p.new; updateUI();
        }).subscribe();
    }

    async function syncChat() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('chat-flow');
        box.innerHTML = '';
        msgs?.forEach(m => {
            const isMe = m.username === user.username;
            box.innerHTML += `
                <div class="msg-container ${isMe ? 'me' : ''}">
                    <div class="msg-info">
                        <span>${m.username}</span>
                        ${isMe ? '<span class="role-tag">YOU</span>' : ''}
                    </div>
                    <div class="msg-body">${m.text}</div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById('chat-in');
        if(!i.value.trim()) return;
        const txt = i.value; i.value = '';
        await sb.from('messages').insert([{ username: user.username, text: txt }]);
    }

    async function transferStars() {
        const to = document.getElementById('tr-to').value.trim();
        const amt = parseInt(document.getElementById('tr-amt').value);
        if(!to || amt <= 0 || user.stars < amt) return showNotify("INVALID TRANSFER", "var(--error)");

        const { data: target } = await sb.from('users').select('*').eq('username', to).maybeSingle();
        if(!target) return showNotify("USER NOT FOUND", "var(--error)");

        await sb.from('users').update({ stars: target.stars + amt }).eq('id', target.id);
        await sb.from('users').update({ stars: user.stars - amt }).eq('id', user.id);
        showNotify("TRANSFER SUCCESSFUL");
    }

    async function redeemCheck() {
        const code = document.getElementById('chk-code').value.trim();
        const { data: c } = await sb.from('checks').select('*').eq('code', code).eq('is_used', false).maybeSingle();
        if(!c) return showNotify("INVALID CODE", "var(--error)");

        await sb.from('checks').update({ is_used: true }).eq('id', c.id);
        await sb.from('users').update({ stars: user.stars + c.amount }).eq('id', user.id);
        showNotify(`RECEIVED ⭐ ${c.amount}`);
    }

    function updateUI() {
        document.getElementById('my-name').innerText = user.username.toUpperCase();
        document.getElementById('my-stars').innerText = user.stars.toLocaleString();
        document.getElementById('my-av').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${user.username}`;
    }

    function switchTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById('tab-' + id).style.display = id === 'chat' ? 'flex' : 'block';
        el.classList.add('active');
    }

    function showNotify(m, color = "var(--p-color)") {
        const n = document.getElementById('notify');
        n.innerText = m; n.style.background = color;
        n.style.transform = "translateY(0)";
        setTimeout(() => n.style.transform = "translateY(200px)", 3000);
    }
</script>
</body>
</html>
