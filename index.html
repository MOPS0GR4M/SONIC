<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MOPSOGRAM ULTIMATE V18</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #1c1c1e;
            --card-hover: #2c2c2e;
            --accent: #ff9500;
            --accent-gradient: linear-gradient(135deg, #ff9500, #ff5e00);
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(18, 18, 18, 0.85);
            --radius-md: 18px;
            --blur: 40px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        /* Темы оформления */
        [data-theme="cyber"] {
            --bg: #050505; --card: #0d0d15; --card-hover: #161625;
            --accent: #00f2ff; --accent-gradient: linear-gradient(135deg, #00f2ff, #7000ff);
            --border: rgba(0, 242, 255, 0.15);
        }
        [data-theme="ruby"] {
            --bg: #0d0000; --card: #1f0808; --card-hover: #2d0c0c;
            --accent: #ff2d55; --accent-gradient: linear-gradient(135deg, #ff2d55, #8b0000);
            --border: rgba(255, 45, 85, 0.15);
        }
        [data-theme="emerald"] {
            --bg: #020d08; --card: #0a1f14; --card-hover: #123120;
            --accent: #00ff88; --accent-gradient: linear-gradient(135deg, #00ff88, #008855);
            --border: rgba(0, 255, 136, 0.15);
        }
        [data-theme="midnight"] {
            --bg: #010409; --card: #0d1117; --card-hover: #161b22;
            --accent: #58a6ff; --accent-gradient: linear-gradient(135deg, #58a6ff, #1f6feb);
            --border: rgba(88, 166, 255, 0.15);
        }
        [data-theme="gold"] {
            --bg: #0a0901; --card: #1c1a0a; --card-hover: #2d2a12;
            --accent: #ffcc00; --accent-gradient: linear-gradient(135deg, #ffcc00, #aa8800);
            --border: rgba(255, 204, 0, 0.15);
        }

        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; justify-content: center; transition: background 0.3s; }

        .app-container {
            width: 100%; max-width: 500px; height: 100%;
            background: var(--bg); position: relative;
            display: flex; flex-direction: column;
            border-left: 0.5px solid var(--border); border-right: 0.5px solid var(--border);
        }

        #auth-screen {
            position: absolute; inset: 0; background: #000; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; transition: 0.5s ease;
        }
        .auth-logo { font-size: 38px; font-weight: 900; color: var(--accent); margin-bottom: 30px; letter-spacing: -1.5px; }

        .m-input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 18px 20px; border-radius: var(--radius-md);
            color: #fff; font-size: 16px; outline: none; margin-bottom: 15px;
        }

        .m-btn {
            width: 100%; background: var(--accent-gradient); color: #fff; border: none;
            padding: 16px; border-radius: var(--radius-md); font-weight: 800;
            font-size: 14px; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .m-btn:active { transform: scale(0.98); }

        header {
            height: calc(65px + var(--safe-top)); padding-top: var(--safe-top);
            display: flex; align-items: center; gap: 15px; padding-left: 20px; padding-right: 20px;
            background: var(--glass); backdrop-filter: blur(var(--blur));
            border-bottom: 0.5px solid var(--border); z-index: 1000;
        }
        .header-title { font-weight: 900; font-size: 18px; flex: 1; text-transform: uppercase; letter-spacing: 0.5px; }
        .back-btn { cursor: pointer; color: var(--accent); display: none; padding: 5px; }

        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex; align-items: center; padding: 14px 20px;
            cursor: pointer; transition: 0.2s;
        }
        .chat-item:active { background: var(--card-hover); }
        .chat-ava { width: 52px; height: 52px; border-radius: 50%; margin-right: 15px; object-fit: cover; background: #222; border: 1px solid var(--border); }
        .chat-info { flex: 1; border-bottom: 0.5px solid rgba(255,255,255,0.05); padding-bottom: 14px; }
        .chat-name { font-weight: 700; font-size: 16px; }

        #messenger-view {
            position: absolute; inset: 0; background: var(--bg);
            z-index: 2000; display: none; flex-direction: column;
            animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        .bubble-wrap { display: flex; flex-direction: column; max-width: 85%; }
        .bubble-wrap.own { align-self: flex-end; }
        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; background: var(--card); border: 0.5px solid var(--border); word-break: break-word; }
        .own .bubble { background: var(--accent-gradient); border: none; color: #fff; border-bottom-right-radius: 4px; }
        .not-own .bubble { border-bottom-left-radius: 4px; }

        .input-bar {
            background: var(--glass); backdrop-filter: blur(var(--blur));
            padding: 12px 15px calc(15px + var(--safe-bottom));
            display: flex; align-items: center; gap: 10px; border-top: 0.5px solid var(--border);
        }
        .input-bar input {
            flex: 1; background: rgba(255,255,255,0.08); border: none;
            padding: 14px 20px; border-radius: 25px; color: #fff; font-size: 15px; outline: none;
        }
        .send-btn { color: var(--accent); cursor: pointer; padding: 8px; }

        nav {
            height: calc(65px + var(--safe-bottom)); display: flex;
            background: var(--glass); border-top: 0.5px solid var(--border);
            padding-bottom: var(--safe-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 11px; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }

        .themes-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .theme-card { height: 50px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }

        .status-msg { text-align: center; color: var(--text-secondary); font-size: 12px; margin: 20px 0; font-style: italic; opacity: 0.6; }

        .hidden { display: none !important; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body data-theme="classic">

    <div class="app-container">
        
        <div id="auth-screen">
            <div class="auth-logo">MOPSOGRAM</div>
            <input id="u-nick" class="m-input" placeholder="@username" autocomplete="off">
            <input id="u-pass" type="password" class="m-input" placeholder="пароль">
            <button id="u-login" class="m-btn">ВОЙТИ В СЕТЬ</button>
        </div>

        <header>
            <div id="m-back" class="back-btn" onclick="closeChat()"><i data-lucide="chevron-left"></i></div>
            <div class="header-title" id="h-title">Чаты</div>
            <div id="h-user" style="font-size: 11px; opacity: 0.5;"></div>
        </header>

        <main id="main-content" style="flex: 1; overflow: hidden; position: relative;">
            
            <!-- Список чатов -->
            <div id="view-list" class="chats-list">
                <div class="chat-item" onclick="openChat('global')">
                    <div style="width:52px; height:52px; border-radius:50%; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; margin-right:15px;">
                        <i data-lucide="globe" color="#fff"></i>
                    </div>
                    <div class="chat-info">
                        <div class="chat-name">Общий чат</div>
                        <div class="chat-preview" style="color:var(--text-secondary); font-size:13px;">Все пользователи MOPSOGRAM</div>
                    </div>
                </div>
                <div id="contacts"></div>
            </div>

            <!-- Профиль -->
            <div id="view-profile" class="hidden" style="padding: 25px; overflow-y: auto; height: 100%;">
                <div style="text-align: center; margin-bottom: 30px;">
                    <img id="p-ava" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--accent); margin-bottom:15px; background: #222;">
                    <h2 id="p-name" style="letter-spacing: -0.5px;"></h2>
                    <p style="color: var(--text-secondary); font-size: 13px;">Статус: В сети</p>
                </div>

                <div style="font-size: 11px; color: var(--text-secondary); text-transform: uppercase; font-weight: 800; margin-bottom: 12px; letter-spacing: 1px;">Выбор темы</div>
                <div class="themes-grid">
                    <div class="theme-card" style="background: #1c1c1e; color: #ff9500;" onclick="setTheme('classic')">CLASSIC</div>
                    <div class="theme-card" style="background: #0d0d15; color: #00f2ff;" onclick="setTheme('cyber')">CYBER</div>
                    <div class="theme-card" style="background: #1f0808; color: #ff2d55;" onclick="setTheme('ruby')">RUBY</div>
                    <div class="theme-card" style="background: #0a1f14; color: #00ff88;" onclick="setTheme('emerald')">EMERALD</div>
                    <div class="theme-card" style="background: #0d1117; color: #58a6ff;" onclick="setTheme('midnight')">MIDNIGHT</div>
                    <div class="theme-card" style="background: #1c1a0a; color: #ffcc00;" onclick="setTheme('gold')">GOLD</div>
                </div>

                <button class="m-btn" style="background:#ff3b30; margin-top:40px;" onclick="location.reload()">ВЫЙТИ ИЗ АККАУНТА</button>
            </div>

            <!-- Окно мессенджера -->
            <div id="messenger-view">
                <div id="msgs" class="messages-area"></div>
                <div class="input-bar">
                    <input id="m-in" placeholder="Сообщение..." autocomplete="off">
                    <div id="m-send" class="send-btn"><i data-lucide="send"></i></div>
                </div>
            </div>

        </main>

        <nav id="nav-bar">
            <div class="nav-item active" onclick="tab('list')"><i data-lucide="message-circle"></i><span>Чаты</span></div>
            <div class="nav-item" onclick="tab('profile')"><i data-lucide="user"></i><span>Профиль</span></div>
        </nav>

    </div>

    <script>
        const SB_URL = "https://obqwgeusngfpboklrwob.supabase.co";
        const SB_KEY = "sb_publishable_y5BsczI_vrBaouWNyS-kFg_vQ1FEUhE";
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null;
        let activeChat = null;
        let contacts = [];
        let channel = null;
        let hasToUid = true;

        lucide.createIcons();

        document.getElementById('u-login').onclick = async () => {
            const n = document.getElementById('u-nick').value.trim();
            const p = document.getElementById('u-pass').value;
            if(!n) return;

            try {
                const { data } = await sb.from('users').select('*').eq('username', n).single();
                if(data) {
                    if(data.password !== p) return alert("Неверный пароль");
                    user = data;
                } else {
                    user = { 
                        id: 'u_'+Math.random().toString(36).substr(2,9), 
                        username: n, password: p, 
                        avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${n}` 
                    };
                    await sb.from('users').insert([user]);
                }

                document.getElementById('auth-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-screen').style.display = 'none', 500);
                
                document.getElementById('h-user').innerText = `@${user.username}`;
                document.getElementById('p-name').innerText = user.username;
                document.getElementById('p-ava').src = user.avatar;
                
                init();
            } catch (err) {
                alert("Ошибка входа");
            }
        };

        async function init() {
            // Проверка структуры БД
            const { error } = await sb.from('messages').select('to_uid').limit(1);
            if (error) hasToUid = false;

            loadContacts();
            
            if (!channel) {
                channel = sb.channel('v18_channel')
                    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, payload => {
                        const m = payload.new;
                        if (activeChat === 'global' && (!m.to_uid)) render(m);
                        else if (activeChat && (m.uid === activeChat || m.to_uid === activeChat)) {
                            if ((m.uid === user.id && m.to_uid === activeChat) || (m.uid === activeChat && m.to_uid === user.id)) {
                                render(m);
                            }
                        }
                    })
                    .subscribe();
            }
        }

        async function loadContacts() {
            const { data } = await sb.from('users').select('*').neq('id', user.id);
            if(data) {
                contacts = data;
                const c = document.getElementById('contacts');
                c.innerHTML = '<div style="padding:15px 20px 5px; font-size:11px; color:var(--text-secondary); text-transform:uppercase; font-weight:800; letter-spacing:1px; opacity:0.6;">Личные сообщения</div>';
                data.forEach(u => {
                    c.innerHTML += `
                        <div class="chat-item" onclick="openChat('${u.id}')">
                            <img class="chat-ava" src="${u.avatar}">
                            <div class="chat-info">
                                <div class="chat-name">${u.username}</div>
                                <div class="chat-preview" style="color:var(--text-secondary); font-size:12px;">Нажмите, чтобы начать чат</div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        window.openChat = async (id) => {
            activeChat = id;
            const container = document.getElementById('msgs');
            document.getElementById('messenger-view').style.display = 'flex';
            document.getElementById('m-back').style.display = 'block';
            
            const target = contacts.find(c => c.id === id);
            document.getElementById('h-title').innerText = id === 'global' ? 'Общий чат' : `@${target?.username || 'Чат'}`;
            container.innerHTML = '<div class="status-msg">Загрузка истории...</div>';

            try {
                let query = sb.from('messages').select('*');
                if (id === 'global') {
                    if (hasToUid) query = query.is('to_uid', null);
                } else if (hasToUid) {
                    query = query.or(`and(uid.eq.${user.id},to_uid.eq.${id}),and(uid.eq.${id},to_uid.eq.${user.id})`);
                } else {
                    container.innerHTML = '<div class="status-msg">ЛС недоступны. Обновите БД (ALTER TABLE messages ADD COLUMN to_uid TEXT).</div>';
                    return;
                }

                const { data } = await query.order('id', {ascending:true});
                container.innerHTML = '';
                if(data && data.length > 0) {
                    data.forEach(render);
                } else {
                    container.innerHTML = '<div class="status-msg">Здесь пока пусто...</div>';
                }
            } catch (err) {
                container.innerHTML = '<div class="status-msg">Ошибка синхронизации данных</div>';
            }
            scroll();
        };

        window.closeChat = () => {
            activeChat = null;
            document.getElementById('messenger-view').style.display = 'none';
            document.getElementById('m-back').style.display = 'none';
            document.getElementById('h-title').innerText = 'Чаты';
        };

        function render(m) {
            const isOwn = m.uid === user.id;
            const wrap = document.createElement('div');
            wrap.className = `bubble-wrap ${isOwn ? 'own' : 'not-own'}`;
            const nameLabel = (!isOwn && activeChat === 'global') ? `<span style="font-size:10px; color:var(--accent); margin-bottom:4px; margin-left:12px; font-weight:800;">${m.name}</span>` : '';
            wrap.innerHTML = `${nameLabel}<div class="bubble">${m.val}</div>`;
            document.getElementById('msgs').appendChild(wrap);
            scroll();
        }

        document.getElementById('m-send').onclick = async () => {
            const input = document.getElementById('m-in');
            const val = input.value.trim();
            if(!val || !activeChat) return;

            const msg = { uid: user.id, name: user.username, val: val };
            if (hasToUid && activeChat !== 'global') msg.to_uid = activeChat;

            input.value = '';
            const { error } = await sb.from('messages').insert([msg]);
            if(error) alert("Ошибка сети");
        };

        window.tab = (t) => {
            document.getElementById('view-list').classList.toggle('hidden', t !== 'list');
            document.getElementById('view-profile').classList.toggle('hidden', t !== 'profile');
            document.querySelectorAll('.nav-item').forEach((n, idx) => n.classList.toggle('active', (t==='list' && idx===0) || (t==='profile' && idx===1)));
            document.getElementById('h-title').innerText = t === 'list' ? 'Чаты' : 'Профиль';
            if(t === 'profile') closeChat();
        };

        window.setTheme = (t) => document.body.setAttribute('data-theme', t);
        function scroll() { const d = document.getElementById('msgs'); d.scrollTop = d.scrollHeight; }
        document.getElementById('m-in').onkeypress = (e) => { if(e.key==='Enter') document.getElementById('m-send').click(); };
    </script>
</body>
</html>
