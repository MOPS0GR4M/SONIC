<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM 18.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0088cc; --bg: #0e1621; --side: #17212b;
            --msg-in: #182533; --msg-out: #2b5278;
            --text: #f5f5f5; --text-dim: #708499;
            --accent: #64b5f6; --danger: #ef5350;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg); 
            color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- LAYOUT --- */
        .app-wrapper { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: 300px; background: var(--side); border-right: 1px solid rgba(0,0,0,0.2);
            display: flex; flex-direction: column; z-index: 10;
        }

        .main-chat { flex: 1; display: flex; flex-direction: column; position: relative; background: url('https://i.ibb.co/5GzXn2t/bg-chat.png'); background-size: cover; }

        /* --- MESSAGES --- */
        #chat-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        
        .msg-row { display: flex; gap: 10px; margin-bottom: 4px; animation: msgFade 0.3s ease; }
        .msg-row.mine { flex-direction: row-reverse; }

        @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar-sm { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; object-fit: cover; flex-shrink: 0; }
        .avatar-sm:hover { filter: brightness(1.2); }

        .bubble { 
            max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 14.5px; 
            line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .msg-row:not(.mine) .bubble { background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg-row.mine .bubble { background: var(--msg-out); border-bottom-right-radius: 4px; }

        .author { font-weight: 700; font-size: 13px; color: var(--accent); margin-bottom: 3px; display: block; }
        .time { font-size: 10px; color: var(--text-dim); float: right; margin: 5px -5px -2px 10px; }

        /* --- INPUT --- */
        .bottom-bar { padding: 10px 20px 20px; background: var(--side); display: flex; align-items: center; gap: 12px; }
        .input-field { 
            flex: 1; background: var(--bg); border: none; padding: 12px 18px; 
            border-radius: 22px; color: #fff; font-size: 15px; border: 1px solid transparent;
        }
        .input-field:focus { border-color: var(--primary); }
        .send-btn { 
            background: var(--primary); color: #fff; border: none; width: 45px; height: 45px; 
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* --- MINI PROFILE MODAL --- */
        .modal-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .profile-card { 
            background: var(--side); width: 320px; border-radius: 20px; overflow: hidden;
            animation: cardShow 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes cardShow { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .card-header { height: 100px; background: var(--primary); position: relative; }
        .card-av { 
            width: 90px; height: 90px; border-radius: 50%; border: 4px solid var(--side); 
            position: absolute; bottom: -45px; left: 20px; background: #eee;
        }
        .card-body { padding: 55px 25px 25px; }
        .badge { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; }

        /* --- MOBILE --- */
        @media (max-width: 750px) {
            .sidebar { display: none; }
            .bubble { max-width: 85%; }
        }

        #toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 10px; background: var(--primary); z-index: 2000; transform: translateX(200%); transition: 0.4s; font-weight: 600; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="modal" class="modal-overlay" onclick="closeProfile()">
    <div class="profile-card" onclick="event.stopPropagation()">
        <div class="card-header"></div>
        <img id="p-av" class="card-av">
        <div class="card-body">
            <h2 id="p-name" style="margin:0;">Username</h2>
            <div id="p-status" style="color:var(--text-dim); font-size:13px; margin-bottom:15px;">Online</div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <span class="badge" id="p-stars">⭐ 0</span>
                <span class="badge" id="p-lvl">LVL 1</span>
            </div>
            <div id="adm-tools" style="display:none; border-top:1px solid rgba(255,255,255,0.05); padding-top:15px;">
                <button onclick="toggleMute()" id="mute-btn" style="width:100%; padding:10px; border-radius:8px; border:none; background:var(--danger); color:#fff; font-weight:700; cursor:pointer;">MUTE USER</button>
            </div>
        </div>
    </div>
</div>

<div class="app-wrapper">
    <div class="sidebar">
        <div style="padding:20px; border-bottom:1px solid rgba(0,0,0,0.1);">
            <h3 style="margin:0; color:var(--primary);">Mopsogram</h3>
        </div>
        <div id="my-info" style="padding:20px; display:flex; align-items:center; gap:12px; background: rgba(255,255,255,0.02);">
            <img id="my-av" class="avatar-sm">
            <div>
                <div id="my-name" style="font-weight:700;">Loading...</div>
                <div id="my-stars" style="font-size:12px; color:var(--accent);">⭐ 0 stars</div>
            </div>
        </div>
        <div style="padding:15px 20px; font-size:12px; color:var(--text-dim); font-weight:700;">CHATS</div>
        <div style="padding:15px 20px; background: rgba(0,136,204,0.1); border-left: 3px solid var(--primary); cursor:pointer;">
            <b>Global Community</b><br>
            <small style="color:var(--text-dim);">Public chat room</small>
        </div>
        <div style="margin-top:auto; padding:20px;">
            <button onclick="clearChat()" style="width:100%; padding:10px; background:none; border:1px solid var(--text-dim); color:var(--text-dim); border-radius:8px; cursor:pointer;">Purge History</button>
        </div>
    </div>

    <div class="main-chat">
        <div id="chat-scroll"></div>
        <div class="bottom-bar">
            <input type="text" id="m-in" class="input-field" placeholder="Write a message..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = null;
    let selectedUser = null;

    // ИНИЦИАЛИЗАЦИЯ (ВХОД)
    async function init() {
        const nick = prompt("Enter your Nickname:") || "Guest";
        let { data: ex } = await sb.from('users').select('*').eq('username', nick).maybeSingle();
        
        if(!ex) {
            const { data: n } = await sb.from('users').insert([{ username: nick, stars: 500, xp: 0, is_muted: false }]).select().single();
            user = n;
        } else {
            user = ex;
        }

        updateSelfUI();
        loadMessages();
        
        // REALTIME
        sb.channel('main').on('postgres_changes', { event: '*', schema: 'public' }, (p) => {
            if(p.table === 'messages') loadMessages();
            if(p.table === 'users' && p.new.id === user.id) { user = p.new; updateSelfUI(); }
        }).subscribe();
    }

    async function loadMessages() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('chat-scroll');
        box.innerHTML = '';
        
        msgs?.forEach(m => {
            const isMe = m.username === user.username;
            const time = new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            box.innerHTML += `
                <div class="msg-row ${isMe ? 'mine' : ''}">
                    <img class="avatar-sm" src="https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=${m.username}" onclick="openProfile('${m.username}')">
                    <div class="bubble">
                        ${!isMe ? `<span class="author">${m.username}</span>` : ''}
                        ${m.text}
                        <span class="time">${time}</span>
                    </div>
                </div>`;
        });
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        if(user.is_muted) return showToast("You are MUTED", "#ef5350");
        const i = document.getElementById('m-in');
        if(!i.value.trim()) return;
        const txt = i.value; i.value = '';
        await sb.from('messages').insert([{ username: user.username, text: txt }]);
    }

    // ПРОФИЛИ И МУТЫ
    async function openProfile(name) {
        const { data: u } = await sb.from('users').select('*').eq('username', name).maybeSingle();
        if(!u) return;
        selectedUser = u;

        document.getElementById('p-name').innerText = u.username;
        document.getElementById('p-av').src = `https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=${u.username}`;
        document.getElementById('p-stars').innerText = "⭐ " + u.stars;
        document.getElementById('p-lvl').innerText = "LVL " + (Math.floor(Math.sqrt(u.xp || 0)/10)+1);
        document.getElementById('p-status').innerText = u.is_muted ? "MUTED" : "Active Member";
        
        // Админ-инструменты
        const isAdm = user.username.toLowerCase() === 'admin';
        document.getElementById('adm-tools').style.display = (isAdm && name !== user.username) ? 'block' : 'none';
        document.getElementById('mute-btn').innerText = u.is_muted ? "UNMUTE" : "MUTE USER";

        document.getElementById('modal').style.display = 'flex';
    }

    function closeProfile() { document.getElementById('modal').style.display = 'none'; }

    async function toggleMute() {
        const newStatus = !selectedUser.is_muted;
        await sb.from('users').update({ is_muted: newStatus }).eq('id', selectedUser.id);
        showToast(newStatus ? "User Muted" : "User Unmuted");
        closeProfile();
    }

    async function clearChat() {
        if(!confirm("Clear chat?")) return;
        await sb.from('messages').delete().neq('username', 'root');
    }

    function updateSelfUI() {
        document.getElementById('my-name').innerText = user.username;
        document.getElementById('my-stars').innerText = `⭐ ${user.stars} stars`;
        document.getElementById('my-av').src = `https://api.dicebear.com/7.x/adventurer-neutral/svg?seed=${user.username}`;
        if(user.is_muted) document.getElementById('m-in').placeholder = "YOU ARE MUTED";
    }

    function showToast(m, bg = "var(--primary)") {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.background = bg; t.style.transform = "translateX(0)";
        setTimeout(() => t.style.transform = "translateX(200%)", 3000);
    }

    init();
</script>
</body>
</html>
