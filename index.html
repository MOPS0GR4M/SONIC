<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOPSOGRAM 22.0 | FRAGMENT & ADMIN</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --p: #ff9000; --p-dark: #cc7300; --p-glow: rgba(255, 144, 0, 0.2);
            --bg: #000000; --side: #0a0a0a; --card: #111111;
            --brd: #1f1f1f; --text: #ffffff; --muted: #666666;
        }

        * { box-sizing: border-box; outline: none; transition: all 0.2s ease; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Animations */
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--side); padding: 40px; border-radius: 24px; border: 1px solid var(--brd); width: 350px; text-align: center; }
        
        /* Layout */
        .app-container { display: none; height: 100vh; width: 100vw; }
        .sidebar { width: 300px; background: var(--side); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .viewport { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at center, #111 0%, #000 100%); }

        /* Nav */
        .nav-item { padding: 15px 25px; cursor: pointer; color: var(--muted); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item:hover { color: var(--p); background: rgba(255,144,0,0.05); }
        .nav-item.active { color: #fff; background: var(--p); border-radius: 0 50px 50px 0; margin-right: 10px; }

        /* Chat */
        #chat-engine { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; animation: slideUp 0.3s ease; }
        .msg.me { align-self: flex-end; }
        .bubble { padding: 12px 16px; border-radius: 18px; background: var(--card); border: 1px solid var(--brd); font-size: 14px; line-height: 1.4; }
        .msg.me .bubble { border-color: var(--p); background: #1a1300; }
        .admin-tools { font-size: 10px; margin-top: 5px; display: flex; gap: 10px; color: #ff4444; font-weight: 900; cursor: pointer; }

        /* Fragment Market */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .nft-card { background: var(--side); border: 1px solid var(--brd); border-radius: 20px; padding: 20px; text-align: center; position: relative; }
        .nft-card:hover { border-color: var(--p); transform: translateY(-5px); box-shadow: 0 10px 30px var(--p-glow); }
        .nft-name { font-family: 'JetBrains Mono'; color: var(--p); font-size: 16px; margin-bottom: 10px; }

        /* Inputs */
        .input-group { padding: 20px; background: var(--side); border-top: 1px solid var(--brd); display: flex; gap: 10px; }
        input { background: #111; border: 1px solid #222; padding: 12px 15px; border-radius: 12px; color: #fff; flex: 1; font-family: 'JetBrains Mono'; }
        input:focus { border-color: var(--p); }
        .btn { background: var(--p); border: none; padding: 12px 20px; border-radius: 12px; font-weight: 900; cursor: pointer; color: #000; }
        .btn:active { transform: scale(0.95); }

        /* Toast */
        #toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; background: var(--p); color: #000; font-weight: 900; transform: translateX(200%); z-index: 2000; }
    </style>
</head>
<body>

<div id="toast">SYSTEM MESSAGE</div>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="font-family:'Orbitron'; color:var(--p)">MOPSOGRAM</h2>
        <input type="text" id="log-u" placeholder="@username" style="width:100%; margin-bottom:10px;">
        <input type="password" id="log-p" placeholder="password" style="width:100%; margin-bottom:20px;">
        <button class="btn" style="width:100%" onclick="auth()">ACCESS TERMINAL</button>
    </div>
</div>

<div class="app-container" id="app">
    <aside class="sidebar">
        <div style="padding:30px; border-bottom:1px solid var(--brd); text-align:center;">
            <img id="u-av" style="width:80px; height:80px; border-radius:50%; border:2px solid var(--p); margin-bottom:15px;">
            <div id="u-name" style="font-weight:900; color:var(--p);">@USER</div>
            <div id="u-stars" style="font-size:20px; margin-top:5px;">0 ⭐</div>
        </div>
        <nav style="flex:1; padding-top:20px;">
            <div class="nav-item active" onclick="tab('chat', this)">📡 Global Chat</div>
            <div class="nav-item" onclick="tab('market', this)">💎 Fragment NFT</div>
            <div class="nav-item" onclick="tab('bank', this)">🏦 Central Bank</div>
            <div id="adm-nav" class="nav-item" style="display:none; color:#ff4444;" onclick="tab('admin', this)">⚡ Root Control</div>
        </nav>
        <div style="padding:20px; color:var(--muted); font-size:10px; text-align:center;">MOPSOGRAM v22.0.4</div>
    </aside>

    <main class="viewport">
        <header style="height:60px; border-bottom:1px solid var(--brd); display:flex; align-items:center; padding:0 25px; justify-content:space-between;">
            <span id="tab-title" style="font-family:'Orbitron'; font-size:12px; letter-spacing:2px;">TERMINAL_CHAT</span>
            <span id="status" style="color:#00ff88; font-size:10px; animation:pulse 2s infinite;">● ONLINE</span>
        </header>

        <div id="view-chat" class="tab-content" style="display:flex; flex-direction:column; height:100%;">
            <div id="chat-engine"></div>
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="Type encrypted message...">
                <button class="btn" onclick="sendMsg()">SEND</button>
            </div>
        </div>

        <div id="view-market" class="tab-content" style="display:none; overflow-y:auto;">
            <div style="padding:25px;">
                <h1 style="color:var(--p); font-family:'Orbitron';">FRAGMENT MARKET</h1>
                <p style="color:var(--muted)">Sell your username as NFT or buy premium ones.</p>
                <div class="market-grid" id="market-list"></div>
            </div>
        </div>

        <div id="view-bank" class="tab-content" style="display:none; padding:40px;">
            <div class="auth-box" style="width:100%; max-width:500px; margin:0 auto; text-align:left;">
                <h3>REDEEM STAR-CHECK</h3>
                <input type="text" id="check-code" placeholder="FRGM-XXXX-XXXX" style="width:100%; margin-bottom:15px;">
                <button class="btn" onclick="redeemCheck()">ACTIVATE CODE</button>
            </div>
        </div>

        <div id="view-admin" class="tab-content" style="display:none; padding:40px;">
            <h1 style="color:#ff4444;">ROOT_TERMINAL</h1>
            <div style="background:var(--side); padding:25px; border-radius:20px; border:1px solid #ff4444;">
                <h3>GENERATE STAR-CHECK</h3>
                <input type="number" id="gen-amt" placeholder="Stars Amount" style="width:200px;">
                <button class="btn" style="background:#ff4444" onclick="createCheck()">GENERATE CODE</button>
                <div id="gen-res" style="margin-top:20px; font-family:'JetBrains Mono'; color:var(--p);"></div>
            </div>
        </div>
    </main>
</div>

<script>
    const S_URL = 'https://obqwgeusngfpboklrwob.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9icXdnZXVzbmdmcGJva2xyd29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzEwNDAsImV4cCI6MjA4OTUwNzA0MH0.7iFZdM_Hqjb_B3gGzNeAdZngRhy1sSoz2MR_VfuBK3U';
    const sb = supabase.createClient(S_URL, S_KEY);

    let user = null;

    async function auth() {
        const u = document.getElementById('log-u').value.trim();
        const p = document.getElementById('log-p').value.trim();
        const nick = u.startsWith('@') ? u : '@' + u;

        let { data: ex } = await sb.from('users').select('*').eq('username', nick).maybeSingle();

        if(!ex) {
            const { data: n, error } = await sb.from('users').insert([{ username: nick, password: p, stars: 500, role: nick === '@admin' ? 'admin' : 'user' }]).select().single();
            user = n;
        } else {
            if(ex.password !== p) return notify("ACCESS DENIED: WRONG PASSWORD", "#ff4444");
            user = ex;
        }

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if(user.role === 'admin') document.getElementById('adm-nav').style.display = 'block';
        
        init();
    }

    function init() {
        updateUI();
        syncChat();
        syncMarket();
        
        sb.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, (p) => {
            if(p.table === 'messages') syncChat();
            if(p.table === 'users' && p.new.id === user.id) { user = p.new; updateUI(); }
        }).subscribe();
    }

    async function syncChat() {
        const { data: msgs } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        const engine = document.getElementById('chat-engine');
        engine.innerHTML = '';
        msgs?.forEach(m => {
            const isMe = m.username === user.username;
            const isAdmin = user.role === 'admin';
            engine.innerHTML += `
                <div class="msg ${isMe ? 'me' : ''}">
                    <div style="font-size:10px; color:var(--muted); margin:0 5px 3px;">${m.username}</div>
                    <div class="bubble">${m.text}</div>
                    ${isAdmin ? `<div class="admin-tools">
                        <span onclick="delMsg(${m.id})">DELETE</span>
                        <span onclick="muteUser('${m.username}')">MUTE</span>
                    </div>` : ''}
                </div>`;
        });
        engine.scrollTop = engine.scrollHeight;
    }

    async function sendMsg() {
        const i = document.getElementById('chat-input');
        if(!i.value || user.is_muted) return notify(user.is_muted ? "YOU ARE MUTED" : "EMPTY", "#ff4444");
        await sb.from('messages').insert({ username: user.username, text: i.value });
        i.value = '';
    }

    // FRAGMENT LOGIC
    async function syncMarket() {
        // Здесь мы просто имитируем рынок юзернеймов из таблицы users
        const { data: users } = await sb.from('users').select('username, stars').limit(10);
        const list = document.getElementById('market-list');
        list.innerHTML = '';
        users.forEach(u => {
            list.innerHTML += `
                <div class="nft-card">
                    <div class="nft-name">${u.username}</div>
                    <div style="font-size:12px; margin-bottom:15px;">Price: 2,500 ⭐</div>
                    <button class="btn" style="width:100%; font-size:10px;" onclick="notify('Fragment Auction in Progress...')">BID</button>
                </div>`;
        });
    }

    // BANK LOGIC
    async function createCheck() {
        const amt = document.getElementById('gen-amt').value;
        const code = "FRGM-" + Math.random().toString(36).substr(2,9).toUpperCase();
        await sb.from('checks').insert({ code, amount: amt });
        document.getElementById('gen-res').innerText = "CODE: " + code;
    }

    async function redeemCheck() {
        const c = document.getElementById('check-code').value;
        const { data: check } = await sb.from('checks').select('*').eq('code', c).eq('is_used', false).maybeSingle();
        
        if(check) {
            await sb.from('checks').update({ is_used: true }).eq('id', check.id);
            await sb.from('users').update({ stars: user.stars + check.amount }).eq('id', user.id);
            notify(`RECEIVED ${check.amount} STARS!`);
        } else {
            notify("INVALID OR USED CODE", "#ff4444");
        }
    }

    // ADMIN MODERATION
    async function delMsg(id) {
        await sb.from('messages').delete().eq('id', id);
        notify("MESSAGE REMOVED");
    }

    async function muteUser(target) {
        await sb.from('users').update({ is_muted: true }).eq('username', target);
        notify(target + " MUTED");
    }

    // UI HELPER
    function updateUI() {
        document.getElementById('u-name').innerText = user.username;
        document.getElementById('u-stars').innerText = (user.stars || 0).toLocaleString() + " ⭐";
        document.getElementById('u-av').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${user.username}`;
    }

    function tab(name, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + name).style.display = name === 'chat' ? 'flex' : 'block';
        document.getElementById('tab-title').innerText = "TERMINAL_" + name.toUpperCase();
        el.classList.add('active');
    }

    function notify(m, bg = "#ff9000") {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.background = bg;
        t.style.transform = "translateX(0)";
        setTimeout(() => t.style.transform = "translateX(200%)", 3000);
    }
</script>
</body>
</html>
